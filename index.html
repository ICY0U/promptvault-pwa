    var isS=!!S.saved[p.id];
    h+='<div class="neon-sep"></div>';

    h+='<span style="color:'+cc_(p.c)+'">'+esc(p.c)+'</span>';
    h+='<span style="color:#3f3f46">&middot;</span>';
    h+='<span style="color:'+tc_(p.l)+'">'+esc(p.l)+'</span>';
    h+='</div></div>';
    h+='<button class="star'+(isS?' on':'')+'" data-sv="'+p.id+'">'+(isS?'\u2605':'\u2606')+'</button>';
    h+='</div>';
    h+='<div class="exp'+(isO?' show':'')+'">';
    h+='<div class="pbox"><div class="ptxt">'+esc(p.p)+'</div></div>';
    h+='<button class="cpb'+(S.copied===p.id?' ok':'')+'" data-cp="'+p.id+'">'+(S.copied===p.id?'\u2713 Copied':'Copy Prompt')+'</button>';
    h+='</div></div>';
  }
  if(append){
    document.getElementById("list").insertAdjacentHTML("beforeend",h);
  } else {
    document.getElementById("list").innerHTML=h;
  }

  var sp=document.getElementById("loadSpinner");
  if(rem>0){sp.className="load-spinner show";S._hasMore=true}
  else{sp.className="load-spinner";S._hasMore=false}

  mkPills();
  updChips();
}

function mkPills(){
  var h="";
  if(S.cat)h+='<span class="pill" data-clr="cat">'+esc(S.cat)+' \u2715</span>';
  if(S.tool)h+='<span class="pill" data-clr="tool">'+esc(S.tool)+' \u2715</span>';
  if(S.sort!=="Default")h+='<span class="pill" data-clr="sort">'+esc(S.sort)+' \u2715</span>';
  if(h)h+='<span class="pill pill-clear" data-clr="all">Clear all \u2715</span>';
  document.getElementById("pills").innerHTML=h;
}

function updChips(){
  var cb=document.getElementById("cBtn");cb.className="chip"+(S.cat?" on":"");cb.textContent=S.cat||"Category \u25BE";
  var tb=document.getElementById("tBtn");tb.className="chip"+(S.tool?" on":"");tb.textContent=S.tool||"Tool \u25BE";
  var sb=document.getElementById("sBtn");sb.className="chip"+(S.sort!=="Default"?" on":"");sb.textContent=S.sort==="Default"?"Sort \u25BE":S.sort;
}

function buildDD(){
  var h,i;
  h="";for(i=0;i<CATS.length;i++){h+='<div class="ddi" data-f="cat" data-v="'+esc(CATS[i])+'"><span style="color:'+cc_(CATS[i])+'">&#9679; </span>'+esc(CATS[i])+'</div>'}
  document.getElementById("cDD").innerHTML=h;
  h="";for(i=0;i<TOOLS.length;i++){h+='<div class="ddi" data-f="tool" data-v="'+esc(TOOLS[i])+'"><span style="color:'+tc_(TOOLS[i])+'">&#9679; </span>'+esc(TOOLS[i])+'</div>'}
  document.getElementById("tDD").innerHTML=h;
  h="";for(i=0;i<SORTS.length;i++){h+='<div class="ddi" data-f="sort" data-v="'+SORTS[i]+'">'+SORTS[i]+'</div>'}
  document.getElementById("sDD").innerHTML=h;
}

function closeDDs(){var dd=document.querySelectorAll(".ddn");for(var i=0;i<dd.length;i++)dd[i].classList.remove("show")}

function setF(type,val){
  if(type==="cat"){S.cat=S.cat===val?"":val}
  else if(type==="tool"){S.tool=S.tool===val?"":val}
  else if(type==="sort"){S.sort=S.sort===val?"Default":val}
  else if(type==="all"){S.cat="";S.tool="";S.sort="Default"}
  S.pg=1;closeDDs();render();
}

// EVENT DELEGATION - no inline onclick, no quote issues
document.addEventListener("click",function(e){
  var el=e.target;

  // Star/save button
  var svId=el.getAttribute("data-sv");
  if(svId){e.stopPropagation();svId=parseInt(svId);if(S.saved[svId])delete S.saved[svId];else S.saved[svId]=true;try{localStorage.setItem("pv7s",JSON.stringify(S.saved))}catch(x){}render();return}

  // Copy button
  var cpId=el.getAttribute("data-cp");
  if(cpId){e.stopPropagation();cpId=parseInt(cpId);var pr=null;for(var i=0;i<D.length;i++){if(D[i].id===cpId){pr=D[i];break}}
    if(pr&&navigator.clipboard){navigator.clipboard.writeText(pr.p).then(function(){S.copied=cpId;render();setTimeout(function(){S.copied=null;render()},1500)})}return}

  // Row toggle
  var ri=el.closest(".row-in");
  if(ri){var rid=parseInt(ri.getAttribute("data-id"));S.open=S.open===rid?null:rid;render();return}

  // Dropdown items
  var ddi=el.closest(".ddi");
  if(ddi){setF(ddi.getAttribute("data-f"),ddi.getAttribute("data-v"));return}

  // Filter pills
  var pill=el.closest(".pill");
  if(pill){var c=pill.getAttribute("data-clr");setF(c,"");return}

  // Saved button
  if(el.id==="svBtn"||el===document.getElementById("svBtn")){
    S.sv=!S.sv;S.pg=1;
    var btn=document.getElementById("svBtn");
    btn.className="sv-btn"+(S.sv?" on":"");
    var cnt=0;for(var k in S.saved)if(S.saved[k])cnt++;
    btn.innerHTML=S.sv?"\u2605 Saved ("+cnt+")":"\u2606 Saved";
    render();return;
  }

  // Chip buttons -> toggle dropdowns
  if(el.id==="cBtn"){e.stopPropagation();closeDDs();document.getElementById("cDD").classList.toggle("show");return}
  if(el.id==="tBtn"){e.stopPropagation();closeDDs();document.getElementById("tDD").classList.toggle("show");return}
  if(el.id==="sBtn"){e.stopPropagation();closeDDs();document.getElementById("sDD").classList.toggle("show");return}

  // Load more — removed, now using infinite scroll
  // if(el.id==="lmore"||el.closest(".lmore")){S.pg++;render();return}

  // Search clear
  if(el.id==="sClear"||el===document.getElementById("sClear")){
    document.getElementById("sInput").value="";S.q="";S.pg=1;document.getElementById("sClear").style.display="none";render();return;
  }

  // Close dropdowns on outside click
  if(!el.closest(".drw"))closeDDs();
});

// Search input
document.getElementById("sInput").addEventListener("input",function(){
  S.q=this.value;S.pg=1;
  document.getElementById("sClear").style.display=S.q?"block":"none";
  render();
});

// Register service worker
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){})}

// Install prompt
var deferredPrompt=null;
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();
  deferredPrompt=e;
  if(!localStorage.getItem("pv-install-dismissed")){
    document.getElementById("installBanner").style.display="block";
  }
});
document.getElementById("installBtn").addEventListener("click",function(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      deferredPrompt=null;
      document.getElementById("installBanner").style.display="none";
    });
  }
});
document.getElementById("dismissBtn").addEventListener("click",function(){
  document.getElementById("installBanner").style.display="none";
  localStorage.setItem("pv-install-dismissed","1");
});
window.addEventListener("appinstalled",function(){
  document.getElementById("installBanner").style.display="none";
  deferredPrompt=null;
});

buildDD();
render();

// Infinite scroll
var _scrolling=false;
window.addEventListener("scroll",function(){
  if(_scrolling)return;
  if(!S._hasMore)return;
  var sp=document.getElementById("loadSpinner");
  var rect=sp.getBoundingClientRect();
  if(rect.top<window.innerHeight+200){
    _scrolling=true;
    S.pg++;
    render(true);
    _scrolling=false;
  }
});
</script>
</body>
</html>
