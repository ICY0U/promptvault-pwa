<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href="manifest.json">

<title>PromptVault</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#09090b;--s1:#111113;--s2:#18181b;--bdr:rgba(255,255,255,.06);--t1:#fafafa;--t2:#a1a1aa;--t3:#71717a;--ac:#a855f7;--neon1:#a855f7;--neon2:#06b6d4;--neon3:#ec4899}
html,body{background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;overflow-x:hidden;min-height:100vh;min-height:100dvh}
body{max-width:520px;margin:0 auto;position:relative}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px}

.glow{display:none}

.hdr{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(9,9,11,.92);border-bottom:1px solid var(--bdr);padding:14px 16px 12px}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.logo{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
.logo svg{width:28px;height:28px;filter:drop-shadow(0 0 6px rgba(168,85,247,.6))}
.logo::before{content:'';position:absolute;inset:0;border-radius:12px;padding:2px;background:linear-gradient(135deg,var(--neon1),var(--neon2),var(--neon3),var(--neon1));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:logoBorder 3s linear infinite}
.logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(6,182,212,.15));border-radius:12px}
@keyframes logoBorder{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.logo svg{animation:logoFloat 3s ease-in-out infinite}
.brand{flex:1}
.brand-name{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:800;letter-spacing:1px;background:linear-gradient(135deg,#a855f7,#06b6d4,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 20px rgba(168,85,247,.3))}
.brand-sub{font-size:11px;color:var(--t3);font-weight:500;margin-top:1px}
.sv-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);background:none;color:var(--t3);font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;transition:.2s}
.sv-btn.on{border-color:#eab308;color:#eab308;background:rgba(234,179,8,.08)}

.search{position:relative;margin-bottom:10px}
.search input{width:100%;padding:10px 38px;border-radius:10px;border:1px solid var(--bdr);background:var(--s1);color:var(--t1);font-family:inherit;font-size:14px;outline:none;transition:.2s}
.search input:focus{border-color:rgba(168,85,247,.4);background:#0f0f12}
.search input::placeholder{color:#52525b}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#52525b;font-size:15px;pointer-events:none}
.s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#52525b;cursor:pointer;font-size:15px;display:none;padding:2px}

.chips{display:flex;gap:6px;overflow-x:visible;overflow-y:visible;scrollbar-width:none;-ms-overflow-style:none}
.chips::-webkit-scrollbar{display:none}
.drw{position:relative;display:inline-block}
.chip{padding:6px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--s1);color:var(--t3);font-size:11px;font-family:inherit;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;-webkit-appearance:none;appearance:none}
.chip:hover{border-color:rgba(255,255,255,.12)}
.chip.on{border-color:var(--ac);color:var(--ac)}
.ddn{position:absolute;top:calc(100% + 4px);left:0;min-width:180px;max-height:300px;overflow-y:auto;background:#18181b;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:4px;z-index:200;display:none;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.ddn.show{display:block}
.ddi{padding:8px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--t2);transition:.1s;white-space:nowrap}
.ddi:hover{background:var(--s2);color:var(--t1)}

.pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(168,85,247,.1);color:#c084fc;cursor:pointer;transition:.15s}
.pill:hover{background:rgba(168,85,247,.18)}
.pill-clear{color:var(--t3);background:none;border:1px solid var(--bdr)}

.count{padding:8px 16px;font-size:11px;color:var(--t3)}

.neon-sep{height:1px;background:linear-gradient(90deg,transparent,var(--neon1),var(--neon2),var(--neon3),transparent);background-size:200% 100%;animation:neonSlide 3s linear infinite;opacity:.5}
@keyframes neonSlide{0%{background-position:200% 0}100%{background-position:-200% 0}}

.row{cursor:pointer;transition:background .15s;animation:fu .3s ease both}
.row:hover{background:rgba(168,85,247,.04)}
.row:active{transform:scale(.998)}
.row-in{display:flex;align-items:center;padding:14px 16px;gap:12px}
.row-c{flex:1;min-width:0}
.row-t{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;letter-spacing:.3px}
.row-m{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.row-m span{white-space:nowrap}
.star{font-size:18px;background:none;border:none;cursor:pointer;padding:4px;color:#52525b;transition:.15s;flex-shrink:0}
.star.on{color:#eab308}

.exp{padding:0 16px;overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease}
.exp.show{max-height:500px;padding:0 16px 14px}
.pbox{background:#0a0a0c;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;max-height:300px;overflow-y:auto;margin-bottom:12px}
.ptxt{font-family:Inter,system-ui,sans-serif;font-size:13px;line-height:1.8;color:#d4d4d8;white-space:pre-wrap;word-break:break-word}
.cpb{width:100%;padding:11px;border-radius:10px;border:none;background:var(--ac);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.cpb:hover{filter:brightness(1.1);transform:translateY(-1px)}
.cpb:active{transform:scale(.98)}
.cpb.ok{background:#22c55e}

.lmore{display:none}

.load-spinner{text-align:center;padding:20px;color:var(--t3);font-size:12px;display:none}
.load-spinner.show{display:block}
.load-spinner::before{content:'';display:block;width:24px;height:24px;margin:0 auto 8px;border:2px solid var(--bdr);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}



@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#a855f7,#6366f1);padding:14px 16px;text-align:center;animation:fu .3s ease both;max-width:520px;margin:0 auto}
.install-banner p{font-size:13px;font-weight:600;color:#fff;margin-bottom:8px}
.install-banner .ib-btns{display:flex;gap:8px;justify-content:center}
.install-banner button{padding:8px 20px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.ib-install{background:#fff;color:#6366f1}
.ib-dismiss{background:rgba(255,255,255,.2);color:#fff}

@media(display-mode: standalone){.install-banner{display:none!important}}
</style>
</head>
<body>
<div class="glow"></div>

anese city pop, FM synth chords, funky bass, light disco drums, smooth female vocals, neon Tokyo nightlife, 80s warmth, breezy, 112 BPM"},{"id":19,"c":"Music","l":"Suno","t":"Liquid Drum & Bass","d":"Medium","r":4.7,"p":"Liquid DnB, rolling breakbeats, deep sub bass, atmospheric pads, soulful female vocal samples, jazzy chords, late-night drive, 174 BPM"},{"id":20,"c":"Music","l":"Suno","t":"Anime Opening Theme","d":"Advanced","r":4.8,"p":"Anime opening theme, J-rock with electronic elements, fast tempo, powerful female vocals, guitar solo, dramatic strings, battle energy, 155 BPM"},{"id":21,"c":"Music","l":"Suno","t":"Film Score \u2014 Tension","d":"Advanced","r":4.9,"p":"Cinematic film score, sweeping strings, deep timpani, heroic French horn, building crescendo, Hans Zimmer meets John Williams, no vocals, 90 to 140 BPM"},{"id":22,"c":"Music","l":"Suno","t":"Reggae Dub","d":"Simple","r":4.7,"p":"Reggae dub, deep echo on drums, heavy bass, skanking guitar, melodica, dub siren effects, spacious reverb, 78 BPM"},{"id":23,"c":"Music","l":"Suno","t":"Flamenco Fusion","d":"Medium","r":4.7,"p":"Flamenco fusion, nylon guitar rasgueado, cajon, hand claps, passionate female vocals, electronic bass, Spanish intensity, 105 BPM"},{"id":24,"c":"Music","l":"Suno","t":"Chiptune 8-Bit","d":"Simple","r":4.8,"p":"8-bit chiptune, retro game soundtrack, square wave melody, pulse bass, noise drums, NES nostalgia, adventure theme, 140 BPM"},{"id":25,"c":"Music","l":"Suno","t":"Electro Swing","d":"Medium","r":4.7,"p":"Electro swing, vintage jazz samples, electronic beats, brass, upright bass, swung rhythm, Gatsby charm meets club energy, 128 BPM"},{"id":26,"c":"Music","l":"Suno","t":"Grunge 90s Seattle","d":"Simple","r":4.7,"p":"90s grunge, distorted guitar riffs, anguished male vocals, quiet-loud dynamics, raw, flannel-era angst, garage sound, 125 BPM"},{"id":27,"c":"Music","l":"Suno","t":"Celtic Adventure","d":"Simple","r":4.6,"p":"Celtic folk, tin whistle, bodhran drum, fiddle, acoustic guitar, adventure themes, rolling hills, pub sing-along, 120 BPM"},{"id":28,"c":"Music","l":"Suno","t":"Power Metal Opera","d":"Advanced","r":4.7,"p":"Operatic power metal, soprano female vocals, double kicks, neoclassical guitar shredding, symphonic backing, fantasy battle hymn, 165 BPM"},{"id":29,"c":"Music","l":"Suno","t":"Hardstyle Drop","d":"Medium","r":4.6,"p":"Hardstyle, distorted kick, euphoric lead synth, reverse bass, massive festival drop, crowd chant vocals, aggressive and euphoric, 150 BPM"},{"id":30,"c":"Music","l":"Suno","t":"Acoustic Singer-Songwriter","d":"Simple","r":4.8,"p":"Acoustic singer-songwriter, fingerpicked guitar, intimate male vocals, subtle harmonica, minimal production, raw storytelling, 85 BPM"},{"id":31,"c":"Music","l":"Udio","t":"Synthwave Ballad","d":"Advanced","r":4.8,"p":"Genre: Synthwave ballad\nMood: Melancholic, nostalgic\nInstruments: Analog synths, arpeggiator, soft pads, 808 drums\nVocals: Ethereal, reverb-heavy\nTheme: An android reminisces about life beyond the metal cityscape"},{"id":32,"c":"Music","l":"Udio","t":"Space Opera Rock","d":"Advanced","r":4.8,"p":"Genre: Space Opera Rock\nMood: Epic, dramatic, romantic\nInstruments: Distorted guitars, orchestral strings, deep synth bass, cinematic drums\nVocals: Powerful, soaring\nTheme: Star-crossed lovers from warring galactic factions"},{"id":33,"c":"Music","l":"Udio","t":"Gothic Bluegrass","d":"Medium","r":4.6,"p":"Genre: Gothic Bluegrass\nMood: Spooky, foot-stomping\nInstruments: Banjo, fiddle, upright bass, creaking sounds\nVocals: Haunting harmonies\nTheme: Ghostly gathering in abandoned Appalachian town"},{"id":34,"c":"Music","l":"Udio","t":"Epic Pirate Shanty","d":"Medium","r":4.9,"p":"Genre: Epic sea shanty\nMood: Rousing, adventurous\nInstruments: Accordion, fiddle, stomping boots, crowd\nVocals: Powerful male chorus, call and response\nTheme: Setting sail for glory and treasure"},{"id":35,"c":"Music","l":"Udio","t":"Jazz Noir Detective","d":"Advanced","r":4.7,"p":"Genre: Jazz Noir\nMood: Smoky, mysterious\nInstruments: Muted trumpet, brushed snare, upright bass, piano\nVocals: Low, whispered narration\nTheme: Detective follows a lead through rain-soaked midnight alleys"},{"id":36,"c":"Music","l":"Udio","t":"Tropical House","d":"Simple","r":4.8,"p":"Genre: Tropical house\nMood: Blissful, warm\nInstruments: Steel drums, plucked synth, marimba\nVocals: Light, airy\nTheme: Golden hour on a tropical beach"},{"id":37,"c":"Music","l":"Udio","t":"Vaporwave Mall","d":"Medium","r":4.6,"p":"Genre: Vaporwave\nMood: Nostalgic, surreal, liminal\nInstruments: Slowed 80s samples, reverbed sax, detuned pads, VHS artifacts\nTheme: Endless empty shopping mall from 1992"},{"id":38,"c":"Music","l":"Udio","t":"Hyperpop Chaos","d":"Medium","r":4.6,"p":"Genre: Hyperpop\nMood: Chaotic, cute, sugar rush\nInstruments: Pitch-shifted vocals, glitchy 808s, sparkle synths\nVocals: Auto-tuned, high-pitched\nTheme: Internet culture overload"},{"id":39,"c":"Music","l":"Udio","t":"Campfire Folk","d":"Simple","r":4.8,"p":"Genre: Acoustic folk\nMood: Warm, nostalgic\nInstruments: Acoustic guitar, harmonica, foot stomps\nVocals: Raw, honest, raspy\nTheme: Stories around campfire under stars"},{"id":40,"c":"Music","l":"Udio","t":"Bollywood Dance","d":"Medium","r":4.7,"p":"Genre: Modern Bollywood\nMood: Celebratory, romantic\nInstruments: Tabla, dholak, sitar, electronic beats, brass\nVocals: Expressive duet\nTheme: Wedding dance sequence"},{"id":41,"c":"Music","l":"Udio","t":"Industrial Darkwave","d":"Advanced","r":4.6,"p":"Genre: Industrial darkwave\nMood: Oppressive, cold\nInstruments: Metallic percussion, distorted synth bass, factory sounds\nVocals: Processed, robotic\nTheme: Dystopian megacity controlled by machines"},{"id":42,"c":"Music","l":"Udio","t":"Neo-Classical Piano","d":"Simple","r":4.7,"p":"Genre: Neo-classical minimal\nMood: Contemplative, sorrowful\nInstruments: Solo piano, sparse strings\nVocals: None\nTheme: Passage of time in an empty cathedral"},{"id":43,"c":"Music","l":"Udio","t":"Late-Night R&B","d":"Simple","r":4.8,"p":"Late-night R&B with soft electric piano and deep bass. Moody emotional ballad with slow tempo and expressive vocals."},{"id":44,"c":"Music","l":"Udio","t":"Witch House","d":"Advanced","r":4.5,"p":"Genre: Witch house\nMood: Occult, hypnotic\nInstruments: Chopped-and-screwed vocals, trap hi-hats, eerie pads, reversed samples\nVocals: Ghostly processed\nTheme: Occult ritual in abandoned church at 3 AM"},{"id":45,"c":"Music","l":"Udio","t":"Afrofuturistic Funk","d":"Medium","r":4.7,"p":"Genre: Afrofuturistic Funk\nMood: Vibrant, rhythmic\nInstruments: Funky bass, congas, brass stabs, analog synths\nVocals: Energetic, call-and-response\nTheme: Futuristic African city merging tradition with technology"},{"id":46,"c":"Music","l":"Any","t":"Artist-Style Formula","d":"Advanced","r":4.9,"p":"Describe ANY artist's sound without naming them:\n\n[VOCAL TYPE] + [GENRE] + [INSTRUMENT] + [MOOD] + [ERA]\n\nExamples:\n- Confessional pop, catchy hooks, polished, female = Taylor Swift\n- Dark R&B, falsetto, 80s synths, nocturnal = Weeknd\n- Funk-pop, groovy, danceable, charismatic male = Bruno Mars\n- Pop, dark, minimal, breathy female = Billie Eilish\n- Psych rock, dreamy, swirling = Tame Impala\n- Hip-hop, trap, laid-back male, ambient = Drake"},{"id":47,"c":"Music","l":"Any","t":"Song Structure Template","d":"Advanced","r":4.9,"p":"[Intro] (4-8 bars)\n[Verse 1] (intimate)\n[Pre-Chorus] (build tension)\n[Chorus] (powerful hook)\n[Post-Chorus] (instrumental)\n[Verse 2] (deeper)\n[Chorus]\n[Bridge] (new melody, shift)\n[Breakdown] (stripped back)\n[Final Chorus] (key change, max energy)\n[Outro]\n\nTips: Short lines 5-8 words, ABAB rhyme, use (parentheses) for vocal direction like (whispered) or (belting)"},{"id":48,"c":"Music","l":"Any","t":"Lyrics Formula","d":"Medium","r":4.8,"p":"1. THEME: One emotion in 3 words\n2. HOOK: One repeatable phrase\n3. VERSE 1: Set scene\n4. PRE-CHORUS: Tension\n5. CHORUS: Peak + hook\n6. VERSE 2: Complication\n7. BRIDGE: Twist\n8. FINAL CHORUS: Resolution\n\nRules: Show don't tell, sensory details, avoid cliches"},{"id":49,"c":"Music","l":"Any","t":"Vocal Style Keywords","d":"Medium","r":4.8,"p":"Female: breathy, sultry, belting, ethereal, operatic, raspy, angelic, smoky\nMale: deep baritone, falsetto, gravelly, smooth tenor, rap flow, crooning\nDelivery: whispered, shouted, call-and-response, harmonized, melismatic\nProcessing: reverb-heavy, auto-tuned, vocoder, dry, double-tracked, distorted\n\nUse 2-3 per prompt."},{"id":50,"c":"Music","l":"Any","t":"BPM by Genre","d":"Simple","r":4.5,"p":"60-80: Ballads, ambient, lo-fi\n80-100: R&B, hip hop, reggae\n100-120: Pop, funk, indie rock\n120-135: House, techno, dance pop\n135-160: DnB, dubstep, drill\n160-200: Jungle, hardstyle, punk"},{"id":51,"c":"Music","l":"Any","t":"Mood Keywords","d":"Simple","r":4.7,"p":"Dark: menacing, brooding, haunting, ominous\nHappy: euphoric, joyful, sunshine, playful\nSad: melancholic, bittersweet, yearning\nEnergetic: driving, explosive, anthemic\nCalm: serene, meditative, floating\nEpic: cinematic, triumphant, heroic\n\nStack 2: melancholic yet hopeful"},{"id":52,"c":"Music","l":"Any","t":"Instrument Palette","d":"Medium","r":4.6,"p":"Strings: violin, cello, pizzicato\nGuitar: fingerpicking, overdriven, nylon, slide\nKeys: Rhodes, Hammond organ, Wurlitzer, analog synth\nBass: upright, slap, 808, sub bass\nDrums: boom-bap, four-on-the-floor, brushed, blast beats\nElectronic: arpeggiator, pad, acid 303, supersaw\nWorld: sitar, koto, steel pan, djembe, kalimba"},{"id":53,"c":"Music","l":"Any","t":"Genre Blending","d":"Medium","r":4.7,"p":"Combine 2 unlikely genres:\n\nJazz + Trap = melancholic sax over 808s\nBluegrass + Electronic = banjo with synth bass\nClassical + Hip Hop = orchestral strings with boom-bap\nReggae + Shoegaze = dub bass with reverb guitars\nFlamenco + DnB = Spanish guitar with breakbeats"},{"id":54,"c":"Music","l":"Any","t":"Production Styles","d":"Medium","r":4.6,"p":"Vintage: vinyl crackle, tape saturation, analog warmth\nModern: crystal clear, radio-ready, polished\nRaw: garage, unpolished, punk DIY\nCinematic: wide stereo, massive reverb, Dolby feel\nMinimal: sparse, negative space, single instrument\nMaximalist: wall of sound, dense, layered"},{"id":55,"c":"Music","l":"Any","t":"Electronic Sub-Genres","d":"Advanced","r":4.7,"p":"House: deep, tech, progressive, afro, acid (120-130)\nTechno: minimal, acid, industrial, dub (125-150)\nDnB: liquid, neurofunk, jungle (170-180)\nDubstep: brostep, riddim, future bass (140)\nTrance: progressive, psy, uplifting, goa (130-150)\nAmbient: dark, dub, space\nIDM: glitch, braindance\nDowntempo: trip-hop, chillwave (80-110)\nHardstyle: hardcore, gabber (150+)"},{"id":56,"c":"Music","l":"Suno","t":"Suno Negative Prompts","d":"Advanced","r":4.7,"p":"Improve output by specifying what to AVOID:\n\n- no autotune (natural vocals)\n- no electronic drums (organic feel)\n- live band, not programmed\n- male vocals only or female vocals only\n- instrumental only, no vocals\n- no key changes\n- raw, not overproduced\n- no generic stock music feel"},{"id":57,"c":"Music","l":"Suno","t":"Gospel Worship","d":"Medium","r":4.7,"p":"Contemporary gospel worship, choir harmonies, powerful female lead, Hammond B3 organ, piano, clap-along, quiet prayer to celebration, key change in bridge, 95 BPM"},{"id":58,"c":"Music","l":"Suno","t":"Funk Slap Bass","d":"Simple","r":4.8,"p":"Funk, slap bass groove, horn stabs, clavinet, chicken-scratch guitar, tight drums, danceable, Funkadelic energy, 108 BPM"},{"id":59,"c":"Music","l":"Suno","t":"Shoegaze Wall","d":"Medium","r":4.7,"p":"Shoegaze, wall of distorted guitars, buried ethereal vocals, dense reverb, tremolo, dreamy and overwhelming, feedback swells, 92 BPM"},{"id":60,"c":"Music","l":"Suno","t":"Dancehall Riddim","d":"Simple","r":4.7,"p":"Dancehall riddim, bouncy Caribbean rhythm, synth brass stabs, party vibes, tropical bass, sunsh
