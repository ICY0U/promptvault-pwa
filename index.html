essment, non-compete/NDA implications, red flags, questions to ask before signing, negotiation leverage points. [PASTE OFFER]"},{"id":519,"c":"Finance","l":"Any","t":"Invoice Template","d":"Simple","r":4.4,"p":"Professional invoice for [FREELANCE SERVICE]: Company details, client info, line items with descriptions, rates, subtotal, tax, total, payment terms (Net 30), accepted methods, late fee policy, thank you note."},{"id":520,"c":"Finance","l":"Any","t":"Side Income Ideas","d":"Simple","r":4.6,"p":"10 side income ideas based on my skills: [LIST SKILLS]. Per idea: startup cost, time to first dollar, income potential (monthly), difficulty, how to start this week. Ranked: quickest ROI to highest ceiling."},{"id":521,"c":"DevOps","l":"Any","t":"Kubernetes Manifest","d":"Advanced","r":4.5,"p":"K8s manifest for [APPLICATION]: Deployment, Service, Ingress, ConfigMap, Secrets, HPA, PDB. Production-ready: resource limits, health probes, rolling update strategy, pod anti-affinity. Commented YAML."},{"id":522,"c":"DevOps","l":"Any","t":"AWS Architecture Review","d":"Advanced","r":4.6,"p":"Review this AWS architecture for [APPLICATION]: Cost optimization opportunities, security gaps, reliability improvements, scaling strategy, backup/DR plan, monitoring gaps. Well-Architected Framework lens."},{"id":523,"c":"Automation","l":"Any","t":"No-Code App Builder","d":"Medium","r":4.6,"p":"Design a no-code app for [USE CASE] using [Airtable/Notion/Glide/Zapier]. Include: data structure, views/pages, automations, user flow, integration points. Step-by-step build instructions for non-technical user."},{"id":524,"c":"Automation","l":"Any","t":"AI Workflow Chain","d":"Advanced","r":4.7,"p":"Multi-step AI workflow for [TASK]: Step 1 prompt \u2192 output feeds Step 2 \u2192 feeds Step 3. Define: each prompt, expected output format, handoff format, quality check between steps, final deliverable. Tool recommendations per step."},{"id":525,"c":"Automation","l":"Any","t":"Personal Dashboard","d":"Medium","r":4.5,"p":"Design a personal productivity dashboard in [Notion/Obsidian/Sheets]: Daily view (tasks + calendar + habits), weekly review template, goal tracker, project pipeline, reading list, health log. Template structure."},{"id":526,"c":"Flux","l":"Flux","t":"Photorealistic Portrait","d":"Advanced","r":4.9,"p":"A [AGE]-year-old [DESCRIPTION] photographed with a Canon EOS R5, 85mm f/1.2 lens, natural window light, shallow DOF, visible skin texture, catchlight in eyes, editorial quality, 8K resolution"},{"id":527,"c":"Flux","l":"Flux","t":"3D Game Asset","d":"Medium","r":4.8,"p":"3D model of [OBJECT/CHARACTER], full body, front view, game asset, stylized, highly detailed, clean topology, Pixar-quality render, soft studio lighting, white background, turntable-ready"},{"id":528,"c":"Flux","l":"Flux","t":"Food Photography Macro","d":"Medium","r":4.8,"p":"Extreme macro close-up of [DISH], steam rising, warm directional lighting, shallow DOF, visible texture details, condensation drops, professional food styling, overhead angle, dark moody background"},{"id":529,"c":"Flux","l":"Flux","t":"Tattoo Design","d":"Medium","r":4.7,"p":"Tattoo design of [SUBJECT], [STYLE: neo-traditional/minimalist/geometric/Japanese], clean bold outlines, [COLOR/B&W], sized for [BODY PART], detailed line work, symmetrical composition, flash sheet presentation"},{"id":530,"c":"Flux","l":"Flux","t":"Product Mockup","d":"Simple","r":4.7,"p":"Professional product mockup of [ITEM], studio lighting, clean white background, multiple angles, commercial photography, reflective surface, lifestyle context, Amazon listing quality"},{"id":531,"c":"Flux","l":"Flux","t":"Historical Recreation","d":"Advanced","r":4.8,"p":"A photograph from [HISTORICAL EVENT/ERA], authentic period details, correct clothing and architecture, slightly aged film quality, historically accurate lighting, documentary photograph feel, realistic"},{"id":532,"c":"Flux","l":"Flux","t":"Architectural Visualization","d":"Advanced","r":4.7,"p":"Architectural visualization of [BUILDING TYPE], [STYLE: modern/brutalist/organic], golden hour lighting, photorealistic materials, landscaping, human figures for scale, editorial architecture photography"},{"id":533,"c":"Flux","l":"Flux","t":"Fabric Texture Close-Up","d":"Simple","r":4.6,"p":"Ultra-detailed close-up of [FABRIC TYPE] texture, visible weave pattern, soft directional lighting, color-accurate, fashion textile reference, 8K detail, filling entire frame"},{"id":534,"c":"Flux","l":"Flux","t":"Interior Design Scene","d":"Medium","r":4.8,"p":"Interior design of [ROOM TYPE], [STYLE: Scandinavian/mid-century/industrial/japandi], natural light from large windows, plants, styled with decor objects, architectural photography, Dwell magazine quality"},{"id":535,"c":"Flux","l":"Flux","t":"Logo on Mockup","d":"Simple","r":4.7,"p":"Professional brand mockup: [LOGO DESCRIPTION] printed on [SURFACE: business card/t-shirt/storefront/packaging], realistic material texture, ambient lighting, depth of field, presentation-ready"},{"id":536,"c":"Flux","l":"Flux","t":"Fantasy Map","d":"Advanced","r":4.6,"p":"Hand-drawn fantasy map of [WORLD/REGION], aged parchment texture, ink illustrations of mountains and forests, compass rose, decorative cartouche, sea monsters, labeled locations, Tolkien-quality cartography"},{"id":537,"c":"Flux","l":"Flux","t":"Cinematic Film Still","d":"Advanced","r":4.9,"p":"Cinematic film still, [SCENE DESCRIPTION], anamorphic lens flare, 2.39:1 aspect ratio, color graded like [DIRECTOR: Villeneuve/Nolan/Fincher], atmospheric haze, practical lighting, ARRI Alexa quality"},{"id":538,"c":"Research","l":"Gemini","t":"Deep Research Report","d":"Advanced","r":4.9,"p":"Use Deep Research to create a comprehensive report on [TOPIC]. Include: executive summary, key findings with data, emerging trends, expert opinions, contrarian views, actionable recommendations. Cite all sources. 2000+ words."},{"id":539,"c":"Research","l":"Gemini","t":"Video Analysis","d":"Medium","r":4.7,"p":"Analyze this YouTube video [URL/DESCRIPTION]: Key arguments made, evidence quality, speaker credibility, logical fallacies if any, audience reaction analysis, counterpoints missing. Timestamp key moments."},{"id":540,"c":"Research","l":"Gemini","t":"Google Workspace Summary","d":"Simple","r":4.6,"p":"Summarize all my recent Google Docs/Sheets/Slides related to [PROJECT]. Extract: key decisions made, action items, deadlines, open questions, who owns what. Compile into a single status update."},{"id":541,"c":"Coding","l":"Gemini","t":"Code with Gemini 1M Context","d":"Advanced","r":4.8,"p":"I'm sharing my entire codebase. Analyze the full project structure, identify architectural patterns, find inconsistencies across files, suggest refactoring opportunities, and explain the data flow end-to-end. Then: [SPECIFIC TASK]"},{"id":542,"c":"Learning","l":"Gemini","t":"Multimodal Learning Session","d":"Medium","r":4.7,"p":"I'll share images, text, and video about [TOPIC]. After reviewing all materials, create: a study guide connecting all sources, quiz questions testing key concepts, visual concept map, and areas where sources disagree."},{"id":543,"c":"Writing","l":"Gemini","t":"Google Docs Draft + Research","d":"Medium","r":4.6,"p":"Research [TOPIC] using current web sources and draft a [DOCUMENT TYPE] directly. Include: verified facts with inline citations, balanced perspectives, expert quotes, data visualizations described, SEO-optimized structure."},{"id":544,"c":"Business","l":"Gemini","t":"Market Intelligence Brief","d":"Advanced","r":4.7,"p":"Research [INDUSTRY/COMPANY] and deliver: market size and growth rate, key players and market share, recent M&A activity, regulatory changes, technology disruption threats, 3 emerging opportunities. All data sourced and current."},{"id":545,"c":"Data","l":"Gemini","t":"Sheets Formula Wizard","d":"Simple","r":4.5,"p":"Write a Google Sheets formula for [REQUIREMENT]. Explain each function used. Include: the formula, sample data setup, expected output, error handling with IFERROR, and alternative approaches. Test with edge cases."},{"id":546,"c":"Research","l":"Perplexity","t":"Sourced Fact Check","d":"Simple","r":4.8,"p":"Fact-check this claim: [STATEMENT]. Search multiple authoritative sources. Deliver: verdict (true/false/partly true), supporting evidence with citations, context that's often missing, who originally made this claim and why."},{"id":547,"c":"Research","l":"Perplexity","t":"Academic Literature Review","d":"Advanced","r":4.8,"p":"Literature review on [TOPIC]. Find recent peer-reviewed papers. Synthesize: key findings, methodological approaches, consensus view, active debates, research gaps, suggested reading list (10 papers). Cite every source."},{"id":548,"c":"Research","l":"Perplexity","t":"Competitive Intelligence","d":"Medium","r":4.7,"p":"Research [COMPETITOR]: Recent news, product launches, hiring patterns (what roles?), funding/financials, customer sentiment (Reddit/Twitter), tech stack, strategic direction. All sourced. What are they planning next?"},{"id":549,"c":"Research","l":"Perplexity","t":"Current Events Briefing","d":"Simple","r":4.6,"p":"Brief me on [TOPIC/EVENT] as of today. Cover: what happened, key players, timeline, why it matters, different perspectives, what happens next. Cite sources for each claim. Keep it under 500 words."},{"id":550,"c":"Research","l":"Perplexity","t":"Product Comparison Research","d":"Simple","r":4.7,"p":"Compare [PRODUCT A] vs [PRODUCT B] vs [PRODUCT C] for [USE CASE]. Research: pricing, features, reviews, pros/cons from real users, recent updates, best for which user type. Source: Reddit, review sites, official docs."},{"id":551,"c":"Research","l":"Perplexity","t":"Trend Analysis","d":"Medium","r":4.6,"p":"What are the latest trends in [FIELD]? Search across industry reports, news, social media, and expert commentary. Deliver: top 5 trends with evidence, which are hype vs substance, actionable implications for [MY ROLE]."},{"id":552,"c":"Coding","l":"Cursor","t":"Composer Multi-File","d":"Advanced","r":4.9,"p":"Using Composer mode, refactor [DESCRIBE FEATURE] across my codebase. Create/modify multiple files: components, tests, types, utilities. Maintain existing patterns. Run lint after changes. Explain each file touched and why."},{"id":553,"c":"Coding","l":"Cursor","t":"Agent Mode Build Feature","d":"Advanced","r":4.8,"p":"Build [FEATURE] from scratch. Explore my project structure first, understand existing patterns, then: create new files needed, update imports, add types, write tests, handle error states. Follow existing code conventions."},{"id":554,"c":"Coding","l":"Copilot","t":"PR Review Assistant","d":"Medium","r":4.7,"p":"Review this PR for: correctness, edge cases, performance implications, security concerns, test coverage gaps, naming consistency, documentation needs. Suggest specific improvements with code examples."},{"id":555,"c":"Coding","l":"Copilot","t":"Inline Completion Context","d":"Simple","r":4.6,"p":"// Context: [DESCRIBE WHAT THIS CODE DOES]\n// Dependencies: [KEY LIBRARIES]\n// Pattern: [EXISTING PATTERN TO FOLLOW]\n// TODO: [SPECIFIC FUNCTION TO GENERATE]\n\n// Copilot: generate the implementation following the above patterns"},{"id":556,"c":"Coding","l":"Cursor","t":"Debug with Context","d":"Medium","r":4.7,"p":"Bug: [DESCRIBE BUG]. Expected: [X]. Actual: [X]. Relevant files: [LIST]. Read the related code, trace the data flow, identify the root cause (not just symptoms), propose a fix, and explain why this bug existed."},{"id":557,"c":"Coding","l":"Copilot","t":"Test Generator","d":"Medium","r":4.6,"p":"Generate comprehensive tests for [FILE/FUNCTION]: unit tests covering happy path, edge cases, error states, boundary values. Use [FRAMEWORK: Jest/Pytest/etc]. Mock external dependencies. Aim for >90% coverage. Include: setup, teardown, assertions."},{"id":558,"c":"Ideogram","l":"Ideogram","t":"Perfect Text Logo","d":"Simple","r":4.8,"p":"A modern logo design with the text \"[YOUR TEXT]\" in clean typography, [STYLE: minimalist/bold/elegant/playful], [COLOR SCHEME], professional branding, vector-quality, white background"},{"id":559,"c":"Ideogram","l":"Ideogram","t":"Typography Poster","d":"Medium","r":4.8,"p":"Typographic poster with the text \"[QUOTE]\" in [STYLE: Swiss/grunge/retro/neon], creative letterforms, visual hierarchy, [COLOR PALETTE], print-ready quality, A3 format"},{"id":560,"c":"Ideogram","l":"Ideogram","t":"Social Media Quote Card","d":"Simple","r":4.7,"p":"Instagram quote card with text \"[QUOTE]\" by [AUTHOR], aesthetic background, clean modern font, branded colors [X], 1080x1080, engagement-optimized, share-worthy design"},{"id":561,"c":"Ideogram","l":"Ideogram","t":"Event Flyer","d":"Medium","r":4.7,"p":"Event flyer for [EVENT NAME] on [DATE] at [VENUE]. Include: event details text, [THEME/STYLE], eye-catching design, ticket info area, social handles area, print and digital ready"},{"id":562,"c":"Leonardo","l":"Leonardo","t":"Game Environment","d":"Advanced","r":4.7,"p":"Game environment concept art, [SETTING: forest/dungeon/sci-fi station/underwater city], dramatic volumetric lighting, painterly style, perspective depth, props and foliage, game-ready mood board, ArtStation trending"},{"id":563,"c":"Leonardo","l":"Leonardo","t":"Consistent Character Gen","d":"Medium","r":4.8,"p":"Character reference sheet using same seed: [CHARACTER DESCRIPTION], front view + 3/4 view + side view, consistent features across all angles, neutral expression, white background, animation-ready"},{"id":564,"c":"Leonardo","l":"Leonardo","t":"Texture Seamless Tile","d":"Simple","r":4.5,"p":"Seamless tileable texture of [MATERIAL: wood/stone/metal/fabric], 2K resolution, PBR-ready, even lighting, no visible seams when tiled, game/3D asset quality"},{"id":565,"c":"Leonardo","l":"Leonardo","t":"Motion Style Reference","d":"Medium","r":4.6,"p":"Dynamic action pose of [CHARACTER], motion blur on extremities, speed lines, dramatic camera angle, energy effects, comic book dynamism, concept art quality, action figure reference"},{"id":566,"c":"Video","l":"Pika","t":"Text-to-Video Transition","d":"Medium","r":4.7,"p":"Smooth transition: [SCENE A] morphs into [SCENE B]. Seamless metamorphosis, dreamlike quality, consistent lighting throughout, camera slowly pulling back, 4 seconds, cinematic"},{"id":567,"c":"Video","l":"Pika","t":"Lip Sync Music Video","d":"Medium","r":4.6,"p":"[CHARACTER DESCRIPTION] singing to camera, natural lip movement, expressive eyes, [SETTING], professional music video quality, shallow depth of field, emotional delivery, 8 seconds"},{"id":568,"c":"Video","l":"Kling","t":"Action Sequence","d":"Advanced","r":4.7,"p":"Dynamic action sequence: [CHARACTER] performing [ACTION] in [SETTING]. Smooth motion, realistic physics, cinematic camera tracking, 150fps slow motion effect, professional stunt quality, 5 seconds"},{"id":569,"c":"Video","l":"Kling","t":"Product Demo Animation","d":"Medium","r":4.6,"p":"Product demo: [PRODUCT] rotating 360 degrees on pedestal, clean studio lighting, key features highlighted with subtle glow, premium commercial quality, smooth continuous motion, 6 seconds"},{"id":570,"c":"Copywriting","l":"Any","t":"Landing Page Wireframe Copy","d":"Advanced","r":4.9,"p":"Landing page copy for [PRODUCT/SERVICE]: Hero headline (benefit) + subheadline, 3 feature blocks with icons, social proof section, objection handler, pricing anchor, urgency element, primary CTA, secondary CTA. Conversion-optimized."},{"id":571,"c":"Copywriting","l":"Any","t":"Facebook Ad Variations","d":"Medium","r":4.8,"p":"5 Facebook ad variations for [PRODUCT]. Each: headline (40 chars), primary text (125 chars), description (30 chars), CTA button choice. Angles: pain point, benefit, social proof, curiosity, fear of missing out. Target: [AUDIENCE]."},{"id":572,"c":"Copywriting","l":"Any","t":"Google Ads Copy","d":"Medium","r":4.7,"p":"Google Ads for [KEYWORD]: 5 responsive search ad combinations. Headlines (30 chars each x 15), Descriptions (90 chars each x 4). Pin critical headlines to positions 1-2. Include: keyword, benefit, CTA, USP. Quality Score optimized."},{"id":573,"c":"Copywriting","l":"Any","t":"Sales Page Long-Form","d":"Advanced","r":4.8,"p":"Long-form sales page for [OFFER]: PASTOR framework. Problem (agitate), Amplify (consequences), Story (transformation), Testimonial prompts, Offer (stack value), Response (CTA + guarantee + scarcity). 1500+ words."},{"id":574,"c":"Copywriting","l":"Any","t":"Email Subject Lines 20x","d":"Simple","r":4.7,"p":"20 email subject lines for [CAMPAIGN/TOPIC]. Mix: curiosity (5), benefit (5), urgency (3), personalization (3), question (2), number-driven (2). All under 50 chars. Mark predicted open rate: High/Med/Low."},{"id":575,"c":"Copywriting","l":"Any","t":"Value Proposition Canvas","d":"Medium","r":4.7,"p":"Value proposition for [PRODUCT]: Customer segment, jobs-to-be-done (3), pains (3), gains (3). Map to: pain relievers, gain creators, product features. Distill into: 1-sentence value prop, 3-word tagline, elevator pitch."},{"id":576,"c":"Copywriting","l":"Any","t":"Push Notification Copy","d":"Simple","r":4.5,"p":"10 push notifications for [APP]: Re-engagement (3), feature announcement (2), time-sensitive (2), personalized (2), social (1). Each: title (50 chars), body (100 chars), deep link target. High tap-through focus."},{"id":577,"c":"Copywriting","l":"Any","t":"Product Hunt Description","d":"Medium","r":4.7,"p":"Product Hunt listing for [PRODUCT]: Tagline (60 chars), first comment from maker (200 words, authentic), description (3 paragraphs: problem, solution, why now), 5 key features, emoji-enhanced."},{"id":578,"c":"Customer Service","l":"Any","t":"Support Macro Library","d":"Medium","r":4.7,"p":"20 support macros for [PRODUCT/SERVICE] covering: welcome/greeting, common questions (5), troubleshooting (5), billing issues (3), feature requests (2), escalation (2), closing (2). Warm, empathetic, efficient. Personalization tokens: [NAME], [ISSUE]."},{"id":579,"c":"Customer Service","l":"Any","t":"Angry Customer De-Escalation","d":"Medium","r":4.8,"p":"De-escalation scripts for 5 scenarios: billing error, product defect, long wait time, miscommunication, policy disagreement. Each: empathy statement, ownership phrase, solution options (2-3), compensation framework, follow-up promise."},{"id":580,"c":"Customer Service","l":"Any","t":"Chatbot Flow Builder","d":"Advanced","r":4.7,"p":"Chatbot conversation flow for [USE CASE]: Decision tree with 5 main paths, fallback responses, handoff triggers to human, personality guidelines, response templates per node, edge case handling, CSAT survey at end."},{"id":581,"c":"Customer Service","l":"Any","t":"Help Center Article","d":"Simple","r":4.6,"p":"Help center article: [TOPIC]. Structure: title (clear action), overview paragraph, step-by-step instructions with screenshots described, troubleshooting section, related articles, contact support CTA. SEO-friendly, scannable."},{"id":582,"c":"Customer Service","l":"Any","t":"CSAT Survey Design","d":"Simple","r":4.5,"p":"Customer satisfaction survey for [TOUCHPOINT]: 5-7 questions, mix of quantitative (NPS, CSAT, CES) and qualitative (open-ended). Logic branching for detractors. Keep under 2 minutes. Thank you message with next steps."},{"id":583,"c":"Customer Service","l":"Any","t":"Service Recovery Email","d":"Medium","r":4.6,"p":"Service recovery email after [INCIDENT]: Genuine apology (specific, not generic), what happened (transparent), what we're doing to fix it, compensation offered, prevention plan, personal sign-off from [TITLE]. Rebuild trust."},{"id":584,"c":"HR","l":"Any","t":"Job Description Writer","d":"Medium","r":4.8,"p":"Job description for [ROLE] at [COMPANY]: Compelling intro (why join), responsibilities (8-10 bullet), requirements (must-have vs nice-to-have), benefits, salary range, DEI statement. Avoid gendered language. SEO keywords."},{"id":585,"c":"HR","l":"Any","t":"Interview Question Bank","d":"Medium","r":4.7,"p":"Interview questions for [ROLE]: 5 behavioral (STAR format expected), 5 technical, 3 culture fit, 2 situational. Per question: what you're assessing, green flag answers, red flag answers, follow-up probes."},{"id":586,"c":"HR","l":"Any","t":"Candidate Rejection Kind","d":"Simple","r":4.6,"p":"Rejection emails for 3 stages: post-application, post-phone-screen, post-final-round. Each: genuine, specific (not template-feeling), encouraging, preserves relationship for future roles, feedback offering. Under 100 words each."},{"id":587,"c":"HR","l":"Any","t":"Onboarding 30/60/90 Plan","d":"Medium","r":4.7,"p":"Onboarding plan for new [ROLE]: Week 1 (orientation, access, buddy system), Days 1-30 (learn), Days 31-60 (contribute), Days 61-90 (own). Per phase: goals, training, meetings, milestones, manager check-in agenda."},{"id":588,"c":"HR","l":"Any","t":"Employee Handbook Section","d":"Medium","r":4.5,"p":"Employee handbook section on [POLICY: PTO/Remote Work/Code of Conduct/Expense]. Clear, legally sound but readable, examples where helpful, edge cases addressed, FAQ format for common questions. Tone: fair, transparent."},{"id":589,"c":"HR","l":"Any","t":"Team Survey Questions","d":"Simple","r":4.5,"p":"Employee engagement survey: 15 questions covering satisfaction, manager effectiveness, growth opportunities, work-life balance, team collaboration, alignment with mission. Likert scale + 3 open-ended. Anonymous, takes 5 minutes."},{"id":590,"c":"Project Mgmt","l":"Any","t":"Project Charter","d":"Advanced","r":4.7,"p":"Project charter for [PROJECT]: Purpose, objectives (SMART), scope (in/out), stakeholders, risks (5), milestones, budget estimate, success criteria, governance structure, communication plan. One page. Stakeholder-ready."},{"id":591,"c":"Project Mgmt","l":"Any","t":"Sprint Planning Template","d":"Medium","r":4.6,"p":"Sprint planning for [TEAM/PROJECT]: Sprint goal statement, user stories with story points, capacity calculation, dependency identification, risk items, definition of done, carryover from last sprint, stretch goals."},{"id":592,"c":"Project Mgmt","l":"Any","t":"Risk Register","d":"Medium","r":4.5,"p":"Risk register for [PROJECT]: 10 risks. Each: description, probability (1-5), impact (1-5), risk score, owner, mitigation strategy, contingency plan, trigger event, status. Prioritized by risk score. Review cadence."},{"id":593,"c":"Project Mgmt","l":"Any","t":"Stakeholder Update","d":"Simple","r":4.6,"p":"Stakeholder update email for [PROJECT]: Status (Green/Yellow/Red), 3 accomplishments this period, 3 next period priorities, blockers/risks with mitigation, decision needed, budget status. Executive-friendly, under 300 words."},{"id":594,"c":"Project Mgmt","l":"Any","t":"Post-Mortem Template","d":"Medium","r":4.7,"p":"Post-mortem for [INCIDENT/PROJECT]: Timeline of events, root cause analysis (5 Whys), impact assessment, what went well, what went wrong, action items with owners and deadlines, lessons learned, process changes. Blameless."},{"id":595,"c":"Project Mgmt","l":"Any","t":"RACI Matrix Builder","d":"Simple","r":4.5,"p":"RACI matrix for [PROJECT/PROCESS]: List all tasks/deliverables, assign Responsible/Accountable/Consulted/Informed for each stakeholder. Flag: tasks with no Accountable, too many Responsibles. Clean table format."},{"id":596,"c":"Branding","l":"Any","t":"Brand Voice Guide","d":"Advanced","r":4.8,"p":"Brand voice guide for [BRAND]: Personality traits (3 adjectives), tone spectrum (formal\u2194casual), do's and don'ts with examples, vocabulary list (preferred + avoided words), voice comparison chart, sample copy in-voice for: email, social, error message, celebration."},{"id":597,"c":"Branding","l":"Any","t":"Color Palette Strategy","d":"Medium","r":4.7,"p":"Color palette for [BRAND/PROJECT]: Primary, secondary, accent colors with hex codes. Psychology behind each choice. Accessibility contrast ratios. Dark mode variant. Usage rules: backgrounds, text, CTAs, hover states. Mood board description."},{"id":598,"c":"Branding","l":"Any","t":"Naming Workshop","d":"Medium","r":4.8,"p":"Brand name brainstorm for [BUSINESS/PRODUCT]: 20 name options across strategies: descriptive (3), invented (3), metaphor (3), acronym (2), compound (3), foreign word (3), playful (3). Per name: meaning, domain availability check approach, trademark risk."},{"id":599,"c":"Branding","l":"Any","t":"Brand Story Framework","d":"Medium","r":4.7,"p":"Brand story for [COMPANY] using StoryBrand framework: Character (customer), Problem (external + internal + philosophical), Guide (your brand), Plan (3 steps), Call to Action, Success (transformation), Failure (stakes). Website copy application."},{"id":600,"c":"Branding","l":"Any","t":"Social Media Style Guide","d":"Medium","r":4.6,"p":"Social media style guide for [BRAND]: Visual guidelines (filters, layouts, colors), caption tone, hashtag strategy (branded + community + trending), content pillars (5), posting frequency, engagement voice, crisis protocol."},{"id":601,"c":"Branding","l":"Any","t":"Packaging Copy","d":"Simple","r":4.5,"p":"Product packaging copy for [PRODUCT]: Front-of-pack (headline + tagline), back-of-pack (story, ingredients/features, usage instructions), side panels (certifications, contact, social), sustainability message. Character counts per zone."},{"id":602,"c":"Relationships","l":"Any","t":"Difficult Conversation Prep","d":"Medium","r":4.8,"p":"Prep for difficult conversation about [TOPIC] with [PERSON/RELATIONSHIP]. Structure: opening (non-threatening), observation (specific, not judgment), feeling/impact, request/boundary, listen actively, possible responses and how to handle each. Practice script."},{"id":603,"c":"Relationships","l":"Any","t":"Boundary Setting Script","d":"Medium","r":4.7,"p":"Set a boundary with [PERSON] about [ISSUE]. Use: 'When [behavior], I feel [emotion], because [reason]. What I need is [boundary].' 3 versions: gentle, firm, final. Include: what to say if they push back, stay calm strategies."},{"id":604,"c":"Relationships","l":"Any","t":"Thank You Note Writer","d":"Simple","r":4.6,"p":"Heartfelt thank you note to [PERSON] for [WHAT THEY DID]. Be specific about impact, genuine not generic, appropriate length for medium [card/email/text]. 3 versions: professional, warm personal, deeply emotional. Under 100 words each."},{"id":605,"c":"Relationships","l":"Any","t":"Conflict Resolution Guide","d":"Medium","r":4.7,"p":"Resolve conflict between [PARTIES] about [ISSUE]. Framework: 1) Each side's perspective (steelmanned), 2) Underlying needs, 3) Common ground, 4) 3 compromise options, 5) Agreement structure, 6) Check-in schedule. Fair and constructive."},{"id":606,"c":"Relationships","l":"Any","t":"Wedding Toast Writer","d":"Medium","r":4.8,"p":"Wedding toast for [ROLE: best man/maid of honor/parent/friend] for [NAMES]. Include: how you know them, specific story that shows their character, what makes them perfect together, humor (tasteful), heartfelt close, raise glass. 3-4 minutes."},{"id":607,"c":"Relationships","l":"Any","t":"Love Language Translator","d":"Simple","r":4.5,"p":"Translate this message/intention into all 5 love languages:\nOriginal intent: [WHAT YOU WANT TO EXPRESS]\n1. Words of Affirmation\n2. Acts of Service\n3. Receiving Gifts\n4. Quality Time\n5. Physical Touch (suggestions)\nPersonalized for: [PARTNER DESCRIPTION]"},{"id":608,"c":"Science","l":"Claude","t":"Research Paper Outline","d":"Advanced","r":4.8,"p":"Research paper outline for [TOPIC]: Abstract structure, Introduction (gap in literature), Literature Review framework, Methodology (design, sample, analysis), Expected Results, Discussion/Implications, Limitations. APA format. Target journal: [X]."},{"id":609,"c":"Science","l":"Any","t":"Grant Proposal Draft","d":"Advanced","r":4.7,"p":"Grant proposal for [RESEARCH]: Specific Aims page, Significance and Innovation sections, Research Stra 833,"c":"Music","l":"Suno","t":"Video Game Boss Battle","d":"Advanced","r":4.8,"p":"Video game boss battle theme, orchestral with heavy metal guitars, fast tempo, choir chanting, timpani, brass stabs, phase transitions (builds to chaos), 8-bit elements, 160 BPM"},{"id":834,"c":"Music","l":"Suno","t":"Wedding First Dance","d":"Simple","r":4.6,"p":"Romantic first dance song, soft piano intro, acoustic guitar, gentle strings, intimate male vocals, emotional and timeless, not cheesy, elegant and genuine, 72 BPM"},{"id":835,"c":"Music","l":"Suno","t":"Jungle DnB Rewind","d":"Medium","r":4.7,"p":"Jungle drum and bass, chopped amen breaks, deep reese bass, ragga vocal samples, old school rave energy, 1994 pirate radio vibes, heavy sub pressure, 170 BPM"},{"id":836,"c":"Music","l":"Udio","t":"Film Score Tension","d":"Advanced","r":4.7,"p":"Genre: Film score suspense\nMood: Building dread, psychological\nInstruments: Solo cello, prepared piano, reversed strings, sub bass drones, clock ticking\nVocals: None\nTheme: Discovery of a terrible secret, slowly unfolding horror"},{"id":837,"c":"Music","l":"Udio","t":"Lounge Jazz Cocktail","d":"Simple","r":4.6,"p":"Genre: Cocktail lounge jazz\nMood: Sophisticated, relaxed, vintage\nInstruments: Vibraphone, upright bass, brushed drums, muted trumpet\nVocals: Smooth female, intimate\nTheme: Late-night Manhattan hotel bar"},{"id":838,"c":"Coding","l":"Any","t":"WebSocket Real-Time","d":"Advanced","r":4.7,"p":"Implement WebSocket real-time [FEATURE: chat/notifications/live updates] in [STACK]. Include: server setup, client connection, room/channel management, reconnection logic, heartbeat, message queuing, scaling considerations, auth integration."},{"id":839,"c":"Coding","l":"Any","t":"CI/CD Pipeline Config","d":"Advanced","r":4.6,"p":"CI/CD pipeline in [GitHub Actions/GitLab CI/CircleCI] for [PROJECT TYPE]: Lint, test, build, deploy stages. Include: caching, parallelism, environment secrets, branch strategy (dev/staging/prod), rollback trigger, notification hooks. Working YAML."},{"id":840,"c":"Coding","l":"Any","t":"State Management Pattern","d":"Medium","r":4.7,"p":"State management solution for [APP COMPLEXITY] using [TOOL: Redux/Zustand/Jotai/Context/Pinia]: Store structure, actions/mutations, selectors, middleware, async handling, devtools setup, testing strategy, migration guide if refactoring."},{"id":841,"c":"Coding","l":"Any","t":"Responsive Email Template","d":"Medium","r":4.5,"p":"Responsive HTML email template for [PURPOSE: marketing/transactional/newsletter]: Table-based layout (Outlook compatible), inline CSS, mobile responsive, dark mode support, image fallbacks, CTA buttons, tested across Gmail/Outlook/Apple Mail."},{"id":842,"c":"Coding","l":"Any","t":"GraphQL Schema Design","d":"Advanced","r":4.6,"p":"GraphQL schema for [APPLICATION]: Types, queries, mutations, subscriptions, input types, enums, interfaces. Include: pagination (cursor-based), error handling, authentication directives, N+1 prevention with DataLoader, schema documentation."},{"id":843,"c":"Coding","l":"Any","t":"Cron Job Manager","d":"Medium","r":4.5,"p":"Cron job system for [USE CASES]: Job definitions, schedule syntax, retry logic, failure alerting, logging, dead letter queue, concurrent execution prevention, health dashboard, graceful shutdown, timezone handling. In [LANGUAGE/FRAMEWORK]."},{"id":844,"c":"Coding","l":"Any","t":"Feature Flag System","d":"Medium","r":4.6,"p":"Feature flag implementation in [FRAMEWORK]: Flag types (boolean, percentage, user-segment), storage (config/DB/service), SDK design, gradual rollout strategy, A/B test integration, kill switch, cleanup process for old flags, dashboard concept."},{"id":845,"c":"Coding","l":"Any","t":"Accessibility Implementation","d":"Medium","r":4.7,"p":"Accessibility implementation for [COMPONENT/PAGE]: WCAG 2.1 AA compliance, ARIA labels/roles, keyboard navigation, focus management, screen reader testing approach, color contrast verification, skip navigation, form error handling, automated test setup."},{"id":846,"c":"Writing","l":"Any","t":"Brand Manifesto","d":"Advanced","r":4.8,"p":"Brand manifesto for [BRAND]: 300-500 words. Not a mission statement \u2014 a rallying cry. Structure: The world as it is (tension), what we believe (conviction), what we're building (vision), who it's for (tribe), the invitation (join us). Emotionally stirring."},{"id":847,"c":"Writing","l":"Any","t":"Product Changelog","d":"Simple","r":4.5,"p":"Product changelog for [UPDATE]: New features with benefit-focused descriptions (not just what, but why), improvements, bug fixes. Emojis optional. 3 versions: developer-facing (technical), customer-facing (friendly), marketing (exciting)."},{"id":848,"c":"Writing","l":"Any","t":"FAQ Page Writer","d":"Simple","r":4.6,"p":"FAQ page for [PRODUCT/SERVICE]: 20 questions organized by theme. Each answer: clear, concise, helpful. Anticipate the question behind the question. Include: schema markup structure, search-friendly, personality in voice, links to detailed docs."},{"id":849,"c":"Writing","l":"Any","t":"Executive Summary","d":"Medium","r":4.7,"p":"Executive summary for [REPORT/PROPOSAL]: Situation, approach, findings, recommendation, next steps. Under 1 page. Written for C-suite (busy, skeptical, needs the 'so what'). Lead with the conclusion. Support with 3 key data points."},{"id":850,"c":"Writing","l":"Any","t":"White Paper Outline","d":"Advanced","r":4.7,"p":"White paper for [TOPIC]: Title + subtitle, executive summary, problem statement with data, solution framework (your approach), methodology, case study/results, implementation guide, conclusion, about the company. 3000-5000 word target. Lead gen optimized."},{"id":851,"c":"Writing","l":"Any","t":"Press Release Template","d":"Medium","r":4.6,"p":"Press release for [NEWS]: Headline (action-oriented), subheadline, dateline, lead paragraph (who/what/when/where/why), 2 body paragraphs, executive quote, supporting data, boilerplate, media contact. AP style. Under 500 words."},{"id":852,"c":"Writing","l":"Any","t":"Rejection Letter Graceful","d":"Simple","r":4.5,"p":"Graceful rejection for [CONTEXT: vendor proposal/partnership request/job applicant/speaking invitation]: Acknowledge specifically what you appreciated, clear but kind decline, keep door open if appropriate, offer alternative if possible. Respectful, brief."},{"id":853,"c":"Writing","l":"Any","t":"Onboarding Documentation","d":"Medium","r":4.6,"p":"Onboarding doc for new team member joining [TEAM/ROLE]: Welcome message, team overview, key people (who does what), tools and access needed, first-week checklist, glossary of internal terms, cultural norms, FAQ, 'things I wish I knew' section."},{"id":854,"c":"ChatGPT Image","l":"ChatGPT","t":"Pet Portrait Painting","d":"Simple","r":4.8,"p":"Create a royal portrait painting of [PET DESCRIPTION] dressed as [HISTORICAL FIGURE: king/queen/general/renaissance noble]. Oil painting style, ornate gold frame visible, dignified expression, classical art quality. Humorous but high quality."},{"id":855,"c":"ChatGPT Image","l":"ChatGPT","t":"Pixel Art Avatar","d":"Simple","r":4.6,"p":"Create a pixel art avatar of [DESCRIPTION]: 32x32 style but rendered large, retro gaming aesthetic, limited color palette, recognizable features simplified to pixels, suitable for profile picture. [BACKGROUND COLOR]."},{"id":856,"c":"ChatGPT Image","l":"ChatGPT","t":"Architectural Floor Plan","d":"Medium","r":4.5,"p":"Create a top-down architectural floor plan for [SPACE: apartment/office/cafe]: Clean line drawing style, room labels, furniture placement indicated, dimensions suggested, professional blueprint aesthetic, white background."},{"id":857,"c":"ChatGPT Image","l":"ChatGPT","t":"Comic Strip 4-Panel","d":"Medium","r":4.7,"p":"Create a 4-panel comic strip about [SCENARIO]. Consistent character design across panels, clear visual storytelling, speech bubble areas, punchline in final panel, [STYLE: manga/western/webcomic/newspaper], expressive characters."},{"id":858,"c":"Video","l":"Sora","t":"Drone Nature Flyover","d":"Medium","r":4.8,"p":"Aerial drone shot: sweeping flyover of [LANDSCAPE: mountain range/coastline/forest canopy/desert dunes], golden hour, smooth slow movement, revealing scale, cinematic grade, National Geographic quality, 8 seconds."},{"id":859,"c":"Video","l":"Sora","t":"Fashion Runway Walk","d":"Medium","r":4.6,"p":"Fashion model [DESCRIPTION] walking runway, [OUTFIT DESCRIPTION], confident stride, camera tracking alongside, bokeh audience in background, studio lighting, slow motion moments, editorial fashion film quality, 6 seconds."},{"id":860,"c":"Video","l":"Runway","t":"Style Transfer Scene","d":"Medium","r":4.7,"p":"Transform this real-world scene into [STYLE: watercolor painting/cyberpunk/anime/oil painting]: Maintain original composition and movement, apply style consistently across frames, smooth temporal coherence, artistic quality."},{"id":861,"c":"Video","l":"Sora","t":"Logo Reveal Animation","d":"Simple","r":4.6,"p":"Logo reveal animation: [DESCRIBE LOGO] materializes through [EFFECT: particles assembling/liquid metal forming/light painting/smoke clearing], elegant motion, clean background, premium brand feel, 4 seconds."},{"id":862,"c":"Video","l":"Kling","t":"Pet Playing Slow-Mo","d":"Simple","r":4.7,"p":"[PET DESCRIPTION] playing with [TOY/OBJECT] in slow motion, fur detail visible, joyful expression, natural daylight, shallow DOF, heartwarming, social media viral quality, 5 seconds"},{"id":863,"c":"Video","l":"Pika","t":"Weather Transition","d":"Medium","r":4.5,"p":"Landscape time-lapse: [SCENE] transitions from [WEATHER A: sunny] to [WEATHER B: stormy]. Clouds rolling in, lighting shifting, atmosphere changing, dramatic mood shift, seamless natural progression, 8 seconds."},{"id":864,"c":"Social Media","l":"Any","t":"Viral Hook Database","d":"Simple","r":4.8,"p":"30 viral hook formulas for [NICHE]. Categories: Controversy ('Hot take:'), Curiosity ('I spent 100 hours...'), Contrarian ('Stop doing X'), Story ('I went from X to Y'), List ('7 things...'), Challenge ('Try this for 30 days'). Fill in for [TOPIC]."},{"id":865,"c":"Social Media","l":"Any","t":"Monthly Content Calendar","d":"Medium","r":4.7,"p":"30-day social media content calendar for [BRAND/NICHE]: Content pillars mapped to days, mix of formats (photo/video/carousel/story/reel), caption themes, hashtag sets per pillar, engagement prompts, trending audio suggestions, batch creation schedule."},{"id":866,"c":"Social Media","l":"Any","t":"Influencer Media Kit","d":"Medium","r":4.6,"p":"Media kit for [CREATOR/INFLUENCER]: Bio + niche, audience demographics (age, location, interests), platform stats, engagement rates, content examples described, collaboration types offered, rate card, past brand partnerships, testimonials, contact."},{"id":867,"c":"Social Media","l":"Any","t":"Crisis Social Media Response","d":"Medium","r":4.5,"p":"Social media crisis response plan for [SCENARIO]: Initial acknowledgment post (within 1hr), holding statement, full response, FAQ for comments, employee social media guidance, monitoring keywords, timeline for updates, post-crisis analysis template."},{"id":868,"c":"Data","l":"Any","t":"Dashboard Design Spec","d":"Medium","r":4.7,"p":"Dashboard specification for [AUDIENCE: exec/ops/product]: 5-7 key metrics with visualization type, filter controls, drill-down paths, refresh frequency, alert thresholds, mobile view simplification, tool recommendation [Tableau/Looker/Metabase/custom]."},{"id":869,"c":"Data","l":"Any","t":"ETL Pipeline Design","d":"Advanced","r":4.6,"p":"ETL pipeline for [DATA SOURCE] \u2192 [DESTINATION]: Extract method, transformation rules, data quality checks, scheduling, error handling, incremental vs full load, schema evolution strategy, monitoring, documentation. In [TOOL: Airflow/dbt/custom]."},{"id":870,"c":"Data","l":"Any","t":"A/B Test Analysis","d":"Medium","r":4.6,"p":"Analyze this A/B test: Control [X] vs Variant [X], metric [X], sample size [X], duration [X]. Calculate: conversion rate per group, statistical significance, confidence interval, effect size, practical significance, recommendation, next test suggestion."},{"id":871,"c":"Data","l":"Any","t":"Customer Segmentation","d":"Advanced","r":4.6,"p":"Customer segmentation for [BUSINESS]: Segmentation variables (behavioral, demographic, psychographic), methodology (RFM/clustering/rule-based), segment profiles (4-6 segments), naming, size estimation, marketing strategy per segment, data requirements."},{"id":872,"c":"Learning","l":"Any","t":"Feynman Technique","d":"Simple","r":4.8,"p":"Teach me [TOPIC] using the Feynman Technique: Explain it like I'm 12. Where you can't simplify, identify the gap. Then fill that gap. Then simplify again. Use everyday analogies. Test my understanding with 3 questions. No jargon allowed."},{"id":873,"c":"Learning","l":"Any","t":"Spaced Repetition Cards","d":"Simple","r":4.6,"p":"Create 20 spaced repetition flashcards for [TOPIC]. Front: question or prompt. Back: concise answer + mnemonic if helpful. Include: 5 basic recall, 8 understanding, 5 application, 2 analysis. Anki-importable format (front;back)."},{"id":874,"c":"Learning","l":"Any","t":"Book Summary Framework","d":"Medium","r":4.7,"p":"Summary framework for [BOOK TITLE]: Core thesis (1 sentence), 3 key arguments with supporting evidence, most counterintuitive insight, practical applications (3), who should read it, who shouldn't, best quote, what the author got wrong."},{"id":875,"c":"Learning","l":"Any","t":"Skill Acquisition Roadmap","d":"Medium","r":4.7,"p":"Roadmap to learn [SKILL] from zero to competent. Phase 1 (week 1-2): fundamentals. Phase 2 (week 3-6): practice. Phase 3 (week 7-12): projects. Per phase: specific resources (free + paid), daily time commitment, milestones, common plateaus and how to break through."},{"id":876,"c":"Business","l":"Any","t":"Lean Canvas One-Pager","d":"Medium","r":4.7,"p":"Lean Canvas for [BUSINESS IDEA]: Problem (top 3), Customer Segments, Unique Value Proposition, Solution, Channels, Revenue Streams, Cost Structure, Key Metrics, Unfair Advantage. One-page format. Honest assessment, not optimistic fantasy."},{"id":877,"c":"Business","l":"Any","t":"SOW / Scope of Work","d":"Medium","r":4.6,"p":"Scope of Work for [PROJECT]: Project overview, deliverables (specific and measurable), timeline with milestones, acceptance criteria, assumptions, exclusions, change order process, payment schedule tied to milestones, signatures."},{"id":878,"c":"Business","l":"Any","t":"Competitive Moat Analysis","d":"Advanced","r":4.7,"p":"Competitive moat analysis for [COMPANY/PRODUCT]: Network effects, switching costs, brand strength, cost advantages, intangible assets, scale economies. Rate each 1-10. Overall moat: wide/narrow/none. Biggest threat to each moat. Strengthening strategy."},{"id":879,"c":"Business","l":"Any","t":"OKR Writing Workshop","d":"Medium","r":4.6,"p":"Write OKRs for [TEAM/COMPANY] this quarter. 3 Objectives (inspiring, qualitative). Per objective: 3-5 Key Results (measurable, time-bound, ambitious but achievable). Scoring rubric (0.0-1.0). Common OKR mistakes to avoid. Alignment check with company OKRs."},{"id":880,"c":"Marketing","l":"Any","t":"Customer Journey Map","d":"Advanced","r":4.8,"p":"Customer journey map for [PRODUCT]: Stages (awareness\u2192consideration\u2192purchase\u2192onboarding\u2192retention\u2192advocacy). Per stage: customer actions, thoughts/feelings, touchpoints, pain points, opportunities, metrics, team responsible. Emotional curve plotted."},{"id":881,"c":"Marketing","l":"Any","t":"Brand Positioning Statement","d":"Medium","r":4.7,"p":"Positioning statement for [BRAND]: For [target audience] who [need], [brand] is the [category] that [key benefit] because [reasons to believe]. 3 versions: internal strategy, external tagline, elevator pitch. Competitive positioning map described."},{"id":882,"c":"Marketing","l":"Any","t":"Content Audit Checklist","d":"Medium","r":4.5,"p":"Content audit for [SITE]: Inventory all content, categorize (evergreen/seasonal/outdated), traffic + engagement data per piece, SEO assessment, update/keep/merge/delete recommendation, content gap identification, republishing calendar."},{"id":883,"c":"Marketing","l":"Any","t":"Growth Loop Design","d":"Advanced","r":4.6,"p":"Growth loop for [PRODUCT]: Identify natural viral/content/paid loops. Map: input \u2192 action \u2192 output \u2192 reinvestment. Metric at each step, conversion rate targets, how to accelerate the loop, compounding effect projection, experiment backlog."},{"id":884,"c":"Negotiation","l":"Any","t":"Salary Negotiation Script","d":"Medium","r":4.9,"p":"Salary negotiation for [ROLE] offered [AMOUNT], target [AMOUNT]. Script: gratitude opening, market data reference, value articulation (3 achievements), counter-offer delivery, silence technique, handling 'that's our best offer', walk-away line, acceptance script."},{"id":885,"c":"Negotiation","l":"Any","t":"Vendor Contract Negotiation","d":"Advanced","r":4.7,"p":"Negotiation strategy for [VENDOR CONTRACT]: Key terms to negotiate (price, payment terms, SLA, termination, liability cap, auto-renewal), BATNA identification, opening position vs walk-away, concession strategy, email templates for each round."},{"id":886,"c":"Negotiation","l":"Any","t":"Freelance Rate Pushback","d":"Simple","r":4.7,"p":"Scripts for when a client pushes back on your rate of [RATE]: 5 responses for different pushback types: 'too expensive', 'our budget is X', 'other freelancers charge less', 'can you do a discount for ongoing work', 'we're a startup'. Firm but relationship-preserving."},{"id":887,"c":"Negotiation","l":"Any","t":"Win-Win Deal Structure","d":"Medium","r":4.6,"p":"Structure a win-win deal for [NEGOTIATION CONTEXT]: Both parties' interests mapped, creative options that expand the pie (not just split it), package deals, contingent agreements, relationship-building elements, implementation commitments, review triggers."},{"id":888,"c":"Philosophy","l":"Any","t":"Ethical Decision Framework","d":"Medium","r":4.7,"p":"Analyze [DILEMMA] through 4 ethical lenses: Utilitarian (greatest good), Deontological (duty-based), Virtue Ethics (character), Care Ethics (relationships). Each lens: conclusion, strongest argument, weakness. Synthesis: what would a thoughtful person do?"},{"id":889,"c":"Philosophy","l":"Any","t":"Thought Experiment Builder","d":"Medium","r":4.6,"p":"Build a thought experiment about [CONCEPT]: Setup (simple scenario), initial intuition, complication (add a twist), revised intuition, further twist, philosophical principle revealed. In the style of: trolley problem, experience machine, veil of ignorance."},{"id":890,"c":"Philosophy","l":"Any","t":"Steelman Any Argument","d":"Medium","r":4.8,"p":"Steelman the strongest possible version of this argument: [POSITION]. Rules: no strawmanning, assume the smartest proponent, fill logical gaps charitably, add evidence they'd cite, acknowledge what they get right. Then: where does even the strongest version fail?"},{"id":891,"c":"Philosophy","l":"Any","t":"Stoic Daily Practice","d":"Simple","r":4.6,"p":"Stoic practice guide for [SITUATION/CHALLENGE]: Morning premeditatio malorum, relevant Marcus Aurelius / Epictetus / Seneca principle, reframe exercise, evening reflection questions, dichotomy of control applied, specific journaling prompt. Practical, not preachy."},{"id":892,"c":"Automotive","l":"Any","t":"Used Car Inspection","d":"Simple","r":4.6,"p":"Used car inspection checklist for [MAKE/MODEL/YEAR]: Exterior check (20 points), interior (15 points), mechanical (20 points), test drive protocol (10 checks), document verification, red flags that mean walk away, fair price research approach, negotiation tips."},{"id":893,"c":"Automotive","l":"Any","t":"Car Comparison Matrix","d":"Medium","r":4.5,"p":"Compare [CAR A] vs [CAR B] vs [CAR C] for [USE CASE]: Price, fuel/energy cost, reliability rating, insurance estimate, resale value, cargo space, tech features, safety ratings, ownership cost over 5 years, test drive checklist per model. Decision framework."},{"id":894,"c":"Automotive","l":"Any","t":"Road Trip Car Prep","d":"Simple","r":4.4,"p":"Pre-road-trip car prep for [VEHICLE], [DISTANCE] trip: Mechanical checklist (fluids, tires, brakes, belts), emergency kit contents, documentation to bring, app recommendations, fuel/charging strategy, maintenance schedule after return."},{"id":895,"c":"Automotive","l":"Any","t":"EV Buying Guide","d":"Medium","r":4.5,"p":"EV buying guide for [NEEDS: commute distance, budget, family size]: Range requirements calculation, charging setup (home L2 vs public network), total cost of ownership vs ICE, tax incentives, top 3 recommendations with pros/cons, winter range impact."},{"id":896,"c":"Prompting","l":"Any","t":"Constitutional AI Prompt","d":"Advanced","r":4.7,"p":"Create a self-correcting prompt for [TASK]: Initial instruction, then a 'constitution' of rules the AI must check its output against before delivering. Rules for: accuracy, tone, completeness, bias, format. AI re-evaluates and revises before final output."},{"id":897,"c":"Prompting","l":"Any","t":"Recursive Summarization","d":"Medium","r":4.6,"p":"Recursive summarization for [LONG CONTENT]: Step 1: Summarize each section in 3 sentences. Step 2: Summarize all section summaries into 1 paragraph. Step 3: Summarize that into 1 sentence. Step 4: Extract the 3 most important takeaways. Lossless compression."},{"id":898,"c":"Prompting","l":"Any","t":"Role + Audience + Format","d":"Simple","r":4.8,"p":"The RAF framework for any prompt:\n\nRole: 'You are a [EXPERT TYPE] with [X] years experience in [FIELD]'\nAudience: 'Writing for [WHO], who [CONTEXT/LEVEL]'\nFormat: 'Deliver as [FORMAT] with [STRUCTURE]'\n\nApply to: [YOUR TASK]"},{"id":899,"c":"Prompting","l":"Any","t":"Iterative Refinement Chain","d":"Advanced","r":4.7,"p":"Multi-pass refinement for [OUTPUT TYPE]:\nPass 1: Generate initial draft (quantity over quality)\nPass 2: Critique \u2014 identify 5 weaknesses\nPass 3: Rewrite addressing each weakness\nPass 4: Polish for [AUDIENCE]\nPass 5: Final QA check against [CRITERIA]"},{"id":900,"c":"Prompting","l":"Any","t":"Structured Output Schema","d":"Medium","r":4.6,"p":"Force structured output for [TASK]. Provide:\n\n```json\n{\n  \"field1\": \"description of what goes here\",\n  \"field2\": [\"array\", \"of\", \"items\"],\n  \"field3\": {\"nested\": \"object\"}\n}\n```\n\nRespond ONLY with valid JSON matching this schema. No markdown, no preamble."},{"id":901,"c":"Prompting","l":"Claude","t":"Claude Extended Thinking","d":"Advanced","r":4.9,"p":"For this complex task, use extended thinking:\n\n<instructions>\nThink step-by-step through [PROBLEM]. Consider: edge cases, assumptions to question, alternative approaches, potential errors in your reasoning. Show your work before giving the final answer.\n</instructions>\n\n[YOUR COMPLEX QUESTION]"},{"id":902,"c":"Creative","l":"Any","t":"Heist Plot Generator","d":"Medium","r":4.8,"p":"Plan a heist story: The target [WHAT TO STEAL], the location [WHERE], the team (5 specialists with roles), the plan (3 phases), the complication (what goes wrong), the twist (not what you expect), the aftermath. Ocean's Eleven meets [YOUR TWIST]."},{"id":903,"c":"Creative","l":"Any","t":"Unreliable Narrator","d":"Advanced","r":4.7,"p":"Write a scene from an unreliable narrator about [EVENT]. Include: what they claim happened, subtle clues that contradict their version (3), details they suspiciously skip, their self-justification, and a final line that makes the reader question everything."},{"id":904,"c":"Creative","l":"Any","t":"Six-Word Story Collection","d":"Simple","r":4.6,"p":"Write 10 six-word stories (Hemingway style) for these themes: [THEMES]. Each must tell a complete story with emotional weight in exactly six words. Then: rank them from most to least impactful with brief analysis of why the best one works."},{"id":905,"c":"Creative","l":"Any","t":"Anthology Pitch Pack","d":"Medium","r":4.5,"p":"Short story anthology concept: [THEME]. Title, 8 story pitches (title + 2-sentence premise each), why these stories belong together, tonal range (lightest to darkest), opening story and closing story rationale, foreword concept, target audience."},{"id":906,"c":"Creative","l":"Any","t":"Mythology Creator","d":"Advanced","r":4.7,"p":"Create an original mythology for [CIVILIZATION/WORLD]: Creation myth, pantheon (5 gods with domains, symbols, rivalries), origin of death, flood/apocalypse myth, hero's journey tale, moral fable, prophecy of the future. Internally consistent logic."},{"id":907,"c":"Creative","l":"Any","t":"Character Voice Bank","d":"Medium","r":4.6,"p":"Create distinct voices for 5 characters in [STORY/GENRE]: Per character: speech patterns, vocabulary level, sentence length tendency, verbal tics, what they talk about vs avoid, how they express emotion, sample dialogue (same scene, 5 different characters)."},{"id":908,"c":"Personal","l":"Any","t":"Life Audit Template","d":"Medium","r":4.7,"p":"Life audit across 8 areas: Health, Relationships, Career, Finance, Growth, Fun, Environment, Spirituality. Per area: rate 1-10, what's working, what's not, one change that would move the needle most. Then: top 3 priorities for next quarter. Honest, compassionate."},{"id":909,"c":"Personal","l":"Any","t":"Decision Journal Entry","d":"Simple","r":4.6,"p":"Decision journal for [DECISION]: Date, the decision and context, options considered (3+), what I chose and why, what I expect to happen, confidence level (%), emotions influencing me, what would change my mind, review date. Prevents hindsight bias."},{"id":910,"c":"Personal","l":"Any","t":"Annual Review & Planning","d":"Advanced","r":4.7,"p":"Annual review for [YEAR]: Wins (professional + personal), lessons learned (5), relationships nurtured, books/content that shaped me, habits that stuck, biggest surprise, biggest disappointment, what I'd tell January-me. Next year: theme word, 3 goals, 1 fear to face."},{"id":911,"c":"Personal","l":"Any","t":"Values Identification Exercise","d":"Medium","r":4.6,"p":"Help me identify my core values: 10 scenario-based questions revealing what I truly prioritize, rank elimination exercise (from 20 values to top 5), test each against recent decisions, articulate each value in my own words, create a values-based decision filter."},{"id":912,"c":"Education","l":"Any","t":"Rubric Generator","d":"Medium","r":4.6,"p":"Assessment rubric for [ASSIGNMENT] in [SUBJECT], grade [X]: 4 performance levels (exceeds/meets/approaching/below), 5 criteria relevant to this assignment, specific descriptions per cell (not vague), point values, student-friendly language version."},{"id":913,"c":"Education","l":"Any","t":"IEP Goal Writer","d":"Medium","r":4.5,"p":"IEP goals for student with [NEEDS] in [SUBJECT/AREA]: 3 annual goals (measurable, achievable), short-term objectives per goal (3), measurement methods, baseline data format, progress monitoring schedule, accommodations list, specially designed instruction."},{"id":914,"c":"Education","l":"Any","t":"Parent Communication","d":"Simple","r":4.5,"p":"Parent communication for [SITUATION: academic concern/behavior/positive progress/conference prep]: Email template that's professional yet warm, specific examples, partnership language, action steps for home and school, follow-up plan. Avoids blame."},{"id":915,"c":"Education","l":"Any","t":"Lesson Plan 5E Model","d":"Medium","r":4.6,"p":"Lesson plan using 5E model for [TOPIC], grade [X]: Engage (hook activity), Explore (hands-on investigation), Explain (direct instruction), Elaborate (application), Evaluate (assessment). Standards aligned to [STATE/COMMON CORE]. Materials, timing, differentiation."},{"id":916,"c":"Health","l":"Any","t":"Symptom Journal Template","d":"Simple","r":4.5,"p":"Symptom tracking journal for [CONDITION/CONCERN]: Daily log (pain scale, location, triggers, duration, relief methods, sleep quality, diet notes, stress level, medications taken). Weekly pattern summary. Doctor visit preparation checklist with data to bring."},{"id":917,"c":"Health","l":"Any","t":"Second Opinion Prep","d":"Medium","r":4.6,"p":"Prepare for a medical second opinion about [CONDITION/DIAGNOSIS]: Questions to ask, records to gather, how to organize your medical history, what to compare between opinions, red flags in either assessment, how to make the final decision, emotional preparation."},{"id":918,"c":"Health","l":"Any","t":"Caregiver Resource Plan","d":"Medium","r":4.5,"p":"Caregiver resource plan for [CARING FOR WHOM/CONDITION]: Daily care schedule, medication management, appointment tracking, self-care for the caregiver, respite care options, support groups, financial resources, legal documents needed, burnout warning signs."},{"id":919,"c":"Health","l":"Any","t":"Nutrition Label Decoder","d":"Simple","r":4.4,"p":"Decode nutrition labels for [DIETARY GOAL: heart health/diabetes management/weight loss/sports performance]: Key numbers to check first, ingredient red flags, marketing claims vs reality, comparison shopping strategy, 5 swaps for common products."},{"id":920,"c":"Legal","l":"Any","t":"NDA Template Guide","d":"Medium","r":4.5,"p":"NDA review checklist for [CONTEXT: employment/partnership/vendor]: Key clauses to look for, reasonable vs overreaching terms, duration considerations, carve-outs needed, mutual vs one-way, what to negotiate, red flags to refuse. Educational framework \u2014 consult a lawyer."},{"id":921,"c":"Legal","l":"Any","t":"Terms of Service Outline","d":"Medium","r":4.4,"p":"Terms of Service outline for [PRODUCT/SERVICE]: Essential sections (acceptance, user conduct, IP rights, limitation of liability, termination, disputes, privacy reference, modifications), plain-language principles, accessibility. Framework only \u2014 requires legal review."},{"id":922,"c":"Legal","l":
