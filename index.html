: Tweet-length summary, key findings, methodology (plain English), limitations, implications, further questions."},{"id":208,"c":"Learning","l":"Any","t":"ELI5 vs Expert","d":"Simple","r":4.7,"p":"Explain [TOPIC] at two levels: ELI5 (simple, analogies) and Expert (proper terminology, current research). Then: 3 most important takeaways."},{"id":209,"c":"Learning","l":"Any","t":"Concept Map Builder","d":"Medium","r":4.6,"p":"Concept map for [TOPIC]: Central concept, 5-7 branches, sub-concepts. Show relationships and dependencies. Suggest learning order. ASCII diagram."},{"id":210,"c":"Learning","l":"Any","t":"Skill Acquisition Plan","d":"Medium","r":4.7,"p":"30-day plan to learn [SKILL]. Daily objectives, weekly milestones, resources (free), practice exercises, assessment method. Beginner to intermediate."},{"id":211,"c":"Productivity","l":"Any","t":"Decision Matrix","d":"Medium","r":4.7,"p":"Decide [OPTIONS]: 5-7 criteria, weight each (total 100%), score 1-10, weighted totals, winner + runner-up, deal-breakers, devil's advocate."},{"id":212,"c":"Productivity","l":"Any","t":"Meeting to Actions","d":"Simple","r":4.8,"p":"Convert notes to actions: Summary (3 sentences), decisions, table (Task|Owner|Deadline|Priority), open questions, next agenda. [PASTE NOTES]"},{"id":213,"c":"Productivity","l":"Any","t":"SOP Writer","d":"Medium","r":4.7,"p":"SOP for [PROCESS]: Purpose, scope, prerequisites, numbered steps, decision points, checklist, troubleshooting. Time estimates."},{"id":214,"c":"Productivity","l":"Any","t":"SMART Goals","d":"Simple","r":4.5,"p":"SMART plan for [GOAL] by [DEADLINE]. Sub-goals, weekly milestones, daily habits, obstacles + contingencies, accountability system."},{"id":215,"c":"Productivity","l":"Any","t":"Weekly Planner","d":"Simple","r":4.6,"p":"Weekly plan template: Top 3 priorities, energy-based task assignment (high/medium/low), time blocks, buffer periods, weekly review questions."},{"id":216,"c":"Productivity","l":"Any","t":"Project Scope Doc","d":"Advanced","r":4.6,"p":"Scope for [PROJECT]: Objectives, deliverables, assumptions, constraints, timeline, success criteria, out-of-scope items, stakeholders, risks."},{"id":217,"c":"Creative","l":"Claude","t":"World Builder","d":"Advanced","r":4.9,"p":"Fantasy world. Ask 5 Qs first: Geography (3 regions), cultures (2 civilizations), magic system (rules + costs), history (3 events), central conflict. Sensory details."},{"id":218,"c":"Creative","l":"ChatGPT","t":"D&D Character","d":"Medium","r":4.8,"p":"RPG character: Name, backstory (200 words), traits/flaws, stats, equipment, 3 quirks, arc suggestion, party hooks. Class: [X]. Race: [X]."},{"id":219,"c":"Creative","l":"Any","t":"Brand Name Gen 20","d":"Simple","r":4.5,"p":"20 names for [BUSINESS]. Per name: name, type, why it works, domain likelihood. Groups: 5 abstract, 5 descriptive, 5 metaphor, 5 compound."},{"id":220,"c":"Creative","l":"Any","t":"Podcast Planner","d":"Medium","r":4.6,"p":"Podcast [TOPIC], [TYPE], [MIN]. Title, description, cold open, segments + timestamps, talking points, interview Qs, show notes."},{"id":221,"c":"Creative","l":"Any","t":"Short Film Script","d":"Advanced","r":4.7,"p":"5-min short film: Logline, 3-act structure, character descriptions, scene breakdowns with visual notes, dialogue samples. Genre: [X]. Budget: low."},{"id":222,"c":"Creative","l":"Any","t":"Song Lyrics Writer","d":"Medium","r":4.7,"p":"Lyrics for [GENRE] about [THEME]. Verse/chorus/bridge structure. Rhyme scheme. Sensory imagery. Emotional arc from [START] to [END]. No cliches."},{"id":223,"c":"Social Media","l":"Any","t":"Instagram Caption","d":"Simple","r":4.6,"p":"Instagram caption for [POST TOPIC]. Hook first line (stop the scroll), value or story, CTA (save/share/comment), 5-10 relevant hashtags. Tone: [X]."},{"id":224,"c":"Social Media","l":"Any","t":"LinkedIn Post","d":"Simple","r":4.7,"p":"LinkedIn post about [TOPIC]. Hook (controversial or surprising), personal story/insight, key lesson, CTA for engagement. Professional but human."},{"id":225,"c":"Social Media","l":"Any","t":"TikTok Script 60s","d":"Simple","r":4.7,"p":"60-second TikTok about [TOPIC]. Hook (0-3s), setup (3-15s), main content (15-45s), payoff/CTA (45-60s). Visual cues in [BRACKETS]."},{"id":226,"c":"Social Media","l":"Any","t":"Twitter/X Thread","d":"Medium","r":4.8,"p":"10-tweet thread on [TOPIC]. Tweet 1: bold claim hook. 2-8: one idea per tweet, examples. 9: summary. 10: CTA + retweet prompt. Under 280 chars each."},{"id":227,"c":"Social Media","l":"Any","t":"Reddit Post","d":"Simple","r":4.5,"p":"Reddit post for r/[SUBREDDIT] about [TOPIC]. Authentic tone (not corporate). Provide value first, ask for input. Follow subreddit norms."},{"id":228,"c":"Social Media","l":"Any","t":"Pinterest Pin Description","d":"Simple","r":4.4,"p":"Pinterest description for [PIN TYPE]. Keyword-rich first sentence, benefit statement, CTA. 100-200 chars. Include: [KEYWORD 1], [KEYWORD 2]."},{"id":229,"c":"Social Media","l":"Any","t":"Bio Generator","d":"Simple","r":4.6,"p":"Social media bio for [PLATFORM]. Who I am, what I do, who I help, proof/credential, CTA/link. Under [CHAR LIMIT]. Tone: [X]."},{"id":230,"c":"Social Media","l":"Any","t":"Carousel Content Plan","d":"Medium","r":4.7,"p":"10-slide carousel for [TOPIC]: Slide 1 = hook headline. Slides 2-9 = one point each with visual direction. Slide 10 = CTA + summary."},{"id":231,"c":"Email","l":"Any","t":"Cold Outreach","d":"Medium","r":4.7,"p":"Cold email to [PERSON/ROLE] at [COMPANY]. Personalized opening (reference their work), value proposition in 1 sentence, specific ask, under 100 words."},{"id":232,"c":"Email","l":"Any","t":"Follow-Up Sequence","d":"Medium","r":4.6,"p":"3-email follow-up after [CONTEXT]: Email 1 (Day 2): quick check-in. Email 2 (Day 5): add new value. Email 3 (Day 10): breakup email. Each under 75 words."},{"id":233,"c":"Email","l":"Any","t":"Apology Email","d":"Simple","r":4.5,"p":"Professional apology for [SITUATION]. Acknowledge the issue, take responsibility, explain briefly (no excuses), state fix/prevention, offer make-good."},{"id":234,"c":"Email","l":"Any","t":"Meeting Request","d":"Simple","r":4.4,"p":"Meeting request email: Purpose in subject line, 2-sentence context, 3 proposed times, agenda bullets, expected duration. Respectful of their time."},{"id":235,"c":"Email","l":"Any","t":"Negotiation Email","d":"Advanced","r":4.7,"p":"Email for [NEGOTIATION TYPE]. Open with shared interest, present position with data, acknowledge their perspective, propose win-win, clear next step."},{"id":236,"c":"Email","l":"Any","t":"Thank You Note","d":"Simple","r":4.3,"p":"Thank you email after [EVENT/MEETING]. Specific reference to what you appreciated, reiterate key takeaway or next step, warm close. Genuine, not generic."},{"id":237,"c":"Health","l":"Any","t":"7-Day Meal Plan","d":"Medium","r":4.7,"p":"7-day meal plan. Diet: [TYPE]. Calories: [X]/day. Restrictions: [X]. Per day: breakfast, lunch, dinner, 2 snacks + macros + prep time. Grocery list."},{"id":238,"c":"Health","l":"Any","t":"Workout Routine","d":"Medium","r":4.7,"p":"Workout plan: [GOAL], [DAYS/WEEK], [EQUIPMENT]. Per session: warm-up, exercises (sets x reps), rest periods, cool-down. Progressive overload. Deload week 4."},{"id":239,"c":"Health","l":"Any","t":"Sleep Optimization","d":"Simple","r":4.5,"p":"Sleep optimization plan for [ISSUE]. Evening routine, environment checklist, timing recommendations, things to avoid, supplements to research, tracking method."},{"id":240,"c":"Health","l":"Any","t":"Stretching Routine","d":"Simple","r":4.4,"p":"15-minute stretching routine for [GOAL: flexibility/desk worker/runner]. Each stretch: name, description, duration, muscles targeted. Warm-up first."},{"id":241,"c":"Health","l":"Any","t":"Supplement Research","d":"Medium","r":4.5,"p":"Research summary for [SUPPLEMENT]: What it does, evidence quality (strong/moderate/weak), dosage range, timing, interactions, who should avoid."},{"id":242,"c":"Health","l":"Any","t":"Habit Tracker Setup","d":"Simple","r":4.6,"p":"Design a habit tracker for [GOALS]. 5-7 daily habits, weekly review questions, streak tracking method, reward milestones, accountability system."},{"id":243,"c":"Data","l":"Any","t":"Data Analysis Prompt","d":"Medium","r":4.7,"p":"Analyze this data: [PASTE/DESCRIBE]. Find: trends, correlations, outliers, statistical significance. Visualizations: suggest chart types. Plain English summary."},{"id":244,"c":"Data","l":"Any","t":"Excel Formula Helper","d":"Simple","r":4.6,"p":"Excel formula for [TASK]. Step-by-step: formula, explanation of each part, example with sample data, common errors, alternative approach."},{"id":245,"c":"Data","l":"Any","t":"Dashboard KPI Design","d":"Medium","r":4.6,"p":"Dashboard for [BUSINESS]: North Star metric, 4-6 primary KPIs, supporting metrics, target values, update frequency, alert thresholds."},{"id":246,"c":"Data","l":"Any","t":"Survey Designer","d":"Medium","r":4.5,"p":"Survey for [GOAL]: 10-15 questions, mix of types (Likert, multiple choice, open), no leading bias, logical flow, under 5 min, screening question."},{"id":247,"c":"Data","l":"Any","t":"A/B Test Plan","d":"Advanced","r":4.6,"p":"A/B test for [HYPOTHESIS]: Control vs variant, sample size, duration, primary metric, guardrail metrics, statistical significance threshold, rollout plan."},{"id":248,"c":"Data","l":"Any","t":"Python Data Script","d":"Medium","r":4.7,"p":"Python script to [DATA TASK]. Use pandas. Read [FORMAT], clean (handle nulls, types), transform, analyze, output. Include comments. Error handling."},{"id":249,"c":"Education","l":"Any","t":"Lesson Plan","d":"Medium","r":4.7,"p":"Lesson plan for [TOPIC], [AGE GROUP], [DURATION]. Objectives (Bloom's), warm-up, instruction, guided practice, independent practice, assessment, differentiation."},{"id":250,"c":"Education","l":"Any","t":"Quiz Generator","d":"Simple","r":4.6,"p":"10-question quiz on [TOPIC]. Mix: 5 multiple choice, 3 short answer, 2 application. Answer key with explanations. Difficulty: [LEVEL]."},{"id":251,"c":"Education","l":"Any","t":"Rubric Builder","d":"Medium","r":4.5,"p":"Grading rubric for [ASSIGNMENT]: 4-5 criteria, 4 levels (Excellent/Good/Developing/Beginning), descriptions per cell, point values."},{"id":252,"c":"Education","l":"Any","t":"Explain to Student","d":"Simple","r":4.8,"p":"Explain [TOPIC] to a [GRADE] student. Use: age-appropriate language, relatable analogy, visual description, check-for-understanding question."},{"id":253,"c":"Education","l":"Any","t":"Parent Email Template","d":"Simple","r":4.4,"p":"Email to parents about [TOPIC]. Warm opening, clear information, action items, timeline, how to ask questions. Professional but approachable."},{"id":254,"c":"Education","l":"Any","t":"Study Guide Creator","d":"Medium","r":4.7,"p":"Study guide for [EXAM/TOPIC]: Key concepts by theme, essential vocabulary, practice questions per section, common mistakes, study schedule."},{"id":255,"c":"Real Estate","l":"Any","t":"Property Listing","d":"Simple","r":4.6,"p":"Listing for [PROPERTY]: Attention-grabbing headline, lifestyle-focused description, key features (beds/baths/sqft), neighborhood highlights, call to schedule."},{"id":256,"c":"Real Estate","l":"Any","t":"Open House Invite","d":"Simple","r":4.5,"p":"Open house invite for [ADDRESS]: Date/time, property highlights (3), neighborhood perks, RSVP method, agent contact. Warm, inviting tone."},{"id":257,"c":"Real Estate","l":"Any","t":"Market Analysis Summary","d":"Medium","r":4.6,"p":"Market summary for [AREA]: Median price, trend, days on market, inventory level, buyer/seller market indicator, forecast, comparable sales."},{"id":258,"c":"Real Estate","l":"Any","t":"Buyer Consultation Script","d":"Medium","r":4.5,"p":"Buyer consultation script: Introduction, needs assessment questions (10), budget discussion framework, timeline planning, next steps. Consultative."},{"id":259,"c":"Legal","l":"Claude","t":"Contract Summary","d":"Medium","r":4.7,"p":"Summarize this contract in plain English: Key parties, obligations, payment terms, duration, termination clauses, liability limits, red flags. [PASTE]"},{"id":260,"c":"Legal","l":"Any","t":"Terms of Service Draft","d":"Advanced","r":4.5,"p":"ToS outline for [SERVICE]: Acceptance, description, user obligations, prohibited uses, IP rights, disclaimers, limitation of liability, termination."},{"id":261,"c":"Legal","l":"Any","t":"Privacy Policy Outline","d":"Medium","r":4.4,"p":"Privacy policy outline for [APP]: Data collected, how used, sharing, cookies, user rights, retention period, contact. GDPR-aware."},{"id":262,"c":"Legal","l":"Claude","t":"Legal Letter Draft","d":"Advanced","r":4.6,"p":"Draft letter regarding [ISSUE]. State facts clearly, cite relevant rights, proposed resolution, timeline for response. Note: not legal advice."},{"id":263,"c":"Finance","l":"Any","t":"Budget 50/30/20","d":"Simple","r":4.6,"p":"Budget plan. Income: [X]. Apply 50/30/20 rule. Categorize expenses, identify savings, debt payoff strategy, emergency fund timeline."},{"id":264,"c":"Finance","l":"Any","t":"Investment Research","d":"Medium","r":4.5,"p":"Research [INVESTMENT]: What it is, risk level, historical performance, pros/cons, who it's suitable for, minimum, tax implications. Not financial advice."},{"id":265,"c":"Finance","l":"Any","t":"Financial Projection","d":"Advanced","r":4.6,"p":"12-month projection for [BUSINESS]: Revenue assumptions, COGS, operating expenses, monthly cash flow, break-even point, sensitivity analysis."},{"id":266,"c":"Finance","l":"Any","t":"Expense Report Summary","d":"Simple","r":4.4,"p":"Organize these expenses: [PASTE]. Categorize, total per category, flag unusual items, monthly trend, tax-deductible items highlighted."},{"id":267,"c":"Voice & Audio","l":"ElevenLabs","t":"Audiobook Narration","d":"Medium","r":4.6,"p":"Narrate in [GENRE] audiobook style: [CHARACTER VOICE] for dialogue, neutral narrator, appropriate pacing. Emotion: [X]. Speed: moderate."},{"id":268,"c":"Voice & Audio","l":"ElevenLabs","t":"Podcast Intro Script","d":"Simple","r":4.5,"p":"15-second podcast intro: Show name, host name, tagline, what listeners will get. Energetic but professional. Include music cue notes."},{"id":269,"c":"Voice & Audio","l":"Any","t":"Voice Clone Direction","d":"Medium","r":4.5,"p":"Voice direction for [CONTENT TYPE]: Tone, pace, emphasis on [KEY WORDS], breathing pauses, warmth level 1-10. Reference: sounds like [DESCRIPTION]."},{"id":270,"c":"Voice & Audio","l":"Any","t":"SFX for AI Audio","d":"Medium","r":4.4,"p":"Sound effect: [DESCRIBE]. Context: [WHERE]. Duration: [X]s. Characteristics: [SHARP/SOFT/RUMBLING]. Layer: foreground/background. Reverb: [DRY/WET]."},{"id":271,"c":"Prompting","l":"Any","t":"CRAFT Framework","d":"Medium","r":4.9,"p":"C: Context [Background]\nR: Role [Who AI acts as]\nA: Action [Task]\nF: Format [Output structure]\nT: Target [Audience]\n\nExample: SaaS startup, 500 users -> Growth expert -> Activation strategy -> Step-by-step playbook -> Founding team"},{"id":272,"c":"Prompting","l":"Any","t":"Ask Before Answering","d":"Simple","r":4.8,"p":"[YOUR PROMPT]\n\nBefore starting, ask me any questions for more context. Group by category. Don't begin until I confirm."},{"id":273,"c":"Prompting","l":"Any","t":"Self-Refinement Chain","d":"Medium","r":4.7,"p":"[TASK]. Steps: 1) Draft 1, 2) Critique (3 weaknesses), 3) Draft 2, 4) Rate 1-10, 5) If <8 repeat, 6) Final + changelog."},{"id":274,"c":"Prompting","l":"Claude","t":"XML Task Structure","d":"Advanced","r":4.8,"p":"<task>[Task]</task>\n<context>[Background]</context>\n<input>[Content]</input>\n<constraints>[Rules]</constraints>\n<output_format>[Structure]</output_format>\n<examples><example>Input: [X] Output: [X]</example></examples>"},{"id":275,"c":"Prompting","l":"Any","t":"Multi-Perspective","d":"Medium","r":4.7,"p":"Analyze [TOPIC] from 4 views: Optimist (upside), Critic (risks), Pragmatist (realistic steps), Innovator (what others miss). Per view: argument, evidence, blind spot. Synthesis."},{"id":276,"c":"Prompting","l":"Any","t":"Expert Role-Play","d":"Simple","r":4.6,"p":"You are [EXPERT ROLE, 20 years]. Stay in character: deep expertise, real frameworks, push back on bad practices, admit uncertainty. Question: [X]"},{"id":277,"c":"Prompting","l":"Any","t":"Mega Prompt Builder","d":"Advanced","r":4.8,"p":"Build a mega prompt for [TASK]:\n1. Role: You are a...\n2. Context: Background info\n3. Task: Specific deliverable\n4. Format: Structure/length\n5. Constraints: Rules/limits\n6. Examples: 2 input/output pairs\n7. Tone: Communication style\n8. Evaluation: How to judge quality"},{"id":278,"c":"Prompting","l":"Any","t":"One-Shot to Few-Shot","d":"Medium","r":4.7,"p":"Convert any basic prompt to few-shot:\n\nBasic: Write a tagline for [PRODUCT]\n\nFew-shot: Write tagline for [PRODUCT].\n\nExamples:\nProduct: Running shoes -> Run like the road was made for you\nProduct: Coffee app -> Your morning, perfected\nProduct: [YOUR PRODUCT] ->"},{"id":279,"c":"Personal","l":"Claude","t":"Travel Itinerary","d":"Advanced","r":4.9,"p":"[X]-day trip to [DESTINATION]. Style: [X]. Interests: [X]. Per day: morning/afternoon/evening + restaurants + transport + budget. Packing list, tourist traps to skip, photo spots."},{"id":280,"c":"Personal","l":"Any","t":"Difficult Conversation","d":"Medium","r":4.8,"p":"Prep for difficult conversation: Situation: [X]. Goal: [X]. Their perspective: [X]. 3 opening options, key points, phrases to avoid, pushback responses, constructive ending."},{"id":281,"c":"Personal","l":"Claude","t":"Book Recs (10)","d":"Simple","r":4.6,"p":"10 books. Loved: [3-5]. Disliked: [1-3]. Per book: title, hook (no spoilers), why it fits. Rank: safest bet to stretch."},{"id":282,"c":"Personal","l":"Any","t":"Gift Ideas 15","d":"Simple","r":4.5,"p":"15 gift ideas for [PERSON]. Interests: [X]. Budget: [X]. Mix: 5 practical, 5 experiential, 5 sentimental. Why each fits."},{"id":283,"c":"Personal","l":"Any","t":"Morning Routine","d":"Simple","r":4.5,"p":"Design morning routine for [GOAL]. Duration: [X] minutes. Include: movement, mindfulness, planning, nourishment. Realistic for [LIFESTYLE]. Week 1 starter."},{"id":284,"c":"Personal","l":"Any","t":"Relationship Check-In","d":"Medium","r":4.6,"p":"10 thoughtful conversation starters for couples/friends/family. Mix: light, reflective, future-focused. Non-confrontational. Adapt for [RELATIONSHIP TYPE]."},{"id":285,"c":"Image Gen","l":"Stable Diffusion","t":"Portrait + Negative","d":"Advanced","r":4.6,"p":"Photorealistic portrait of [SUBJECT], [EXPRESSION], [LIGHTING], Canon R5, 85mm f/1.2, bokeh, skin detail\n\nNegative: cartoon, anime, distorted, blurry, extra fingers, watermark"},{"id":286,"c":"Image Gen","l":"Stable Diffusion","t":"Pixel Art Scene","d":"Simple","r":4.6,"p":"Pixel art of [SCENE], 16-bit retro, [PALETTE], detailed sprites, nostalgic\n\nNegative: realistic, 3D, blurry, modern"},{"id":287,"c":"Image Gen","l":"Stable Diffusion","t":"Isometric Game Asset","d":"Simple","r":4.5,"p":"Isometric [OBJECT], game asset, clean edges, vibrant, soft shadows, white BG, low-poly\n\nNegative: blurry, dark, photographic"},{"id":288,"c":"DevOps","l":"Any","t":"Docker Compose Setup","d":"Medium","r":4.6,"p":"Docker Compose for [APP STACK]. Services: [LIST]. Include: volumes, networks, env vars, health checks, restart policies. Production-ready with comments."},{"id":289,"c":"DevOps","l":"Any","t":"CI/CD Pipeline","d":"Advanced","r":4.7,"p":"CI/CD pipeline for [PROJECT] using [TOOL]. Stages: lint, test, build, deploy. Branch strategy, environment promotion, rollback plan, notifications."},{"id":290,"c":"DevOps","l":"Any","t":"Terraform Module","d":"Advanced","r":4.5,"p":"Terraform module for [RESOURCE] on [CLOUD]. Variables, outputs, tagging strategy, security best practices, state management. Include README."},{"id":291,"c":"DevOps","l":"Any","t":"Incident Postmortem","d":"Medium","r":4.6,"p":"Postmortem for [INCIDENT]: Timeline, impact, root cause (5 Whys), contributing factors, action items with owners and deadlines, lessons learned. Blameless."},{"id":292,"c":"Automation","l":"Any","t":"Zapier/Make Workflow","d":"Medium","r":4.5,"p":"Automation workflow: Trigger: [EVENT]. Steps: [ACTIONS]. Tools: [APPS]. Error handling. Test scenario. Expected time saved per week."},{"id":293,"c":"Automation","l":"Any","t":"Email Sorting Rules","d":"Simple","r":4.4,"p":"Email organization: 5-7 categories, filter rules for each, label/folder structure, auto-responses for common queries, daily triage process."},{"id":294,"c":"Automation","l":"Any","t":"Spreadsheet Macro","d":"Medium","r":4.5,"p":"[LANGUAGE] macro for [SPREADSHEET TASK]. Input: [DESCRIBE]. Output: [DESCRIBE]. Error handling, logging, scheduled run instructions."},{"id":295,"c":"AI Agents","l":"Claude","t":"Multi-Step Research Agent","d":"Advanced","r":4.9,"p":"You are a research agent. Process:\n1. Clarify the research question\n2. Break into 3-5 sub-questions\n3. Research each (cite sources)\n4. Synthesize findings\n5. Present: Executive summary, detailed findings, confidence levels, knowledge gaps\n6. Suggest follow-up questions\n\nTopic: [X]"},{"id":296,"c":"AI Agents","l":"Claude","t":"Code Review Pipeline","d":"Advanced","r":4.8,"p":"Act as 3 agents reviewing this code sequentially:\n\nAgent 1 (Security): Auth flaws, injection risks, data exposure\nAgent 2 (Performance): Complexity, memory leaks, N+1 queries\nAgent 3 (Architecture): SOLID violations, coupling, testability\n\nEach agent: findings, severity, fix. Final: unified priority list.\n[PASTE CODE]"},{"id":297,"c":"AI Agents","l":"Any","t":"Content Pipeline Agent","d":"Advanced","r":4.7,"p":"You are a content production pipeline. For topic [X]:\n\nPhase 1: Research (key facts, statistics, angles)\nPhase 2: Outline (hook, sections, CTA)\nPhase 3: Draft (full article)\nPhase 4: Edit (clarity, flow, grammar)\nPhase 5: SEO (title, meta, headers, keywords)\n\nDeliver all 5 phases."},{"id":298,"c":"AI Agents","l":"Claude","t":"Devil's Advocate Agent","d":"Medium","r":4.8,"p":"I will present an idea. You will:\n1. Steelman it (best version)\n2. Attack it from 3 angles (logical, practical, ethical)\n3. Find the fatal flaw\n4. Suggest the pivot that saves it\n5. Rate viability 1-10 with reasoning\n\nMy idea: [X]"},{"id":299,"c":"AI Agents","l":"Any","t":"Meeting Prep Agent","d":"Medium","r":4.6,"p":"Prep me for meeting with [PERSON/COMPANY] about [TOPIC].\n\nDeliver:\n1. Their likely priorities and concerns\n2. 3 talking points with data\n3. Potential objections + rebuttals\n4. 2 power questions to ask\n5. Ideal outcome statement\n6. Follow-up email draft"},{"id":300,"c":"AI Agents","l":"Claude","t":"Extended Thinking","d":"Advanced","r":4.9,"p":"Before answering, write out your complete reasoning process step by step. Show your internal thinking, catch your own errors, consider alternatives, then give your final answer.\n\nQuestion: [COMPLEX QUESTION]\n\nThink carefully and show all work."},{"id":301,"c":"Game Dev","l":"Any","t":"Game Design Doc","d":"Advanced","r":4.8,"p":"GDD for [GAME CONCEPT]: Genre, core loop, mechanics (3), progression system, monetization, target audience, art style reference, tech stack, MVP scope (4-week sprint), competitor analysis. One page per section."},{"id":302,"c":"Game Dev","l":"Any","t":"NPC Dialogue Tree","d":"Medium","r":4.7,"p":"Dialogue tree for [NPC] in [GAME GENRE]. Personality: [X]. Include: greeting, 3 conversation branches, quest offer, accept/decline paths, farewell. Mark: [PLAYER CHOICE] and [NPC RESPONSE]. Add personality notes."},{"id":303,"c":"Game Dev","l":"Any","t":"Game Economy Balancer","d":"Advanced","r":4.6,"p":"Balance economy for [GAME TYPE]: Currency sources/sinks, earn rates, item pricing tiers, progression curve (early/mid/late), inflation prevention, F2P vs premium balance, engagement hooks per session."},{"id":304,"c":"Game Dev","l":"Any","t":"Level Design Brief","d":"Medium","r":4.7,"p":"Level design for [GAME]: Theme, layout sketch (ASCII), enemy placement, difficulty curve, hidden areas, environmental storytelling beats, estimated play time, tutorial elements if early level."},{"id":305,"c":"Photography","l":"Any","t":"Photo Critique Pro","d":"Medium","r":4.7,"p":"Critique this photo like a professional: Composition (rule of thirds, leading lines), exposure (highlights/shadows), color (harmony, white balance), focus, storytelling, mood. Score 1-10. Specific improvements. [DESCRIBE/ATTACH]"},{"id":306,"c":"Photography","l":"Any","t":"Lightroom Edit Recipe","d":"Medium","r":4.6,"p":"Lightroom editing recipe for [LOOK]: Exposure, contrast, highlights, shadows, whites, blacks, tone curve adjustments, HSL sliders, split toning, grain, vignette. Step by step with specific values."},{"id":307,"c":"Photography","l":"Any","t":"Photography Shot List","d":"Simple","r":4.5,"p":"Shot list for [EVENT/PROJECT]: 20 shots covering key moments, candid opportunities, detail shots, wide establishing shots. Per shot: description, suggested settings, timing, lens recommendation."},{"id":308,"c":"Photography","l":"Any","t":"Portfolio Review","d":"Medium","r":4.6,"p":"Review my photography portfolio for [PURPOSE: client/gallery/social]. Evaluate: consistency, storytelling, technical skill, editing style, gaps. Suggest: 3 strengths, 3 improvements, curation advice. [DESCRIBE WORK]"},{"id":309,"c":"Freelance","l":"Any","t":"Client Proposal","d":"Medium","r":4.7,"p":"Proposal for [PROJECT] for [CLIENT]: Understanding of their needs, my approach, deliverables, timeline with milestones, pricing (3 tiers), why me, next steps. Professional but personable. Under 500 words."},{"id":310,"c":"Freelance","l":"Any","t":"Rate Calculator","d":"Simple","r":4.5,"p":"Calculate my freelance rate: Annual salary goal: [X]. Expenses: [X]. Billable hours/week: [X]. Calculate: hourly, day rate, project minimums. Compare to market rate for [SKILL] in [LOCATION]. Negotiation tips."},{"id":311,"c":"Freelance","l":"Any","t":"Scope Creep Response","d":"Medium","r":4.6,"p":"Draft a professional response to scope creep. Original scope: [X]. New request: [X]. Options: 1) Firm boundary with reasoning 2) Accommodate with change order 3) Partial compromise. All maintain relationship."},{"id":312,"c":"Freelance","l":"Any","t":"Portfolio Case Study","d":"Medium","r":4.7,"p":"Case study for [PROJECT]: Challenge, my approach, process highlights, results with metrics, client testimonial prompt, key takeaway. Storytelling format. Under 300 words. Visual suggestions."},{"id":313,"c":"Writing","l":"Claude","t":"Ghostwriter Voice Match","d":"Advanced","r":4.9,"p":"Analyze my writing samples below and extract: sentence length patterns, vocabulary level, tone markers, punctuation habits, rhetorical devices, paragraph rhythm. Then write [CONTENT TYPE] in my exact voice.\n\n[PASTE 2-3 SAMPLES]"},{"id":314,"c":"Writing","l":"Any","t":"Persuasive Essay AIDA","d":"Medium","r":4.7,"p":"Persuasive essay on [TOPIC] using AIDA: Attention (shocking stat/question), Interest (why it matters), Desire (vision of success), Action (specific steps). 800 words. Audience: [X]."},{"id":315,"c":"Writing","l":"Any","t":"Dialogue Writer","d":"Medium","r":4.8,"p":"Write a dialogue scene between [CHAR A] and [CHAR B]. Context: [SITUATION]. Subtext: [HIDDEN TENSION]. Show don't tell emotions. Distinct speech patterns per character. Include stage directions."},{"id":316,"c":"Writing","l":"Any","t":"Newsletter Issue","d":"Medium","r":4.7,"p":"Newsletter for [AUDIENCE] about [TOPIC]: Subject line (A/B), personal opener, main insight with example, actionable takeaway, resource link, conversational CTA. Under 500 words. Tone: [X]."},{"id":317,"c":"Writing","l":"Any","t":"Speech Writer","d":"Advanced","r":4.8,"p":"[X]-minute speech for [OCCASION]. Audience: [X]. Open with story/hook, 3 key messages with transitions, callback to opener, powerful closing. Include: pause markers, emphasis notes, audience engagement moments."},{"id":318,"c":"Writing","l":"Any","t":"Rewrite for Tone","d":"Simple","r":4.6,"p":"Rewrite this text in [TONE: casual/formal/humorous/urgent/empathetic]. Keep the core message identical. Match vocabulary and sentence structure to the new tone. [PASTE TEXT]"},{"id":319,"c":"Coding","l":"Claude","t":"Full Stack Scaffold","d":"Advanced","r":4.9,"p":"Scaffold [APP TYPE] with [FRONTEND] + [BACKEND] + [DB]. Include: project structure, package.json, entry files, env template, Docker setup, README, basic auth, CRUD for [RESOURCE]. Production patterns."},{"id":320,"c":"Coding","l":"Any","t":"Algorithm Explainer","d":"Medium","r":4.7,"p":"Explain [ALGORITHM] at 3 levels:\n1. Intuition (real-world analogy)\n2. Step-by-step with visual trace\n3. Code implementation in [LANG]\n\nInclude: time/space complexity, when to use, common variations, interview tips."},{"id":321,"c":"Coding","l":"Claude","t":"Security Audit","d":"Advanced","r":4.8,"p":"Security audit of [CODE/SYSTEM]: Check OWASP Top 10, auth vulnerabilities, injection points, data exposure, dependency risks. Per finding: risk level, exploit scenario, remediation code. Executive summary."},{"id":322,"c":"Coding","l":"Any","t":"Code Documentation","d":"Medium","r":4.6,"p":"Generate documentation for [CODE]: Module overview, function signatures with types, parameter descriptions, return values, usage examples, edge cases, related functions. JSDoc/docstring format."},{"id":323,"c":"Coding","l":"Any","t":"CSS Layout Solver","d":"Simple","r":4.5,"p":"CSS solution for [LAYOUT DESCRIPTION]. Requirements: [RESPONSIVE/FIXED]. Approach: Flexbox or Grid (recommend best). Include: HTML structure, CSS with comments, mobile breakpoints, browser support notes."},{"id":324,"c":"Coding","l":"Any","t":"Error Handler Pattern","d":"Medium","r":4.6,"p":"Error handling strategy for [APP TYPE] in [LANG/FRAMEWORK]: Custom error classes, middleware/interceptor pattern, user-facing messages, logging, retry logic, graceful degradation. Production-ready code."},{"id":325,"c":"Coding","l":"Claude","t":"Migrate Legacy Code","d":"Advanced","r":4.7,"p":"Migration plan: [OLD TECH] to [NEW TECH]. Assess: risk areas, data migration, API compatibility, breaking changes. Deliver: phased plan, parallel run strategy, rollback procedure, test checklist."},{"id":326,"c":"Coding","l":"Any","t":"TypeScript Types Builder","d":"Medium","r":4.6,"p":"Generate TypeScript types for [DESCRIBE DATA]. Include: interfaces, enums, union types, utility types, generic patterns. Add JSDoc comments. Handle: nullable fields, nested objects, API response wrappers."},{"id":327,"c":"ChatGPT Image","l":"ChatGPT","t":"Action Figure Box","d":"Medium","r":4.9,"p":"Create a realistic action figure of [DESCRIPTION] inside unopened toy packaging. Clear plastic front, cardboard backing with character name and stats. Shelf-ready commercial product photography."},{"id":328,"c":"ChatGPT Image","l":"ChatGPT","t":"Magazine Cover","d":"Medium","r":4.8,"p":"Create a [MAGAZINE TYPE] magazine cover featuring [SUBJECT]. Professional layout with masthead area, cover lines, barcode area. Studio photography quality. Style: [TIME/Vogue/Wired/GQ]."},{"id":329,"c":"ChatGPT Image","l":"ChatGPT","t":"Movie Poster Style","d":"Medium","r":4.8,"p":"Create a movie poster for a [GENRE] film called [TITLE]. Dramatic composition, cinematic lighting, tagline area at top, credits block at bottom, [CHARACTERS/SCENE]. Professional Hollywood quality."},{"id":330,"c":"ChatGPT Image","l":"ChatGPT","t":"Before/After Transform","d":"Simple","r":4.6,"p":"Transform this photo: [BEFORE DESCRIPTION]. Make it [AFTER DESCRIPTION]. Keep the same composition and subject. Only change the specified elements. Natural, seamless result."},{"id":331,"c":"ChatGPT Image","l":"ChatGPT","t":"Sticker Sheet Design","d":"Simple","r":4.7,"p":"Design a sticker sheet of 6-8 [THEME] stickers. Die-cut style with white borders. Cute, colorful, consistent art style. Mix of characters, objects, and text elements. White background."},{"id":332,"c":"ChatGPT Image","l":"ChatGPT","t":"Vintage Photo Aging","d":"Simple","r":4.5,"p":"Age this modern photo to look like a genuine [DECADE: 1970s/1960s/1940s] photograph. Add appropriate: film grain, color shift, wear marks, period-correct processing. Must look authentically old."},{"id":333,"c":"Video","l":"Sora","t":"Food Commercial Close-Up","d":"Medium","r":4.7,"p":"Extreme close-up of [FOOD] being prepared. Slow motion pour/drizzle/sizzle. Steam rising. Macro detail of texture. Warm studio lighting. Smooth camera pull-back to reveal full dish. Commercial quality."},{"id":334,"c":"Video","l":"Sora","t":"Time-Lapse City","d":"Simple","r":4.7,"p":"Time-lapse of [CITY] skyline from day to night. Clouds streaking across sky. Lights gradually turning on. Traffic creating light trails. Stars appearing. Hyper-lapse smooth camera movement."},{"id":335,"c":"Video","l":"Sora","t":"Stop Motion Craft","d":"Medium","r":4.6,"p":"Stop-motion animation of [OBJECTS] coming to life. Handcrafted feel, visible texture of materials. Whimsical movement. Warm tabletop lighting. Miniature world aesthetic. Charming and playful."},{"id":336,"c":"Video","l":"Sora","t":"Documentary Interview","d":"Medium","r":4.6,"p":"Documentary-style interview setup. [PERSON DESCRIPTION] sits in [SETTING]. Shallow depth of field, 85mm lens, warm motivated lighting. Subject speaks directly to camera. Intimate, authentic feel."},{"id":337,"c":"Business","l":"Claude","t":"Investor Update Email","d":"Medium","r":4.7,"p":"Monthly investor update for [COMPANY]: Highlight metric, key wins (3), challenges (honest), asks/needs, next month priorities. Data-driven but narrative. Confident tone. Under 400 words."},{"id":338,"c":"Business","l":"Any","t":"Partnership Proposal","d":"Advanced","r":4.6,"p":"Partnership proposal: [MY COMPANY] + [THEIR COMPANY]. Shared audience analysis, mutual benefits, proposed structure, revenue model, pilot program, success metrics, timeline. Win-win framing."},{"id":339,"c":"Business","l":"Claude","t":"Board Meeting Deck","d":"Advanced","r":4.7,"p":"Board deck outline for [COMPANY]: Agenda, financial summary, KPI dashboard, strategic updates, market landscape, risks and mitigations, key decisions needed, Q&A prep. Slide-by-slide with talking points."},{"id":340,"c":"Business","l":"Any","t":"Customer Success Playbook","d":"Medium","r":4.6,"p":"CS playbook for [PRODUCT]: Onboarding checklist (30/60/90 day), health score metrics, risk signals, expansion triggers, QBR template, churn save scripts, NPS follow-up process."},{"id":341,"c":"Marketing","l":"Any","t":"Influencer Brief","d":"Medium","r":4.6,"p":"Influencer brief for [CAMPAIGN]: Brand overview, key messages (3), do's and don'ts, content requirements, hashtags, disclosure rules, timeline, deliverables, approval process. Creative freedom areas."},{"id":342,"c":"Marketing","l":"Any","t":"Product Launch Plan","d":"Advanced","r":4.8,"p":"Launch plan for [PRODUCT]: Pre-launch (4 weeks), launch day, post-launch (2 weeks). Per phase: channels, content, audience, budget allocation, KPIs. Include: press release, social copy, email, landing page brief."},{"id":343,"c":"Marketing","l":"Any","t":"Competitor Ad Analysis","d":"Medium","r":4.5,"p":"Analyze these competitor ads: [DESCRIBE/PASTE]. For each: target audience, value proposition, emotional trigger, CTA strength, visual strategy. Then: gaps we can exploit, our counter-positioning."},{"id":344,"c":"Marketing","l":"Any","t":"Referral Program Design","d":"Medium","r":4.6,"p":"Referral program for [PRODUCT]: Incentive structure (both sides), tiers, sharing mechanics, tracking method, email templates (invite, reward, milestone), projected growth math."},{"id":345,"c":"Social Media","l":"Any","t":"YouTube Thumbnail Ideas","d":"Simple","r":4.7,"p":"5 YouTube thumbnail concepts for [VIDEO TOPIC]. Each: visual description, text overlay (3-5 words max), emotion/expression, color scheme, click trigger psychology. High CTR design principles."},{"id":346,"c":"Social Media","l":"Any","t":"Community Guidelines","d":"Medium","r":4.4,"p":"Community guidelines for [PLATFORM/GROUP]: Welcome message, 5-7 rules with explanations, enforcement process, examples of good/bad behavior, moderation tiers, appeal process. Friendly but firm."},{"id":347,"c":"Social Media","l":"Any","t":"Content Repurposing","d":"Medium","r":4.7,"p":"Repurpose this [CONTENT TYPE] into 7 formats:\n1. Twitter thread\n2. LinkedIn post\n3. Instagram carousel\n4. TikTok script\n5. Newsletter snippet\n6. Blog excerpt\n7. Pinterest pin\n\n[PASTE ORIGINAL]"},{"id":348,"c":"Social Media","l":"Any","t":"Engagement Reply Templates","d":"Simple","r":4.5,"p":"10 reply templates for [BRAND] social media: 3 positive comments, 3 questions, 2 complaints, 2 feature requests. On-brand voice, personalized feel, not robotic. Include escalation triggers."},{"id":349,"c":"Prompting","l":"Claude","t":"Chain of Thought","d":"Advanced","r":4.9,"p":"Solve [PROBLEM] using chain-of-thought reasoning:\n\n1. State what you know\n2. Identify what you need to find\n3. Break into sub-problems\n4. Solve each step showing work\n5. Verify answer\n6. State confidence level\n\nProblem: [X]"},{"id":350,"c":"Prompting","l":"Any","t":"Prompt Debugger","d":"Medium","r":4.7,"p":"My prompt isn't working well. Help me fix it.\n\nCurrent prompt: [PASTE]\nExpected output: [DESCRIBE]\nActual output: [DESCRIBE]\n\nDiagnose: what's wrong, why it fails, rewritten version, explanation of changes."},{"id":351,"c":"Prompting","l":"Any","t":"System Prompt Builder","d":"Advanced","r":4.8,"p":"Build a system prompt for [USE CASE]. Include:\n- Role and personality\n- Knowledge boundaries\n- Response format rules\n- Tone guidelines\n- Edge case handling\n- Example exchanges (2)\n- Forbidden behaviors"},{"id":352,"c":"Prompting","l":"Any","t":"Reverse Prompt Engineer","d":"Medium","r":4.7,"p":"Look at this AI output and reverse-engineer the prompt that likely created it. Then improve that prompt to get even better results. Explain your reasoning.\n\n[PASTE AI OUTPUT]"},{"id":353,"c":"Prompting","l":"Any","t":"Tree of Thought","d":"Advanced","r":4.8,"p":"Use Tree of Thought for [PROBLEM]:\n\nGenerate 3 initial approaches. For each:\n- Explore 2 steps forward\n- Evaluate viability (1-10)\n- Prune weak branches\n- Expand best branch\n- Repeat until solution\n\nShow the full tree."},{"id":354,"c":"Prompting","l":"Any","t":"Emotional Intelligence","d":"Simple","r":4.6,"p":"Respond to this message with high emotional intelligence. First: identify the emotion behind their words. Then: validate, empathize, and respond helpfully. Don't just solve the problem \u2014 address the feeling first.\n\n[PASTE MESSAGE]"},{"id":355,"c":"Creative","l":"Any","t":"Plot Twist Generator","d":"Medium","r":4.8,"p":"Generate 5 plot twists for [STORY SETUP]. Each twist: the reveal, foreshadowing hints to plant earlier, emotional impact, how it recontextualizes everything. Rate each: surprise (1-10) and satisfaction (1-10)."},{"id":356,"c":"Creative","l":"Any","t":"Character Voice Sheet","d":"Medium","r":4.7,"p":"Character voice sheet for [NAME]: Speaking patterns, vocabulary level, pet phrases (3), verbal tics, topics they avoid, how they express anger/joy/sadness, sample dialogue (5 lines), inner monologue style."},{"id":357,"c":"Creative","l":"Any","t":"Comedy Sketch Writer","d":"Medium","r":4.6,"p":"Write a 3-minute comedy sketch about [PREMISE]. Setup, escalation, callback, punchline structure. 2-3 characters max. Include: stage directions, timing notes, and an optional tag ending."},{"id":358,"c":"Creative","l":"Any","t":"Music Video Concept","d":"Advanced","r":4.7,"p":"Music video concept for [SONG/GENRE/MOOD]: Visual narrative, shot list (15-20 shots), color palette, wardrobe notes, location descriptions, special effects, emotional arc matching the song structure."},{"id":359,"c":"Learning","l":"Any","t":"Socratic Tutor","d":"Medium","r":4.9,"p":"Teach me [TOPIC] using the Socratic method. Don't give answers \u2014 only ask questions that guide me to discover the answer myself. Start simple, build complexity. If I'm wrong, ask a question that reveals why."},{"id":360,"c":"Learning","l":"Any","t":"Analogy Machine","d":"Simple","r":4.8,"p":"Explain [COMPLEX TOPIC] using 3 different analogies:\n1. For a child (everyday objects)\n2. For a professional from a different field\n3. For someone who already knows [RELATED TOPIC]\n\nThen: which analogy is most accurate and why?"},{"id":361,"c":"Learning","l":"Any","t":"Debate Both Sides","d":"Medium","r":4.7,"p":"Present [TOPIC/DEBATE] from both sides:\n\nSide A: Strongest 3 arguments with evidence\nSide B: Strongest 3 arguments with evidence\nCommon ground: Where both sides agree\nMy conclusion: Nuanced synthesis\n\nFair and balanced."},{"id":362,"c":"Learning","l":"Any","t":"Exam Simulator","d":"Medium","r":4.7,"p":"Create a realistic practice exam for [SUBJECT/CERT]. 15 questions: 5 recall, 5 application, 5 analysis. Timed suggestions. Answer key with explanations and common wrong-answer reasoning."},{"id":363,"c":"Productivity","l":"Any","t":"Eisenhower Matrix","d":"Simple","r":4.7,"p":"Sort these tasks into an Eisenhower Matrix (Urgent+Important, Important not Urgent, Urgent not Important, Neither). Then: action plan for each quadrant, delegation suggestions, elimination candidates.\n\n[PASTE TASK LIST]"},{"id":364,"c":"Productivity","l":"Any","t":"Retrospective Facilitator","d":"Medium","r":4.6,"p":"Run a team retrospective for [PROJECT/SPRINT]: What went well (5), what didn't (5), action items with owners. Use: Start/Stop/Continue format. Keep it blameless. Suggest process improvements."},{"id":365,"c":"Productivity","l":"Any","t":"Knowledge Base Article","d":"Medium","r":4.5,"p":"KB article for [TOPIC/PROCESS]: Title, summary, step-by-step guide, screenshots descriptions, FAQ (5), related articles, last updated field. Internal wiki format. Clear for any team member."},{"id":366,"c":"Productivity","l":"Any","t":"Delegation Brief","d":"Simple","r":4.5,"p":"Delegation brief for [TASK]: Context (why it matters), specific deliverable, quality criteria, deadline, resources available, check-in points, decision authority level, what success looks like."},{"id":367,"c":"Personal","l":"Any","t":"Year-End Review","d":"Medium","r":4.7,"p":"Guide my year-end review. Ask me about: Top 3 wins, biggest lesson, relationships built, skills gained, health changes, financial progress, what I'd do differently. Then: synthesize into a 1-page reflection + 3 goals for next year."},{"id":368,"c":"Personal","l":"Any","t":"Dinner Party Menu","d":"Simple","r":4.6,"p":"Dinner party for [N] guests. Dietary needs: [X]. Skill level: [X]. Budget: [X]. Plan: appetizer, main, 2 sides, dessert. Include: prep timeline, shopping list, make-ahead items, wine/drink pairing."},{"id":369,"c":"Personal","l":"Any","t":"Networking Message","d":"Simple","r":4.5,"p":"Write a warm networking message to [PERSON/CONTEXT]. Reference: [CONNECTION POINT]. Ask: [GOAL]. Keep it genuine, short (under 80 words), and specific. Not salesy. 3 versions: LinkedIn, email, text."},{"id":370,"c":"Personal","l":"Any","t":"Moving Checklist","d":"Simple","r":4.4,"p":"Complete moving checklist: 8 weeks before to moving day. Categories: admin (utilities, address change), packing, logistics, cleaning, first-night essentials. Timeline format with deadlines."},{"id":371,"c":"Data","l":"Any","t":"SQL Query Builder","d":"Medium","r":4.7,"p":"Write SQL for [REQUIREMENT]. Tables: [DESCRIBE SCHEMA]. Include: query, explanation of each clause, index recommendations, performance notes, sample output. DB: [TYPE]. Handle edge cases."},{"id":372,"c":"Data","l":"Any","t":"Chart Storyteller","d":"Simple","r":4.6,"p":"Turn this data into a story: [PASTE DATA]. Identify: main trend, surprising finding, actionable insight. Recommend: best chart type, title, subtitle, annotations. Write the 3-sentence executive narrative."},{"id":373,"c":"Data","l":"Any","t":"Regex Tester Explained","d":"Simple","r":4.5,"p":"Write and explain a regex for [PATTERN]. Show: pattern, plain-English breakdown of each part, 5 match examples, 5 non-match examples, edge cases, and the same pattern in [LANGUAGE] syntax."},{"id":374,"c":"Data","l":"Any","t":"Data Cleaning Checklist","d":"Medium","r":4.5,"p":"Data cleaning plan for [DATASET DESCRIPTION]: Identify common issues (nulls, duplicates, outliers, type mismatches, encoding), cleaning steps in order, validation checks, before/after metrics. Python pandas code."},{"id":375,"c":"Music","l":"Any","t":"Mix/Master Checklist","d":"Advanced","r":4.7,"p":"Mixing checklist for [GENRE]:\n\nGain staging > EQ (cut before boost) > Compression > Reverb/delay > Stereo width > Automation\n\nPer element: kick, snare, bass, vocals, guitars, synths, FX\nMastering: Limiter, stereo check, reference track A/B, LUFS target"},{"id":376,"c":"Music","l":"Any","t":"Chord Progression Generator","d":"Medium","r":4.6,"p":"Chord progressions for [MOOD]:\n\nHappy: I-V-vi-IV (C-G-Am-F)\nSad: vi-IV-I-V (Am-F-C-G)\nEpic: I-III-IV-iv (C-E-F-Fm)\nJazzy: IImaj7-V7-Imaj7-VIm7\nDark: i-bVI-bIII-bVII\n\nKey: [X]. Include: voicings, rhythm pattern, genre context"},{"id":377,"c":"Music","l":"Suno","t":"UK Grime Banger","d":"Medium","r":4.8,"p":"UK grime, aggressive male MC flow, skippy garage rhythm, dark minor key synth stabs, deep sub bass, 140 BPM, London energy, rewind-worthy drop, pirate radio aesthetic"},{"id":378,"c":"Music","l":"Suno","t":"Ambient Meditation","d":"Simple","r":4.7,"p":"Ambient meditation, no percussion, evolving pad textures, binaural beat undertones, nature field recordings (rain, birds), gentle drone, Tibetan singing bowl accents, deeply relaxing, no tempo"},{"id":379,"c":"Ecommerce","l":"Any","t":"Product Page Copy","d":"Medium","r":4.7,"p":"Product page for [ITEM]: Headline (benefit-focused), 3 bullet features, emotional paragraph, size/spec table, FAQ (5 common Qs), trust badges description, urgency element. Audience: [X]."},{"id":380,"c":"Ecommerce","l":"Any","t":"Abandoned Cart Email","d":"Simple","r":4.7,"p":"Abandoned cart email sequence (3 emails):\nEmail 1 (1hr): Friendly reminder, show item\nEmail 2 (24hr): Social proof + urgency\nEmail 3 (72hr): Discount code, last chance\nEach: subject, preview text, body, CTA."},{"id":381,"c":"Ecommerce","l":"Any","t":"Customer Review Reply","d":"Simple","r":4.5,"p":"Reply to these customer reviews professionally. Positive: thank + reinforce. Negative: empathize + solve + take offline. Mixed: acknowledge both + offer help. Keep brand voice. [PASTE REVIEWS]"},{"id":382,"c":"Ecommerce","l":"Any","t":"Flash Sale Campaign","d":"Medium","r":4.6,"p":"Flash sale campaign for [PRODUCTS]: Teaser post (1 day before), announcement, countdown posts (3), last chance, thank you wrap-up. Per post: platform, copy, visual direction, timing."},{"id":383,"c":"Ecommerce","l":"Any","t":"Seasonal Collection Copy","d":"Medium","r":4.5,"p":"Seasonal collection launch for [BRAND]: Collection name, tagline, hero description, 5 individual product descriptions, editorial storytelling paragraph, email announcement, social caption."},{"id":384,"c":"Ecommerce","l":"Any","t":"Comparison Page","d":"Medium","r":4.6,"p":"Comparison page: [OUR PRODUCT] vs [COMPETITOR 1] vs [COMPETITOR 2]. Features table, pricing, pros/cons per option, verdict. Fair but favorably positioned. Include: FAQ addressing common objections."},{"id":385,"c":"UX/UI","l":"Any","t":"User Story Writer","d":"Simple","r":4.7,"p":"Write 10 user stories for [PRODUCT/FEATURE]. Format: As a [user type], I want [goal] so that [benefit]. Include: acceptance criteria (3 per story), priority (must/should/could), story points estimate."},{"id":386,"c":"UX/UI","l":"Any","t":"Usability Test Script","d":"Medium","r":4.6,"p":"Usability test for [PRODUCT/FEATURE]: Intro script, 5 task scenarios, follow-up questions per task, SUS questionnaire, post-test interview Qs (5), observation checklist, debrief template."},{"id":387,"c":"UX/UI","l":"Any","t":"Microcopy Writer","d":"Simple","r":4.6,"p":"Write UX microcopy for [APP/FEATURE]: Empty states (3), error messages (5), success confirmations (3), loading states (3), onboarding tooltips (5). Friendly, clear, under 15 words each. On-brand for [TONE]."},{"id":388,"c":"UX/UI","l":"Any","t":"Accessibility Audit","d":"Medium","r":4.5,"p":"Accessibility audit checklist for [WEBSITE/APP]: WCAG 2.1 AA criteria, color contrast checks, keyboard navigation, screen reader compatibility, alt text review, form labels, focus indicators. Fix priority list."},{"id":389,"c":"Startup","l":"Claude","t":"Pitch Deck Narrative","d":"Advanced","r":4.9,"p":"Pitch deck for [STARTUP]: 12 slides: Cover, Problem, Solution, Market Size (TAM/SAM/SOM), Business Model, Traction, Competition (positioning map), Team, Go-to-Market, Financials (3yr), Ask, Vision. Per slide: key message + talking points."},{"id":390,"c":"Startup","l":"Any","t":"Product Hunt Launch","d":"Medium","r":4.7,"p":"Product Hunt launch plan for [PRODUCT]: Tagline (under 60 chars), description, 5 key features, first comment from maker, hunter strategy, launch day schedule, community engagement plan, assets needed."},{"id":391,"c":"Startup","l":"Any","t":"Pricing Page Strategy","d":"Medium","r":4.7,"p":"Pricing page for [SAAS]: 3 tiers (names, prices, features per tier), recommended tier highlight, annual discount, FAQ (5), enterprise CTA. Psychology: anchoring, decoy effect. Competitor-aware."},{"id":392,"c":"Startup","l":"Any","t":"Fundraising Email","d":"Medium","r":4.6,"p":"Cold email to [VC/ANGEL]: One-line hook about traction, problem in 2 sentences, solution, key metric, team credential, specific ask, soft CTA. Under 150 words. Confident not desperate."},{"id":393,"c":"Health","l":"Any","t":"Mindfulness Script 10m","d":"Simple","r":4.6,"p":"10-minute guided mindfulness script: Settling in (2min), body scan (3min), breath focus (3min), open awareness (1min), gentle return (1min). Calm pacing, pause markers [...], grounding language."},{"id":394,"c":"Health","l":"Any","t":"Injury Rehab Research","d":"Medium","r":4.5,"p":"Research summary for [INJURY TYPE]: What it is, common causes, typical recovery timeline, evidence-based exercises (5), when to see a doctor, what to avoid, return-to-activity criteria. Not medical advice."},{"id":395,"c":"Health","l":"Any","t":"Macro Calculator","d":"Simple","r":4.5,"p":"Calculate macros for: Weight [X], Height [X], Age [X], Activity level [X], Goal [cut/maintain/bulk]. Show: TDEE, calorie target, protein/carbs/fat grams, meal timing suggestions, food examples per macro."},{"id":396,"c":"Health","l":"Any","t":"Weekly Grocery List","d":"Simple","r":4.6,"p":"Healthy grocery list for [DIET TYPE], [N] people, [BUDGET]. Organize by: produce, protein, dairy, pantry, frozen. Estimated cost per category. Seasonal swaps. Meal prep suggestions from these ingredients."},{"id":397,"c":"Email","l":"Any","t":"Price Increase Notice","d":"Medium","r":4.6,"p":"Email announcing price increase for [PRODUCT/SERVICE]. Tone: transparent, grateful. Include: what's changing, when, why (value added), grandfather option if applicable, FAQ link, support contact."},{"id":398,"c":"Email","l":"Any","t":"Partnership Outreach","d":"Medium","r":4.6,"p":"Partnership email to [COMPANY/PERSON]: Genuine compliment about their work, mutual benefit proposition, specific collaboration idea, low-commitment first step, social proof, easy reply CTA. Under 120 words."},{"id":399,"c":"Email","l":"Any","t":"Feedback Request","d":"Simple","r":4.5,"p":"Email requesting feedback after [EVENT/PURCHASE/PROJECT]. Make it easy: 3 specific questions, estimated time (2 min), incentive if applicable, direct link/reply option. Warm, appreciative tone."},{"id":400,"c":"Email","l":"Any","t":"Re-Engagement Win-Back","d":"Medium","r":4.6,"p":"Win-back email for inactive [CUSTOMERS/SUBSCRIBERS]. Subject: curiosity hook. Body: acknowledge absence, what's new (3 updates), exclusive return offer, easy one-click re-engage. Emotional but not guilt-trippy."},{"id":401,"c":"Education","l":"Any","t":"Differentiated Activity","d":"Medium","r":4.6,"p":"Differentiated activity for [TOPIC], [GRADE]. 3 versions: Below level (scaffolded), On level (standard), Above level (extension). Same learning objective, different complexity. Include materials list and timing."},{"id":402,"c":"Education","l":"Any","t":"Discussion Prompt Set","d":"Simple","r":4.5,"p":"10 Socratic discussion questions for [TEXT/TOPIC]. Sequence: 3 comprehension, 3 analysis, 2 evaluation, 2 synthesis. Include: follow-up probes, sentence starters for students, assessment notes."},{"id":403,"c":"Education","l":"Any","t":"IEP Goal Writer","d":"Medium","r":4.5,"p":"IEP goals for [STUDENT DESCRIPTION]: 3 measurable goals using SMART criteria. Each: baseline, target, measurement method, timeline, progress monitoring schedule. Area: [academic/behavioral/social]."},{"id":404,"c":"Education","l":"Any","t":"Project-Based Learning","d":"Advanced","r":4.6,"p":"PBL unit for [TOPIC], [GRADE], [DURATION]. Driving question, standards alignment, milestones, student roles, final product, presentation rubric, reflection prompts, real-world connection."},{"id":405,"c":"Legal","l":"Any","t":"NDA Summary","d":"Medium","r":4.6,"p":"Summarize this NDA in plain English: Parties, what's confidential, what's excluded, duration, obligations, penalties, termination conditions, red flags to watch. [PASTE NDA]"},{"id":406,"c":"Legal","l":"Any","t":"Freelance Contract Checklist","d":"Simple","r":4.5,"p":"Freelance contract checklist for [PROJECT TYPE]: Scope clause, payment terms, revision limits, IP ownership, kill fee, timeline, confidentiality, liability cap, dispute resolution. Flag missing items."},{"id":407,"c":"Finance","l":"Any","t":"Startup Financial Model","d":"Advanced","r":4.6,"p":"Simple financial model for [STARTUP]: Revenue assumptions (3 scenarios), monthly burn rate, runway calculation, unit economics (CAC/LTV), break-even point, 18-month projection. Key assumptions listed."},{"id":408,"c":"Finance","l":"Any","t":"Tax Deduction Checklist","d":"Simple","r":4.5,"p":"Tax deduction checklist for [FREELANCER/SMALL BIZ]: Common deductions by category (home office, travel, equipment, education, insurance), documentation needed, estimated savings, quarterly filing reminders. Not tax advice."},{"id":409,"c":"DevOps","l":"Any","t":"Monitoring & Alerting","d":"Advanced","r":4.6,"p":"Monitoring setup for [SERVICE]: Key metrics (latency, error rate, throughput, saturation), alert thresholds, dashboard layout, PagerDuty escalation rules, runbook per alert, SLI/SLO definitions."},{"id":410,"c":"DevOps","l":"Any","t":"Zero-Downtime Deploy","d":"Advanced","r":4.5,"p":"Zero-downtime deployment strategy for [APP]: Blue-green vs canary vs rolling. Include: health checks, database migration approach, feature flags, rollback triggers, smoke tests, communication plan."},{"id":411,"c":"Image Gen","l":"Any","t":"AI Image Master Formula","d":"Advanced","r":4.9,"p":"Universal AI image formula:\n\n[SUBJECT] + [ACTION/POSE] + [SETTING/BACKGROUND] + [LIGHTING] + [CAMERA/LENS] + [ART STYLE] + [MOOD] + [COLOR PALETTE] + [DETAIL LEVEL]\n\nExamples per slot provided. Mix and match for any AI image tool."},{"id":412,"c":"Image Gen","l":"Any","t":"Negative Prompt Bible","d":"Advanced","r":4.8,"p":"Negative prompt library:\n\nPortraits: bad anatomy, extra fingers, distorted face, watermark\nLandscapes: oversaturated, HDR artifacts, lens flare\nAnime: bad proportions, ugly, low quality\nProducts: text, blur, background clutter\n\nCombine 5-8 per use case."},{"id":413,"c":"Image Gen","l":"Any","t":"Style Mixing Guide","d":"Medium","r":4.7,"p":"Combine art styles for unique results:\n\nGhibli + Cyberpunk = Cozy neon villages\nUkiyo-e + Sci-fi = Japanese woodblock spaceships\nArt Nouveau + Horror = Elegant gothic\nPixar + Dark Fantasy = Cute but menacing\n\nUse weighted prompts: style A::2 style B::1"},{"id":414,"c":"Image Gen","l":"Any","t":"Consistent Style Sheet","d":"Advanced","r":4.7,"p":"Create a style consistency sheet:\n\n1. Color palette: [5 hex codes]\n2. Lighting: [type + direction]\n3. Texture: [smooth/rough/painterly]\n4. Composition: [rule]\n5. Reference images: [URLs]\n\nApply to every prompt for brand consistency."},{"id":415,"c":"Career","l":"Any","t":"LinkedIn Profile Rewrite","d":"Medium","r":4.8,"p":"Rewrite my LinkedIn profile. Current role: [X]. Target role: [X]. Deliver: Headline (120 chars, keyword-rich), About section (hook + story + CTA), 3 Experience bullets per role (XYZ format). Tone: confident, human."},{"id":416,"c":"Career","l":"Any","t":"Salary Negotiation Script","d":"Advanced","r":4.9,"p":"Negotiation script for [ROLE] at [COMPANY]. My ask: [X]. Market data: [X]. Structure: opening (gratitude + enthusiasm), pivot to comp, present range with anchoring, handle 3 objections, walk-away line, closing."},{"id":417,"c":"Career","l":"Claude","t":"Career Pivot Strategy","d":"Advanced","r":4.8,"p":"Career pivot plan from [CURRENT] to [TARGET]. Audit: transferable skills, gaps to fill, bridge roles. 90-day plan: skills to learn, network targets (10), portfolio projects (3), application strategy, story framework for interviews."},{"id":418,"c":"Career","l":"Any","t":"1-on-1 Meeting Prep","d":"Simple","r":4.6,"p":"Prep for 1-on-1 with my manager. Context: [SITUATION]. Want to discuss: [TOPICS]. Deliver: 3 talking points with framing, 1 ask with justification, 1 piece of recognition to give, 1 question to ask. Keep collaborative."},{"id":419,"c":"Career","l":"Any","t":"Performance Review Self-Assessment","d":"Medium","r":4.7,"p":"Self-assessment for performance review. Role: [X]. Accomplishments: [LIST]. Format: 3 key achievements with metrics, growth areas (honest but strategic), goals for next period, development ask. Confident not arrogant."},{"id":420,"c":"Career","l":"Any","t":"90-Day Plan New Role","d":"Medium","r":4.7,"p":"90-day plan for starting as [ROLE] at [COMPANY]. Days 1-30: Learn (people, systems, processes). Days 31-60: Contribute (quick wins, relationships). Days 61-90: Lead (initiatives, strategy). Per phase: 5 actions, success metrics."},{"id":421,"c":"SEO","l":"Any","t":"Keyword Cluster Strategy","d":"Advanced","r":4.8,"p":"Keyword strategy for [NICHE/SITE]. Build topic clusters: 1 pillar page + 5-8 supporting articles per cluster. For each: primary keyword, search intent, estimated difficulty, title, internal link plan. 3 clusters total."},{"id":422,"c":"SEO","l":"Any","t":"Meta Title & Description","d":"Simple","r":4.6,"p":"Write SEO meta tags for [PAGE/ARTICLE]. Title: under 60 chars, keyword front-loaded, click-worthy. Description: under 155 chars, include keyword, benefit-driven, CTA. 3 options each. Target keyword: [X]."},{"id":423,"c":"SEO","l":"Any","t":"Content Gap Analysis","d":"Medium","r":4.7,"p":"Content gap analysis: My site covers [TOPICS]. Competitors rank for [COMPETITOR TOPICS]. Identify: 10 missing topics I should cover, priority order, estimated traffic potential, content type (blog/guide/tool), difficulty."},{"id":424,"c":"SEO","l":"Any","t":"Schema Markup Generator","d":"Medium","r":4.5,"p":"Generate JSON-LD schema markup for [PAGE TYPE: article/product/FAQ/recipe/event/local business]. Fill with: [DETAILS]. Include all required and recommended properties. Validate-ready format."},{"id":425,"c":"SEO","l":"Any","t":"Internal Linking Plan","d":"Medium","r":4.5,"p":"Internal linking strategy for [SITE]. Given these pages: [LIST]. Create: link map showing which pages should link to which, anchor text suggestions, orphan page identification, hub page recommendations."},{"id":426,"c":"SEO","l":"Any","t":"Blog Post SEO Audit","d":"Medium","r":4.7,"p":"SEO audit for this blog post: [PASTE/DESCRIBE]. Check: title tag, meta description, H-tag structure, keyword density, readability, internal links, image alt text, content length, featured snippet opportunity. Fix list."},{"id":427,"c":"YouTube","l":"Any","t":"Video Idea Generator 20","d":"Simple","r":4.8,"p":"20 YouTube video ideas for [NICHE] channel. Per idea: title (click-worthy), hook (first 5 seconds), format type (tutorial/list/story/reaction), estimated audience interest. Mix: 10 trending, 5 evergreen, 5 experimental."},{"id":428,"c":"YouTube","l":"Any","t":"Full Video Script","d":"Advanced","r":4.9,"p":"Full YouTube script for [TOPIC], [X] minutes. Structure:\n- Cold open hook (0-15s)\n- Intro + credibility (15-30s)\n- Main content with pattern interrupts every 2 min\n- [B-ROLL] and [GRAPHIC] cues\n- CTA (sub + like)\n- Outro\nInclude: timestamps, visual directions."},{"id":429,"c":"YouTube","l":"Any","t":"Thumbnail A/B Concepts","d":"Simple","r":4.7,"p":"5 thumbnail concepts for [VIDEO TITLE]. Each: visual description, text overlay (max 4 words), expression/emotion, color psychology, layout (face left/right). Which gets highest CTR and why. Platform: YouTube."},{"id":430,"c":"YouTube","l":"Any","t":"Channel Strategy","d":"Advanced","r":4.7,"p":"YouTube channel strategy for [NICHE]. Define: positioning vs competitors, content pillars (3), upload schedule, thumbnail style, intro/outro template, first 10 video titles, growth milestones (0-1K, 1K-10K, 10K-100K)."},{"id":431,"c":"YouTube","l":"Any","t":"Shorts Script Batch","d":"Simple","r":4.7,"p":"Write 5 YouTube Shorts scripts (under 60s each) for [NICHE]. Each: hook (first 2s), content, payoff. Format: [VISUAL] + spoken script. Optimized for retention. Topics: [X] or suggest viral angles."},{"id":432,"c":"YouTube","l":"Any","t":"Sponsorship Pitch","d":"Medium","r":4.6,"p":"Sponsorship pitch email for [MY CHANNEL] to [BRAND]. Include: audience demographics, engagement metrics, content fit, integration ideas (3 formats), pricing tier, previous brand work, media kit mention. Professional but creator-voiced."},{"id":433,"c":"Thinking","l":"Any","t":"First Principles Breakdown","d":"Advanced","r":4.9,"p":"Break down [PROBLEM/TOPIC] using first principles thinking:\n1. State the assumption everyone makes\n2. Decompose to fundamental truths\n3. Reason up from there\n4. What solution emerges that's non-obvious?\n\nFormat like Elon Musk explaining to a smart friend."},{"id":434,"c":"Thinking","l":"Any","t":"Inversion Thinking","d":"Medium","r":4.8,"p":"Apply inversion to [GOAL]: Instead of asking how to succeed, ask: What would guarantee failure? List 10 failure modes. Now invert each into a success principle. Which 3 are the most overlooked?"},{"id":435,"c":"Thinking","l":"Any","t":"Second-Order Effects","d":"Medium","r":4.7,"p":"Analyze second and third-order effects of [DECISION/EVENT]:\n\n1st order: Immediate, obvious effects (3)\n2nd order: Consequences of consequences (3)\n3rd order: Long-term systemic shifts (3)\n\nWhich order has the biggest impact? What do most people miss?"},{"id":436,"c":"Thinking","l":"Any","t":"Pre-Mortem Analysis","d":"Medium","r":4.8,"p":"Pre-mortem for [PROJECT/DECISION]: Imagine it failed spectacularly. What went wrong?\n\nList 10 failure causes. For each: likelihood, impact, early warning sign, prevention action. Create a risk mitigation dashboard."},{"id":437,"c":"Thinking","l":"Any","t":"Opportunity Cost Calculator","d":"Simple","r":4.6,"p":"Calculate the true opportunity cost of [DECISION]. Compare: Option A vs Option B vs doing nothing. For each: time investment, financial cost, potential upside, risk, reversibility, what you give up. Decision matrix."},{"id":438,"c":"Thinking","l":"Any","t":"10/10/10 Framework","d":"Simple","r":4.6,"p":"Apply the 10/10/10 rule to [DECISION]:\n\nHow will I feel about this decision in:\n- 10 minutes? (emotional reaction)\n- 10 months? (medium-term impact)\n- 10 years? (life trajectory)\n\nWhat does each timeframe reveal? What's the wise choice?"},{"id":439,"c":"Cooking","l":"Any","t":"Recipe from Ingredients","d":"Simple","r":4.8,"p":"Create a recipe using ONLY these ingredients: [LIST]. Dietary restrictions: [X]. Skill level: [X]. Deliver: dish name, total time, step-by-step instructions, plating suggestion, substitution options for missing items."},{"id":440,"c":"Cooking","l":"Any","t":"Meal Prep Sunday Plan","d":"Medium","r":4.7,"p":"Weekly meal prep plan for [DIET/GOAL]. Budget: [X]. Cook once on Sunday, eat all week. Deliver: 5 meals, batch cooking order (efficiency), storage instructions, reheating notes, full grocery list with quantities."},{"id":441,"c":"Cooking","l":"Any","t":"Recipe Scaling Calculator","d":"Simple","r":4.5,"p":"Scale this recipe from [ORIGINAL SERVINGS] to [TARGET SERVINGS]. Adjust all quantities. Flag: items that don't scale linearly (baking powder, spices, cooking times). Note equipment changes needed. [PASTE RECIPE]"},{"id":442,"c":"Cooking","l":"Any","t":"Restaurant-Style at Home","d":"Medium","r":4.7,"p":"Recreate [RESTAURANT DISH] at home. Break down: likely ingredients, technique (professional tips), equipment needed, common mistakes, plating like the restaurant. Difficulty-adjusted for home kitchen."},{"id":443,"c":"Parenting","l":"Any","t":"Age-Appropriate Explanation","d":"Simple","r":4.7,"p":"Explain [DIFFICULT TOPIC] to my [AGE]-year-old. Use: age-appropriate language, relatable analogies, honest but not scary, leaves room for follow-up questions. Include: what NOT to say, and 3 conversation starters."},{"id":444,"c":"Parenting","l":"Any","t":"Behavior Strategy","d":"Medium","r":4.6,"p":"Strategy for [CHILD BEHAVIOR ISSUE]. Child's age: [X]. Include: why this behavior happens developmentally, 3 positive responses, what to avoid, consistency script for both parents, when to seek professional help."},{"id":445,"c":"Parenting","l":"Any","t":"Weekend Activity Planner","d":"Simple","r":4.6,"p":"Weekend activities for kids age [X] in [LOCATION/SEASON]. 5 indoor, 5 outdoor options. Per activity: time needed, materials, learning element, mess level (1-5), fun factor (1-5). Mix educational and pure fun."},{"id":446,"c":"Parenting","l":"Any","t":"Bedtime Story Generator","d":"Simple","r":4.8,"p":"Original bedtime story for a [AGE]-year-old who loves [INTERESTS]. 5 minutes long. Include their name: [NAME]. Gentle adventure, positive message, calming ending. Age-appropriate vocabulary. Optional: recurring character for series."},{"id":447,"c":"Travel","l":"Any","t":"Budget Trip Optimizer","d":"Medium","r":4.8,"p":"Optimize [DESTINATION] trip on [BUDGET]. Duration: [X] days. Find savings: flights (timing/routing), accommodation (neighborhoods), food (local vs tourist), free activities. Daily budget breakdown. Money-saving hacks specific to this destination."},{"id":448,"c":"Travel","l":"Any","t":"Solo Travel Safety Guide","d":"Medium","r":4.6,"p":"Solo travel safety guide for [DESTINATION]. Cover: safe neighborhoods, transportation tips, common scams, emergency numbers, cultural norms, solo dining tips, best areas for solo travelers, digital safety (VPN, data). Gender-aware if relevant."},{"id":449,"c":"Travel","l":"Any","t":"Packing List Generator","d":"Simple","r":4.5,"p":"Packing list for [DESTINATION], [DURATION], [SEASON]. Carry-on only: [YES/NO]. Include: clothes (mix and match), tech, toiletries (TSA-compliant), documents, day bag essentials. Organized by packing cube. Nothing forgotten."},{"id":450,"c":"Travel","l":"Any","t":"Local Experience Finder","d":"Simple","r":4.7,"p":"[DESTINATION] like a local, not a tourist. 10 experiences: hidden restaurants, neighborhood walks, local events, markets, viewpoints, cultural experiences. Skip the tourist traps. Include: best time to visit each, how to find them."},{"id":451,"c":"Midjourney","l":"Midjourney","t":"Studio Ghibli Scene","d":"Simple","r":4.9,"p":"Studio Ghibli animated scene, [DESCRIPTION], lush painted backgrounds, soft watercolor clouds, warm sunlight, magical realism, Miyazaki film still, nostalgic and peaceful --niji 6 --ar 16:9 --style scenic --s 300"},{"id":452,"c":"Midj ":"For [TASK], simulate a panel of 3 experts:\n\nExpert 1: [ROLE] \u2014 focuses on [ANGLE]\nExpert 2: [ROLE] \u2014 focuses on [ANGLE]\nExpert 3: [ROLE] \u2014 focuses on [ANGLE]\n\nEach gives their perspective, then they debate, then synthesize a unified recommendation."},{"id":500,"c":"Prompting","l":"Any","t":"Constraint-Driven Prompt","d":"Simple","r":4.6,"p":"[TASK] with these constraints:\n- Maximum [N] words\n- Must include [ELEMENT]\n- Cannot use [FORBIDDEN THING]\n- Tone: [X]\n- Audience: [X]\n- Format: [X]\n\nConstraints breed creativity. The tighter the box, the sharper the output."},{"id":501,"c":"Data","l":"Any","t":"Spreadsheet Automator","d":"Medium","r":4.7,"p":"Google Sheets/Excel automation for [TASK]: Formulas needed, named ranges, data validation rules, conditional formatting, pivot table setup, automated chart, IMPORTRANGE if multi-sheet. Step-by-step with cell references."},{"id":502,"c":"Data","l":"Any","t":"KPI Definition Doc","d":"Medium","r":4.6,"p":"Define KPIs for [BUSINESS/TEAM]: Per KPI: name, formula, data source, measurement frequency, target value, owner, visualization type. Include: leading vs lagging indicators, North Star metric, counter-metrics to watch."},{"id":503,"c":"Data","l":"Any","t":"Cohort Analysis Setup","d":"Advanced","r":4.6,"p":"Cohort analysis for [PRODUCT]: Define cohorts (signup week/month), metric to track (retention/revenue/engagement), build the cohort table, identify trends, actionable insights from drop-off patterns. SQL + visualization."},{"id":504,"c":"Data","l":"Any","t":"Report Automation Script","d":"Advanced","r":4.5,"p":"Python script to automate [REPORT]: Pull data from [SOURCE], clean and transform, calculate metrics, generate charts (matplotlib/plotly), export to PDF/Excel, email to stakeholders. Scheduled via cron. Include error alerts."},{"id":505,"c":"ChatGPT Image","l":"ChatGPT","t":"Logo Design Concept","d":"Medium","r":4.7,"p":"Create a logo for [BRAND/BUSINESS]. Style: [modern/vintage/playfu
