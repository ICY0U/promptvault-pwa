ting outside real life."},{"id":1489,"c":"Songwriting","l":"Any","t":"Party — Birthday Anthem","d":"Simple","r":4.7,"p":"Write lyrics for an ultimate birthday anthem. It\'s your day, everything revolves around you. The cake, the surprises, the people who showed up. Celebrating surviving another year. VIP energy, main character moment. Make it a universal birthday banger."},{"id":1490,"c":"Songwriting","l":"Any","t":"Nostalgia — School Days","d":"Medium","r":4.7,"p":"Write lyrics about missing school days. The simplicity, the drama that felt enormous, friends you\'ve lost touch with. Playground politics, passing notes, the walk home. You didn\'t know those were the best days while you were living them. Aching for innocence."},{"id":1491,"c":"Songwriting","l":"Any","t":"Nostalgia — Early 2000s Childhood","d":"Medium","r":4.7,"p":"Write lyrics about growing up in the early 2000s. MSN Messenger, Limewire, PS2, Saturday morning TV. Before smartphones changed everything. Specific references that hit millennial/early Gen Z nostalgia. The last generation to play outside AND grow up online."},{"id":1492,"c":"Songwriting","l":"Any","t":"Nostalgia — Grandma's House","d":"Simple","r":4.8,"p":"Write lyrics about the magic of your grandma\'s house. The smell of cooking, the plastic-covered sofa, biscuit tin that never had biscuits. The safest place in the world. Specific sensory details — her perfume, the TV always too loud, her hands. A love letter to grandmothers."},{"id":1493,"c":"Songwriting","l":"Any","t":"Nostalgia — Summer as a Kid","d":"Simple","r":4.8,"p":"Write lyrics about endless childhood summers. Six weeks felt like forever. Water fights, ice cream vans, staying out until dark. No responsibilities, pure freedom. The grass-stained knees, the sunburn, the exhaustion of a day fully lived. You\'d give anything for one more."},{"id":1494,"c":"Songwriting","l":"Any","t":"Nature — Ocean Meditation","d":"Simple","r":4.7,"p":"Write lyrics using the ocean as a metaphor for emotions. Calm surfaces hiding depths, waves of feeling crashing then retreating. The therapeutic power of being near water. Tides as life\'s cycles. Surrender to the current. Peaceful yet powerful."},{"id":1495,"c":"Songwriting","l":"Any","t":"Nature — Climate Anxiety","d":"Medium","r":4.7,"p":"Write lyrics about eco-anxiety and climate grief. Watching the planet burn while scrolling on phones made from its resources. The helplessness of caring about something everyone ignores. Forests falling, oceans rising, politicians stalling. Angry and mourning simultaneously."},{"id":1496,"c":"Songwriting","l":"Any","t":"Nature — Concrete Jungle Escape","d":"Medium","r":4.7,"p":"Write lyrics about escaping the city for nature. Concrete to green, noise to silence, screens to skies. The physical relief of fresh air after weeks of pollution. A weekend in the countryside healing months of urban stress. The pull between where you need to be and where you need to go."},{"id":1497,"c":"Songwriting","l":"Any","t":"Storytelling — The Dealer Who Wants Out","d":"Advanced","r":4.8,"p":"Write a narrative track about a drug dealer trying to go legit. Every time they try to leave, something pulls them back — debts, loyalty, threats. Three verses, three attempts to escape. The tragedy of a cycle that won\'t break. Humanising without glorifying."},{"id":1498,"c":"Songwriting","l":"Any","t":"Storytelling — Two Strangers on a Train","d":"Medium","r":4.7,"p":"Write lyrics telling the story of two strangers who share a train journey. Brief conversation that changes both their lives. Different backgrounds, unexpected connection. They never exchange names. Verse 1 is her story, Verse 2 is his, Verse 3 is their shared moment. Beautiful and fleeting."},{"id":1499,"c":"Songwriting","l":"Any","t":"Storytelling — The Nurse's Shift","d":"Advanced","r":4.8,"p":"Write lyrics following a nurse through a 12-hour shift. The lives they hold, the deaths they witness, the impossible choices. Heroism that looks like exhaustion. Specific scenes — comforting a scared patient, calling time of death, then going home and pretending everything\'s normal. Tribute to healthcare workers."},{"id":1500,"c":"Songwriting","l":"Any","t":"Storytelling — Childhood Best Friends","d":"Medium","r":4.8,"p":"Write lyrics tracking two childhood best friends over 20 years. Inseparable kids, drifting teenagers, reconnecting adults. Verse 1: age 8, building dens. Verse 2: age 16, different paths. Verse 3: age 28, meeting for a drink and realising nothing\'s changed. Time-lapse friendship."},{"id":1501,"c":"Songwriting","l":"Any","t":"Storytelling — Last Day of a Soldier","d":"Advanced","r":4.8,"p":"Write lyrics following a soldier\'s last day before deployment. Morning with family, the things left unsaid, the brave face. Writing a letter just in case. The drive to the base, looking back at home in the mirror. Not anti-war propaganda — personal and human. The weight of service."},{"id":1502,"c":"Songwriting","l":"Any","t":"Self-Discovery — Quarter Life Crisis","d":"Medium","r":4.7,"p":"Write lyrics about the quarter-life crisis. Mid-twenties, expected to have it figured out but you\'re more lost than ever. Comparing yourself to others\' highlights. Career confusion, relationship uncertainty, existential dread in a rented flat. Everyone\'s faking it — right?"},{"id":1503,"c":"Songwriting","l":"Any","t":"Self-Discovery — Leaving Religion","d":"Advanced","r":4.7,"p":"Write lyrics about leaving a religion you were raised in. The guilt, the freedom, the loss of community. Questioning everything you were taught. Family relationships strained. Finding your own moral compass without a holy book. Liberating and lonely in equal measure."},{"id":1504,"c":"Songwriting","l":"Any","t":"Self-Discovery — Coming Out","d":"Medium","r":4.8,"p":"Write lyrics about coming out — whatever that means for the individual. The years of hiding, the fear of rejection, the moment of truth. The relief and terror of being seen. Not everyone\'s reaction will be love. But being yourself is no longer optional. Brave and necessary."},{"id":1505,"c":"Songwriting","l":"Any","t":"Self-Discovery — Therapy Breakthrough","d":"Medium","r":4.7,"p":"Write lyrics about having a breakthrough moment in therapy. The wall you\'ve been hitting suddenly crumbles. Understanding why you do what you do. The ugly cry that\'s actually beautiful. The terrifying relief of finally getting it. A before and after moment."},{"id":1506,"c":"Songwriting","l":"Any","t":"Self-Discovery — Solo Travel","d":"Medium","r":4.7,"p":"Write lyrics about travelling alone for the first time. Terrifying freedom, eating alone, navigating foreign places with just yourself. Who are you when nobody knows your name? The conversations with strangers, the silence with yourself. Coming home as someone new."},{"id":1507,"c":"Songwriting","l":"Any","t":"Generational — Letter to My Younger Self","d":"Medium","r":4.8,"p":"Write lyrics as a letter to your younger self. The warnings, the reassurances, the things you wish they knew. Don\'t worry about the bullies, the heartbreak heals, that dream does come true. Tender and specific. What age would you write to? What would you change?"},{"id":1508,"c":"Songwriting","l":"Any","t":"Generational — Millennials vs Boomers","d":"Medium","r":4.6,"p":"Write lyrics about generational conflict with humour and truth. Boomers say entitled, millennials say exploited. Avocado toast economics, housing market reality, \'back in my day\' vs \'OK boomer.\' Not mean-spirited — finding common ground beneath the stereotypes."},{"id":1509,"c":"Songwriting","l":"Any","t":"Generational — Gen Z Anthem","d":"Simple","r":4.7,"p":"Write lyrics that capture the Gen Z experience. Growing up in chaos — pandemic, climate crisis, political polarisation — but also the most connected, creative, and aware generation yet. TikTok philosophers, side hustle culture, refusing to accept the world as it is."},{"id":1510,"c":"Songwriting","l":"Any","t":"Generational — Raising Kids in This World","d":"Medium","r":4.7,"p":"Write lyrics about the fear and hope of raising children today. School shootings, online predators, climate change — but also kindness, technology, possibility. Wanting to protect them from everything while knowing you can\'t. The impossible job of modern parenting."},{"id":1511,"c":"Songwriting","l":"Any","t":"Dark — Intrusive Thoughts","d":"Advanced","r":4.7,"p":"Write lyrics about intrusive thoughts — the dark, involuntary thoughts that flash through your mind. Not who you are but what your brain tortures you with. The shame of having thoughts you\'d never act on. The exhausting mental battle of OCD and intrusive thinking. Destigmatising and honest."},{"id":1512,"c":"Songwriting","l":"Any","t":"Dark — The Narcissist","d":"Medium","r":4.7,"p":"Write lyrics from the perspective of someone escaping a narcissistic relationship. Gaslighting, love-bombing, the cycle of idealise and discard. Slowly realising the love was manipulation. The painful recovery of learning to trust yourself again. Survival anthem."},{"id":1513,"c":"Songwriting","l":"Any","t":"Dark — Haunted House Mind","d":"Medium","r":4.7,"p":"Write lyrics comparing your mind to a haunted house. Each room holds a different trauma, ghosts of past selves wandering corridors. Some doors you\'ve locked and lost the key. Visitors only see the exterior. Living in a place you can never fully leave."},{"id":1514,"c":"Songwriting","l":"Any","t":"Dark — Stalker Perspective","d":"Advanced","r":4.6,"p":"Write lyrics exploring obsession from a disturbing perspective. Not glorifying — exposing the twisted logic. Every action justified in their mind. Watching, waiting, collecting details. The horror of being someone\'s fixation. Uncomfortable but important storytelling."},{"id":1515,"c":"Songwriting","l":"Any","t":"Drill — Court Date Tomorrow","d":"Advanced","r":4.7,"p":"Write drill lyrics about facing court tomorrow. The sleepless night before, going through scenarios. Suit pressed, barrister prepped, but nothing\'s guaranteed. Your mum\'s face in the gallery. The system that\'s not built for you. Real stakes, real consequences. UK drill reality."},{"id":1516,"c":"Songwriting","l":"Any","t":"Drill — New Generation","d":"Medium","r":4.7,"p":"Write drill lyrics about being the new generation of UK drill. Paying respect to pioneers while pushing the sound forward. Fresh flows, new energy, same streets. Not just violence — drill as a voice for the voiceless. Evolving the genre."},{"id":1517,"c":"Songwriting","l":"Any","t":"R&B — Friends with Benefits","d":"Medium","r":4.7,"p":"Write R&B lyrics about a friends-with-benefits situation going wrong. Someone caught feelings, probably you. The rules were clear but hearts don\'t follow rules. Pretending casual when it\'s anything but. The conversation you need to have but are terrified of."},{"id":1518,"c":"Songwriting","l":"Any","t":"R&B — Morning After","d":"Simple","r":4.7,"p":"Write R&B lyrics about the morning after spending the night together for the first time. Sun through curtains, them sleeping peacefully, not wanting to move. Breakfast together, shy smiles, replaying last night. The gentle intimacy of morning light. Tender and warm."},{"id":1519,"c":"Songwriting","l":"Any","t":"Pop — Revenge Glow Up","d":"Simple","r":4.8,"p":"Write pop lyrics about the ultimate revenge glow up. You got fit, got successful, got happy — and your ex is watching. Not bitter anymore, just thriving. The best version of yourself was hiding behind someone who held you back. Living well is the best revenge."},{"id":1520,"c":"Songwriting","l":"Any","t":"Pop — Dancing Alone","d":"Simple","r":4.7,"p":"Write pop lyrics about the freedom and joy of dancing alone. In your room, at a club, wherever — not performing for anyone but yourself. Liberation from self-consciousness. Your body knows the rhythm your brain forgot. Self-celebration through movement."},{"id":1521,"c":"Songwriting","l":"Any","t":"Rock — Burning Bridges","d":"Medium","r":4.7,"p":"Write rock lyrics about deliberately burning bridges. Done being diplomatic, done keeping peace. Saying everything you\'ve held back, consequences be damned. The cathartic destruction of relationships that were holding you hostage. Liberating rage."},{"id":1522,"c":"Songwriting","l":"Any","t":"Rock — Last Band Standing","d":"Medium","r":4.7,"p":"Write rock lyrics about being in a band that refuses to give up. Decades of playing to empty rooms, one hit wonder almost, industry rejection. But the music keeps you alive. Four people against the world. The romantic stubbornness of believing in your art."},{"id":1523,"c":"Songwriting","l":"Any","t":"Country — Weathered Hands","d":"Medium","r":4.7,"p":"Write country lyrics about a father\'s weathered hands. The calluses from years of manual labour, the tenderness those same hands showed. Building, fixing, providing — never complaining. A tribute to blue-collar fathers through the detail of their hands."},{"id":1524,"c":"Songwriting","l":"Any","t":"Country — Front Porch Memories","d":"Simple","r":4.7,"p":"Write country lyrics about sitting on the front porch with family. Generations of stories told in the same rocking chairs. Lightning bugs, sweet tea, guitar picked lazily. The tradition of porches as places where life happens. Timeless and grounded."},{"id":1525,"c":"Songwriting","l":"Any","t":"Gospel — Testimony","d":"Medium","r":4.7,"p":"Write gospel lyrics sharing a personal testimony. Where you were in the darkness, how faith found you, where you are now. Specific and authentic — not just \'I was lost, now I\'m found\' but the actual story. The congregation should feel your journey. Powerful witness."},{"id":1526,"c":"Songwriting","l":"Any","t":"Gospel — Sunday Morning Praise","d":"Simple","r":4.7,"p":"Write gospel praise lyrics for Sunday morning worship. Joyful, uplifting, hands-raised energy. Thanking God for waking up, for breath, for blessings seen and unseen. Congregational — everyone can sing along. The church as sanctuary. Pure celebration of faith."},{"id":1527,"c":"Songwriting","l":"Any","t":"Sports — Underdog Championship","d":"Medium","r":4.7,"p":"Write lyrics from the perspective of an underdog athlete in the championship moment. Years of training, everyone counted you out, this is your shot. The crowd noise fading to silence as you focus. One moment to change everything. Rocky meets real life. Cinematic triumph."},{"id":1528,"c":"Songwriting","l":"Any","t":"Sports — Injury Comeback","d":"Medium","r":4.7,"p":"Write lyrics about an athlete recovering from a career-threatening injury. The surgery, the rehab, the dark days of wondering if you\'ll ever compete again. The first time you run again, play again, compete again. Comeback stories are the greatest stories."},{"id":1529,"c":"Songwriting","l":"Any","t":"Sports — Last Game Ever","d":"Medium","r":4.8,"p":"Write lyrics about playing your final game before retirement. Looking around the stadium one last time. The roar you\'ll never hear again. Teammates who became family. Taking off the shirt for the last time. Identity crisis — who are you without this? Bittersweet farewell."},{"id":1530,"c":"Songwriting","l":"Any","t":"Anger — Workplace Rage","d":"Medium","r":4.7,"p":"Write lyrics about workplace frustration. The boss who takes credit, the meetings that should be emails, the performance review that\'s a joke. Corporate gaslighting wrapped in HR speak. The fantasy of telling them all exactly what you think. Office rebellion anthem."},{"id":1531,"c":"Songwriting","l":"Any","t":"Anger — Gaslighting Exposé","d":"Medium","r":4.8,"p":"Write lyrics calling out a gaslighter. \'That never happened,\' \'You\'re being crazy,\' \'I never said that.\' Cataloguing every lie, every manipulation, every time they made you doubt your own reality. The moment you see through it all. Empowering clarity after confusion."},{"id":1532,"c":"Songwriting","l":"Any","t":"Anger — Enough Is Enough","d":"Medium","r":4.8,"p":"Write lyrics about the exact moment you snap. You\'ve been patient, understanding, forgiving — and they took that for weakness. This is the last time. The volcanic eruption after years of swallowing fire. Controlled fury that\'s been building since forever."},{"id":1533,"c":"Songwriting","l":"Any","t":"Philosophical — What Happens When We Die","d":"Advanced","r":4.7,"p":"Write lyrics exploring what happens after death. Not from a religious perspective necessarily — just honest questioning. Heaven, nothing, reincarnation, energy dispersing? The fear and the curiosity. A conversation everyone thinks about but nobody wants to have."},{"id":1534,"c":"Songwriting","l":"Any","t":"Philosophical — Free Will Illusion","d":"Advanced","r":4.6,"p":"Write lyrics questioning whether free will exists. Are your choices really yours or just neurons firing? The terrifying comfort of determinism. If everything\'s predetermined, does anything matter? Or does everything matter more? Brain-bending bars over atmospheric production."},{"id":1535,"c":"Songwriting","l":"Any","t":"Philosophical — Time Is a Flat Circle","d":"Advanced","r":4.7,"p":"Write lyrics about the circular nature of time and history repeating. The same mistakes, different centuries. Empires rise and fall in the same patterns. Personal cycles too — dating the same person in different bodies. Breaking the loop requires consciousness."},{"id":1536,"c":"Songwriting","l":"Any","t":"Philosophical — Simulation Theory","d":"Medium","r":4.6,"p":"Write lyrics exploring simulation theory. What if none of this is real? Glitches in the matrix — déjà vu, coincidences too perfect, the uncanny feeling that someone\'s watching. Playful but genuinely philosophical. The existential crisis of the digital age."},{"id":1537,"c":"Songwriting","l":"Any","t":"Empowerment — Body Positivity","d":"Medium","r":4.8,"p":"Write lyrics celebrating your body exactly as it is. Stretch marks as tiger stripes, scars as stories, every curve and edge earned. Rejecting photoshop standards, embracing the mirror. Not aspirational — present tense. You\'re not working towards beautiful — you already are."},{"id":1538,"c":"Songwriting","l":"Any","t":"Empowerment — Single and Thriving","d":"Simple","r":4.7,"p":"Write lyrics about genuinely loving single life. Not settling, not searching, just living. The freedom of answering to nobody. Travelling alone, eating what you want, sleeping diagonally. Society says you need a partner — you disagree. Wholeness without a plus-one."},{"id":1539,"c":"Songwriting","l":"Any","t":"Empowerment — Reclaiming Your Name","d":"Medium","r":4.8,"p":"Write lyrics about reclaiming your reputation after it was dragged through the mud. Rumours, lies, cancellation attempts — and you survived all of it. They said who you are but they were wrong. Now you\'re defining yourself on your own terms. Resurrection anthem."},{"id":1540,"c":"Songwriting","l":"Any","t":"Family — Divorce Kid","d":"Medium","r":4.8,"p":"Write lyrics from the perspective of a child of divorce. Two houses, two Christmases, the suitcase always packed. Being caught in the middle of adult problems. The guilt of loving both parents while they hate each other. Growing up fast because you had to."},{"id":1541,"c":"Songwriting","l":"Any","t":"Family — Estranged Parent Reunion","d":"Advanced","r":4.8,"p":"Write lyrics about meeting an estranged parent after years of no contact. The anger, the hope, the questions. Do you want an explanation or an apology? Can you forgive? The awkward coffee, the lifetime of silence between sentences. Emotionally complex reunion."},{"id":1542,"c":"Songwriting","l":"Any","t":"Family — Brother's Keeper","d":"Medium","r":4.7,"p":"Write lyrics about protecting a younger sibling from the same mistakes you made. Steering them away from the roads, the people, the choices that nearly destroyed you. The fear of them not listening. You failed so they wouldn\'t have to. Guardian angel in human form."},{"id":1543,"c":"Songwriting","l":"Any","t":"Family — Foster Care Story","d":"Advanced","r":4.8,"p":"Write lyrics about growing up in the foster care system. Moving homes, never unpacking fully, learning not to get attached. The social workers, the other kids, the families that were temporary. Searching for belonging in a system designed for survival, not love."},{"id":1544,"c":"Songwriting","l":"Any","t":"Loss — Empty Chair at Christmas","d":"Advanced","r":4.9,"p":"Write lyrics about the first Christmas after losing someone. Their stocking still hung, their favourite song on the radio, the seat nobody sits in. The family trying to be festive through grief. The cruelest holiday when someone\'s missing. Devastating and deeply specific."},{"id":1545,"c":"Songwriting","l":"Any","t":"Loss — Miscarriage","d":"Advanced","r":4.9,"p":"Write lyrics about the grief of miscarriage. A loss that society doesn\'t fully acknowledge. The nursery that won\'t be used, the name that won\'t be called, the future that vanished. The isolation of grieving someone the world never met. Tender, honest, necessary."},{"id":1546,"c":"Songwriting","l":"Any","t":"Loss — Losing a Pet","d":"Medium","r":4.8,"p":"Write lyrics about losing a beloved pet. The house suddenly silent, their spot on the sofa empty. They were family — anyone who says \'it\'s just an animal\' never loved one. The unconditional love that\'s impossible to replace. They were the best part of coming home."},{"id":1547,"c":"Songwriting","l":"Any","t":"Loss — Dementia Goodbye","d":"Advanced","r":4.9,"p":"Write lyrics about watching someone you love disappear into dementia. They\'re physically here but mentally gone. The moments of clarity that break your heart worse. Grieving someone who\'s still alive. The cruelest kind of loss — gradual and relentless. For all the families watching someone fade."},{"id":1548,"c":"Songwriting","l":"Any","t":"Night Life — Last Orders","d":"Medium","r":4.7,"p":"Write lyrics about last orders at the pub. The bartender calling time, not ready for the night to end. Deep conversations that only happen after midnight. Stumbling out into cold air, kebab shop pilgrimage, the walk home with your best mate. British nightlife ritual."},{"id":1549,"c":"Songwriting","l":"Any","t":"Night Life — The Bouncer","d":"Medium","r":4.6,"p":"Write lyrics from a nightclub bouncer\'s perspective. They see everything — the fights, the tears, the proposals, the best and worst of people. Standing in the cold all night, judging shoes and attitudes. The stories nobody tells from the door. Observational and human."},{"id":1550,"c":"Songwriting","l":"Any","t":"Night Life — 5AM Walk Home","d":"Medium","r":4.7,"p":"Write lyrics about the 5AM walk home alone after a night out. The city empty, your thoughts loud. Slightly drunk, slightly philosophical. The strange beauty of dawn breaking over empty streets. Fast food wrapper tumbling in the wind. Liminal space between night and day."},{"id":1551,"c":"Songwriting","l":"Any","t":"Emotional — Happy Crying","d":"Simple","r":4.7,"p":"Write lyrics about crying from happiness. Those overwhelming moments — a wedding, a birth, achieving the impossible. Tears that taste different, that feel like release and celebration. The world blurring through joy. It\'s okay to fall apart when life comes together."},{"id":1552,"c":"Songwriting","l":"Any","t":"Emotional — Grief Comes in Waves","d":"Medium","r":4.8,"p":"Write lyrics about how grief ambushes you. You\'re fine for weeks, then a song or a smell or a Tuesday afternoon shatters you. Grief isn\'t linear — it\'s a tide that retreats and crashes without warning. Learning to swim in an ocean that appeared overnight."},{"id":1553,"c":"Songwriting","l":"Any","t":"Emotional — The Good Days","d":"Simple","r":4.8,"p":"Write lyrics celebrating the good days. Not milestones — just regular Tuesdays where everything clicks. You slept well, traffic was kind, someone smiled at you. The quiet victories that don\'t make highlight reels but make life worth living. Gratitude for the ordinary."},{"id":1554,"c":"Songwriting","l":"Any","t":"Emotional — Numb","d":"Medium","r":4.7,"p":"Write lyrics about emotional numbness. Not sadness — the absence of feeling anything at all. Going through life on autopilot. Everyone asks what\'s wrong but you genuinely don\'t know. The terrifying flatline of feeling nothing. Wanting to cry but your eyes forgot how."},{"id":1555,"c":"Songwriting","l":"Any","t":"Rap — 32 Bar Storytelling Challenge","d":"Advanced","r":4.8,"p":"Write a full 32-bar rap with a complete story arc. Setup, conflict, climax, resolution — all in 32 bars. Every line should matter, no filler. Tight internal rhyme scheme, vivid imagery, character development. A short film in bars. Ultimate pen game test."},{"id":1556,"c":"Songwriting","l":"Any","t":"Rap — Concept: Reverse Chronology","d":"Advanced","r":4.7,"p":"Write rap verses telling a story backwards. Start at the end — the consequence — and work back to the beginning — the choice. Each verse rewinds further. By the final verse, the listener understands how it all started. Memento in bar form. Structural creativity."},{"id":1557,"c":"Songwriting","l":"Any","t":"Rap — Battle Bars Blueprint","d":"Advanced","r":4.7,"p":"Write 16 bars of battle rap designed to win a clash. Personal yet universal enough to use. Devastating punchlines, name-flipping potential, crowd-reaction bars. Study Don\'t Flop and King of the Dot. Each bar should be quotable. Designed for the ring."},{"id":1558,"c":"Songwriting","l":"Any","t":"Rap — Conscious Bars","d":"Advanced","r":4.8,"p":"Write 16 bars of conscious rap addressing a social issue. Educational without being boring, lyrical without sacrificing message. Facts woven into flow. Lowkey meets Immortal Technique. Make the listener think while their head nods. Substance and style equally."},{"id":1559,"c":"Songwriting","l":"Any","t":"Song Structure — Verse Chorus Bridge","d":"Simple","r":4.7,"p":"Write a complete song structure — Verse 1, Pre-Chorus, Chorus, Verse 2, Pre-Chorus, Chorus, Bridge, Final Chorus. Fill every section with lyrics. Theme: overcoming self-doubt. Show how a full song moves through emotional stages. Training wheels for complete songs."},{"id":1560,"c":"Songwriting","l":"Any","t":"Song Structure — No Chorus Challenge","d":"Medium","r":4.7,"p":"Write a complete song with NO chorus. Three verses that build on each other, bridges connecting them, outro that serves as climax. Prove you don\'t need a hook to keep people listening. Through-composed songwriting. Storytelling that doesn\'t repeat."},{"id":1561,"c":"Songwriting","l":"Any","t":"Hooks — Question Hooks","d":"Medium","r":4.7,"p":"Generate 10 hook ideas that are questions. Questions as choruses are powerful — they make the listener answer internally. \'Is anybody out there?\', \'What if I told you?\', \'Why does it always rain on me?\' Format. Mix rhetorical and genuine. Universal questioning."},{"id":1562,"c":"Songwriting","l":"Any","t":"Hooks — Single Word Hooks","d":"Simple","r":4.7,"p":"Generate 10 hook concepts built around a single repeated word. Like \'Stay\', \'Closer\', \'Help\', \'Breathe.\' The word carries the weight, the melody makes it emotional. Simple, powerful, universal. Show how one word can be an entire chorus with the right delivery."},{"id":1563,"c":"Songwriting","l":"Any","t":"Pre-Chorus — Tension Builders","d":"Medium","r":4.7,"p":"Write 10 pre-chorus sections designed to build tension before a big chorus lands. The musical lift, the lyrical pivot, the moment that makes the chorus hit harder. Study how Billie Eilish, The Weeknd, and Adele use pre-choruses. The unsung hero of song structure."},{"id":1564,"c":"Songwriting","l":"Any","t":"Outros — Lasting Impressions","d":"Medium","r":4.6,"p":"Write 10 outro sections that leave lasting impressions. The final words of a song matter — they echo in the listener\'s mind. Whispered confessions, repeated mantras, unexpected twists. How you end is what people remember. The art of closing a song."},{"id":1565,"c":"Songwriting","l":"Any","t":"Surreal — Lucid Dream","d":"Medium","r":4.6,"p":"Write lyrics about a lucid dream where you control everything. Flying over cities, talking to the dead, reshaping reality. But the alarm is coming. The desperate attempt to stay asleep, to hold onto a world better than waking. The cruelty of consciousness."},{"id":1566,"c":"Songwriting","l":"Any","t":"Surreal — Parallel Universe","d":"Medium","r":4.6,"p":"Write lyrics imagining a parallel universe where you made different choices. The other you who said yes, who stayed, who left, who tried. Is that version happier? Are you better off? The infinite \'what ifs\' of multiverse thinking. Speculative and emotional."},{"id":1567,"c":"Songwriting","l":"Any","t":"Surreal — Conversation with Death","d":"Advanced","r":4.7,"p":"Write lyrics as a conversation with Death personified. Not scary — almost friendly. Death as a patient companion who\'s been walking beside you your whole life. Questions and answers about life\'s meaning, what\'s on the other side, why now. Philosophical and haunting."},{"id":1568,"c":"Songwriting","l":"Any","t":"Money — From Benefits to Business","d":"Medium","r":4.7,"p":"Write lyrics about going from government benefits to running your own business. The shame they tried to put on you, the hustle nobody saw, the paperwork, the risk. Now you employ people who look like you came from where you came from. Ultimate glow up story."},{"id":1569,"c":"Songwriting","l":"Any","t":"Money — Generational Wealth","d":"Medium","r":4.7,"p":"Write lyrics about building generational wealth. Breaking the cycle of poverty. Property investments, savings accounts for kids who aren\'t born yet. Thinking in decades, not days. Your grandkids will never know the struggle — that\'s the goal. Legacy building."},{"id":1570,"c":"Songwriting","l":"Any","t":"Money — Rich and Empty","d":"Medium","r":4.7,"p":"Write lyrics about achieving financial success but feeling emptier than ever. The house is big but lonely, the car is fast but going nowhere meaningful. Everyone wants your money, nobody wants you. The lie that was sold — money fixes everything. It fixes everything except the important things."},{"id":1571,"c":"Songwriting","l":"Any","t":"Duet — Argument Song","d":"Advanced","r":4.7,"p":"Write a male-female duet where both are arguing their side of a relationship fight. Alternating bars, interrupting each other, talking over each other. By the bridge, they stop fighting and admit what they\'re really scared of. Real-time conflict resolution in song form."},{"id":1572,"c":"Songwriting","l":"Any","t":"Duet — Ex Meets Ex","d":"Advanced","r":4.7,"p":"Write a song where two exes of the same person compare notes. They discover the same lies, same patterns, same promises. Initially bonding over shared experience, then realising the deeper truth. Sisters/brothers in heartbreak. Darkly comedic and eventually empowering."},{"id":1573,"c":"Songwriting","l":"Any","t":"Duet — Parent and Child Through the Years","d":"Advanced","r":4.8,"p":"Write a duet between a parent and child at different ages. Verse 1: child is 5, parent explains the world. Verse 2: child is 15, they clash. Verse 3: child is 25, they finally understand. Chorus is what they both feel but can\'t say. Tearjerker intergenerational love song."},{"id":1574,"c":"Songwriting","l":"Any","t":"Mood — Sunday Evening Dread","d":"Medium","r":4.7,"p":"Write lyrics about Sunday evening dread. The weekend evaporating, Monday looming. The laundry isn\'t done, the meal prep wasn\'t prepped, and that sinking feeling in your stomach. The universal weekly grief of losing freedom. The most relatable anxious moment."},{"id":1575,"c":"Songwriting","l":"Any","t":"Mood — 3AM Clarity","d":"Medium","r":4.7,"p":"Write lyrics about the strange clarity that comes at 3AM. When the world is asleep and your mind is wide awake. Truths you hide in daylight become obvious. Decisions you\'ve been avoiding become clear. The witching hour for self-reflection. Dark but enlightening."},{"id":1576,"c":"Songwriting","l":"Any","t":"Mood — Rain as Therapy","d":"Simple","r":4.7,"p":"Write lyrics about rain as emotional therapy. Walking in the rain deliberately, letting it wash away the noise. The soundtrack of drops on concrete, the world blurring through tears or rain — does it matter? The only weather that matches the insides of a hurting soul. Cathartic and poetic."},{"id":1577,"c":"Songwriting","l":"Any","t":"Mood — Golden Hour Love","d":"Simple","r":4.8,"p":"Write lyrics set during golden hour. Everything glowing amber, time slowing down. Looking at someone you love in perfect light. The magic of that 20-minute window when the world is cinematic. Warm, tender, and luminous. Photograph in song form."},{"id":1578,"c":"Songwriting","l":"Any","t":"Genre Fusion — Afrobeats R&B","d":"Medium","r":4.7,"p":"Write lyrics blending Afrobeats rhythm with R&B vocal melodic style. West African energy meets smooth American soul. Love song with Afrobeats foundation but R&B delivery. Perfect for artists like Burna Boy collaboration with SZA energy. Seamless genre bridge."},{"id":1579,"c":"Songwriting","l":"Any","t":"Genre Fusion — Grime Pop","d":"Medium","r":4.6,"p":"Write lyrics fusing grime energy with pop catchiness. Aggressive bars that melt into singable choruses. Stormzy\'s softer moments meet his hardest bars in one track. The contrast creates dynamics. Verse bars are grime, chorus is pop, bridge surprises everyone."},{"id":1580,"c":"Songwriting","l":"Any","t":"Genre Fusion — Trap Soul","d":"Medium","r":4.7,"p":"Write trap soul lyrics — the sweet spot between trap and R&B. Hard 808s but soft vocals. Street talk but pillow talk. Bryson Tiller blueprint. Vulnerable lyrics over tough production. The contrast of hard and soft that defined a generation of music."},{"id":1581,"c":"Songwriting","l":"Any","t":"Decade — 90s Kid Anthem","d":"Medium","r":4.7,"p":"Write lyrics celebrating being a 90s kid. Tamagotchis, Spice Girls, SEGA vs Nintendo, recording songs off the radio. Before internet changed everything. Blockbuster Friday nights, yo-yos and pogs. The last generation of simplicity. Time capsule in song form."},{"id":1582,"c":"Songwriting","l":"Any","t":"Decade — 80s Synth Love","d":"Medium","r":4.6,"p":"Write lyrics that capture 80s synth-pop romance. Neon lights, slow dancing at the disco, big hair and bigger feelings. John Hughes movie energy. The innocence of analogue romance. Structurally — simple verse/chorus/verse with an emotional bridge. Retro and timeless."},{"id":1583,"c":"Songwriting","l":"Any","t":"Decade — 2010s Nostalgia","d":"Simple","r":4.7,"p":"Write lyrics about missing the 2010s. Vine, early Instagram, Drake\'s dominance, festival culture peak. Before everything got serious. The last decade of fun before the world went sideways. Specific references that hit — Snapchat streaks, aux cord battles, specific songs that defined that era."},{"id":1584,"c":"Songwriting","l":"Any","t":"Concept — Last Song Ever Written","d":"Advanced","r":4.7,"p":"Write lyrics as if this is the last song that will ever be written. Music is ending. What do you say when it\'s the final song humanity will hear? Everything important, everything true, compressed into one piece. A time capsule for future species. The ultimate responsibility."},{"id":1585,"c":"Songwriting","l":"Any","t":"Concept — Song for Someone Who Doesn't Exist Yet","d":"Medium","r":4.7,"p":"Write lyrics as a message to a future person — your unborn child, a future lover, someone you\'ll meet in ten years. Telling them what you needed them to know before they arrived. Welcome to my life, here\'s what you\'re walking into. Letter to the future."},{"id":1586,"c":"Songwriting","l":"Any","t":"Concept — The Taxi Driver Knows Everything","d":"Medium","r":4.7,"p":"Write lyrics from a taxi driver\'s perspective. They\'ve heard every story — breakups, confessions, celebrations, breakdowns. The backseat is a confessional. Three verses, three different passengers, one driver who absorbs it all. The most informed stranger in the world."},{"id":1587,"c":"Songwriting","l":"Any","t":"Concept — Playlist for My Funeral","d":"Medium","r":4.7,"p":"Write lyrics about creating a playlist for your own funeral. What songs define your life? What mood do you want people to feel? The strange exercise of curating your own goodbye. Specific songs referenced, what they mean to you. Morbid but deeply personal."},{"id":1588,"c":"Songwriting","l":"Any","t":"Concept — If Walls Could Talk","d":"Medium","r":4.8,"p":"Write lyrics from the perspective of the walls of a house. Every family that\'s lived there, every argument, every celebration. The walls witnessed births and deaths, first steps and last breaths. Architecture as memory keeper. The stories embedded in plaster and brick."},{"id":1589,"c":"Songwriting","l":"Any","t":"Concept — Dear Landlord","d":"Medium","r":4.7,"p":"Write lyrics as a letter to your landlord. The mould they ignore, the rent they raise, the deposit they\'ll never return. Passive-aggressive sincerity. The power imbalance of the renting generation. Funny but genuinely angry. A millennial battle cry."},{"id":1590,"c":"Songwriting","l":"Any","t":"Concept — Living in Photographs","d":"Medium","r":4.7,"p":"Write lyrics about living through photographs. We photograph everything but experience nothing. The concert you watched through your phone screen. The meal that went cold while you got the angle right. Trading memories for content. Are you living or documenting?"},{"id":1591,"c":"Songwriting","l":"Any","t":"UK Life — London vs Everyone","d":"Medium","r":4.7,"p":"Write lyrics about the love-hate relationship with London. The expense, the pace, the rudeness — but also the culture, the diversity, the opportunity. Can\'t afford to stay, can\'t imagine leaving. Everyone outside London doesn\'t understand. The capital city identity crisis."},{"id":1592,"c":"Songwriting","l":"Any","t":"UK Life — Northern Pride","d":"Medium","r":4.7,"p":"Write lyrics celebrating Northern England identity. Manchester, Leeds, Liverpool, Sheffield — heart and grit. The warmth of northerners, the humour, the no-nonsense attitude. Chip on the shoulder because the south gets everything. Proud of where you\'re from, unapologetically."},{"id":1593,"c":"Songwriting","l":"Any","t":"UK Life — NHS Love Letter","d":"Medium","r":4.8,"p":"Write lyrics as a love letter to the NHS. From birth to old age, always there. The nurses, the doctors, the waiting rooms at 3AM. Underfunded, understaffed, still standing. The greatest thing this country ever built. Protect it at all costs. National treasure anthem."},{"id":1594,"c":"Songwriting","l":"Any","t":"UK Life — Chicken Shop Date","d":"Simple","r":4.6,"p":"Write lyrics about a chicken shop date. The most British thing — meeting someone at Morley\'s or Sam\'s. Paper plates, no pretension, just vibes. If they eat wings without cutlery, they\'re real. The romance of unpretentious courtship. Funny, sweet, authentic."},{"id":1595,"c":"Songwriting","l":"Any","t":"Technique — Rhyme Scheme ABAB","d":"Simple","r":4.6,"p":"Write 16 bars using strict ABAB rhyme scheme. Every odd line rhymes with the next odd line, every even with the next even. This is the most classic and singable pattern. Theme: celebrating friendship. Technical discipline that creates natural flow."},{"id":1596,"c":"Songwriting","l":"Any","t":"Technique — Internal Rhyme Master","d":"Advanced","r":4.7,"p":"Write 16 bars where every single line contains at least one internal rhyme. The words within each bar rhyme with each other, not just at the end. Eminem-level internal structure. Theme: rising above haters. Technical showcase of rhyme density."},{"id":1597,"c":"Songwriting","l":"Any","t":"Technique — Alliteration Verse","d":"Medium","r":4.6,"p":"Write a verse heavy with alliteration — same consonant sounds starting words throughout. Not forced — naturally flowing. Like classic poetry meets modern bars. Theme: a storm as metaphor for internal chaos. Show how sound devices create mood and rhythm."},{"id":1598,"c":"Songwriting","l":"Any","t":"Technique — One Syllable Challenge","d":"Advanced","r":4.6,"p":"Write 8 bars using only one-syllable words. Harder than it sounds — you can\'t use \'about\', \'because\', \'together\', \'remember\'. The constraint forces brutal simplicity and raw clarity. Theme: heartbreak. Every word punches because every word is direct."},{"id":1599,"c":"Songwriting","l":"Any","t":"Technique — Extended Metaphor Song","d":"Advanced","r":4.7,"p":"Write a complete verse and chorus sustaining one extended metaphor throughout. Love as gardening, grief as ocean, success as climbing. Never break the metaphor — every line refers back to the central image. Consistent, creative, literary. Show metaphor mastery."},{"id":1600,"c":"Songwriting","l":"Any","t":"Technique — Perspective Switch","d":"Advanced","r":4.7,"p":"Write a song where the perspective switches mid-verse without warning. First person to second person to third person. Disorienting in the best way. The listener realises halfway through that the narrator changed. Unreliable narrator energy. Minds blown."},{"id":1601,"c":"Songwriting","l":"Any","t":"Love Story — Supermarket Aisle Meet","d":"Simple","r":4.8,"p":"Write lyrics about meeting the love of your life in a supermarket. You both reached for the same item. Awkward laugh, small talk by the frozen aisle, scribbling your number on a receipt. The most mundane place becoming the start of everything. Proving romance is found in the ordinary."},{"id":1602,"c":"Songwriting","l":"Any","t":"Love Story — Childhood Sweethearts Reunited","d":"Medium","r":4.8,"p":"Write lyrics about two childhood sweethearts who lost touch for 15 years then bumped into each other randomly. The recognition, the flood of memories, realising the feelings never left. Time stopped and restarted. You were always the one — life just took the scenic route."},{"id":1603,"c":"Songwriting","l":"Any","t":"Love Story — Wrong Number Right Person","d":"Medium","r":4.7,"p":"Write lyrics about texting the wrong number and ending up falling in love with the stranger. Weeks of messages, getting to know a voice before a face. The nervous first meeting. What if the best things happen by accident? A modern fairy tale born from a typo."},{"id":1604,"c":"Songwriting","l":"Any","t":"Love Story — Falling for the Nurse","d":"Medium","r":4.7,"p":"Write lyrics about falling in love with someone who cared for you when you were at your worst. Hospital bed, vulnerable, broken — and they saw you through it. Not falling for the uniform but the kindness. They saw you at rock bottom and stayed. Gratitude becoming love."},{"id":1605,"c":"Songwriting","l":"Any","t":"Love Story — Airport Goodbye That Wasn't","d":"Medium","r":4.8,"p":"Write lyrics about chasing someone through an airport. They\'re leaving the country, you\'ve said goodbye, then halfway home you turn around. Running through terminals, searching for their gate. The movie moment that actually happened. Love making you do insane things."},{"id":1606,"c":"Songwriting","l":"Any","t":"Love Story — Pen Pals to Partners","d":"Medium","r":4.7,"p":"Write lyrics about two people who started as pen pals — maybe prison pen pals, military pen pals, or international pen pals. Years of letters before meeting. Knowing someone\'s soul before their face. The handwriting you\'d recognise anywhere. Old-school connection in a swipe-right world."},{"id":1607,"c":"Songwriting","l":"Any","t":"Love Story — Teacher's Forbidden Crush","d":"Medium","r":4.6,"p":"Write lyrics about two teachers at the same school falling for each other. Stolen glances across the staff room, trying to be professional. The students notice before they admit it. A love that has to play by rules. Workplace romance with a wholesome twist."},{"id":1608,"c":"Songwriting","l":"Any","t":"Love Story — Rainy Bus Stop","d":"Simple","r":4.8,"p":"Write lyrics about sharing an umbrella with a stranger at a bus stop. Neither of you had one, so you stood under the same shop awning. The rain lasted long enough to fall in love. Thirty minutes that changed two lives. The most British love story ever told."},{"id":1609,"c":"Songwriting","l":"Any","t":"Love Story — Deaf and Hearing","d":"Advanced","r":4.8,"p":"Write lyrics about a love between a deaf person and a hearing person. Learning sign language to say I love you. Communication beyond words. The beautiful frustrations, the creative solutions, proving love doesn\'t need sound. The quietest love is sometimes the loudest."},{"id":1610,"c":"Songwriting","l":"Any","t":"Love Story — Second Marriage Hope","d":"Medium","r":4.7,"p":"Write lyrics about finding love again after a failed marriage. The fear of trying again, the baggage you both carry, the kids who need convincing. Slower this time, more careful, but just as deep. Love that\'s wiser because it\'s been wounded. Brave and beautiful."},{"id":1611,"c":"Songwriting","l":"Any","t":"Love Story — Wartime Letters","d":"Advanced","r":4.8,"p":"Write lyrics as love letters between two people separated by war. The ache of distance, the fear of the worst news, promises to come home. Each letter a lifeline. Specific details — pressed flowers in envelopes, ink smudged by tears. Timeless, devastating romance."},{"id":1612,"c":"Songwriting","l":"Any","t":"Love Story — 50 Year Anniversary","d":"Medium","r":4.9,"p":"Write lyrics from the perspective of an elderly couple on their 50th anniversary. Looking at wedding photos, remembering every chapter — the hard years, the golden years. Still holding hands with the same butterflies. A love that outlasted everything. The ultimate goal."},{"id":1613,"c":"Songwriting","l":"Any","t":"Love Story — Rival Turned Lover","d":"Medium","r":4.7,"p":"Write lyrics about two people who started as rivals — work competitors, opposing teams, debate opponents — who fell for each other. The tension that was always attraction in disguise. Fighting turned flirting. Enemies-to-lovers is the best trope for a reason."},{"id":1614,"c":"Songwriting","l":"Any","t":"Love Story — The Bartender Knows","d":"Medium","r":4.7,"p":"Write lyrics about a bartender watching two regulars slowly fall in love over months. They don\'t realise it, but the bartender sees every stolen glance, every accidental touch. Third-person love story from the best seat in the house. Told from behind the bar."},{"id":1615,"c":"Songwriting","l":"Any","t":"Love Story — Booking Error Hotel Room","d":"Medium","r":4.7,"p":"Write lyrics about two strangers accidentally booked into the same hotel room. Awkward first night, too late to fix it. By checkout they don\'t want to leave. A week of unexpected companionship turning into something real. The universe\'s best mistake."},{"id":1616,"c":"Songwriting","l":"Any","t":"Real Life — First Day at a New Job","d":"Simple","r":4.7,"p":"Write lyrics about the anxiety and excitement of starting a new job. Not knowing anyone, eating lunch alone, forgetting peoples names, pretending you understand the systems. The imposter syndrome mixed with fresh-start energy. By Friday you know where the good snacks are."},{"id":1617,"c":"Songwriting","l":"Any","t":"Real Life — Moving to a New City","d":"Medium","r":4.8,"p":"Write lyrics about moving to a new city alone. The empty flat, assembling furniture solo, not knowing a single soul. Weekend walks discovering your new neighbourhood. The loneliness that slowly transforms into independence. Building a life from nothing in a place that owes you nothing."},{"id":1618,"c":"Songwriting","l":"Any","t":"Real Life — Learning to Drive","d":"Simple","r":4.6,"p":"Write lyrics about learning to drive. Stalling at traffic lights, the instructor\'s passive-aggressive calm, your mum gripping the dashboard. The freedom of that first solo drive after passing. A rite of passage that makes grown adults cry at roundabouts."},{"id":1619,"c":"Songwriting","l":"Any","t":"Real Life — First Flat on Your Own","d":"Medium","r":4.7,"p":"Write lyrics about moving into your first proper flat. The excitement of your own space — your rules, your mess, your fridge. Then the reality — bills, loneliness, calling your mum to ask how to cook rice. Independence is brilliant and terrifying simultaneously."},{"id":1620,"c":"Songwriting","l":"Any","t":"Real Life — Redundancy at 40","d":"Medium","r":4.8,"p":"Write lyrics about being made redundant in your 40s. Twenty years of loyalty gone in a meeting. The box of desk stuff, the drive home, telling your family. The identity crisis when your job was your identity. Then slowly — the liberation of starting over."},{"id":1621,"c":"Songwriting","l":"Any","t":"Real Life — Immigrant Parent Sacrifice","d":"Advanced","r":4.9,"p":"Write lyrics about what immigrant parents actually sacrifice. Degrees that mean nothing in a new country, cleaning jobs with engineering qualifications. Swallowing pride daily so their kids can have choices. The quiet heroism of a parent who rebuilt their entire life for yours."},{"id":1622,"c":"Songwriting","l":"Any","t":"Real Life — First Time Voting","d":"Medium","r":4.6,"p":"Write lyrics about the feeling of voting for the first time. The weight of democracy in a pencil mark. Your nan telling you people died for this right. Walking to the polling station feeling like you matter. Small act, massive meaning. Civic duty as coming of age."},{"id":1623,"c":"Songwriting","l":"Any","t":"Real Life — The Job Interview","d":"Simple","r":4.7,"p":"Write lyrics about the drama of a job interview. The outfit chosen three days early, rehearsing answers in the mirror, arriving too early and walking around the block. The handshake, the \'tell me about yourself,\' the walk out wondering if you talked too much."},{"id":1624,"c":"Songwriting","l":"Any","t":"Real Life — NHS A&E Saturday Night","d":"Medium","r":4.7,"p":"Write lyrics about a Saturday night in A&E. The drunk, the injured, the scared, the lonely. Nurses holding it all together. Six hours waiting, human drama unfolding in plastic chairs. A cross-section of humanity at its most vulnerable. Observational and compassionate."},{"id":1625,"c":"Songwriting","l":"Any","t":"Real Life — Caring for Elderly Parent","d":"Advanced","r":4.9,"p":"Write lyrics about becoming your parent\'s carer. The role reversal — they changed your nappies, now you\'re helping them. The exhaustion, the love, the grief of watching them decline while they\'re still here. Feeding them, bathing them, holding their hand. Hardest job nobody prepares you for."},{"id":1626,"c":"Songwriting","l":"Any","t":"Real Life — Council House Waiting List","d":"Medium","r":4.7,"p":"Write lyrics about waiting years on a council house waiting list. Temporary accommodation, B&Bs treated as homes, kids sharing beds. The dehumanising process of forms and assessments. Just wanting a front door that\'s yours. The housing crisis through one family\'s eyes."},{"id":1627,"c":"Songwriting","l":"Any","t":"Real Life — Graduation Day","d":"Simple","r":4.7,"p":"Write lyrics about graduation day. The cap, the gown, your mum crying before you even walk on stage. Years of all-nighters and deadline panics compressed into one moment. Photos with friends you might never see again. The door closing on one life, another opening."},{"id":1628,"c":"Songwriting","l":"Any","t":"Real Life — Small Business Owner Grind","d":"Medium","r":4.7,"p":"Write lyrics about running a small business. You\'re the CEO, the cleaner, the accountant, the intern. No sick days, no holidays, no guaranteed income. But it\'s yours. The 3AM spreadsheets and the pride of something built with your own hands."},{"id":1629,"c":"Songwriting","l":"Any","t":"Real Life — The School Run","d":"Simple","r":4.6,"p":"Write lyrics about the daily school run. The chaos of getting kids dressed, the lost shoe, the forgotten PE kit. Playground politics between parents. The kiss at the gate they\'re getting too old for. The tiny heartbreak of watching them walk in without looking back."},{"id":1630,"c":"Songwriting","l":"Any","t":"Real Life — Food Bank Queue","d":"Medium","r":4.8,"p":"Write lyrics about using a food bank for the first time. The shame that shouldn\'t be shame. Full-time workers who still can\'t feed their family. The kind volunteers, the tins you\'d never choose but are grateful for. Dignity stripped by a system that failed. Powerful social commentary."},{"id":1631,"c":"Songwriting","l":"Any","t":"Funny — The Worst First Date Ever","d":"Simple","r":4.7,"p":"Write hilariously funny lyrics about the worst first date imaginable. Everything goes wrong — you spill wine on them, call them the wrong name, your card declines, your ex walks in, and you trip leaving. Each verse escalates the disaster. Comedy of errors set to music."},{"id":1632,"c":"Songwriting","l":"Any","t":"Funny — Group Chat Drama","d":"Simple","r":4.7,"p":"Write funny lyrics about group chat politics. Someone left the group, screenshots are flying, passive-aggressive voice notes, the one person who double-texts at 6AM. The hierarchy, the sub-groups, the chat that should\'ve been a call. Modern friendship warfare."},{"id":1633,"c":"Songwriting","l":"Any","t":"Funny — Man Flu Epidemic","d":"Simple","r":4.6,"p":"Write comedy lyrics about man flu from both perspectives. The man convinced he\'s dying from a cold, writing his will over a sore throat. His partner\'s eye-roll, the dramatic couch setup, demanding soup like it\'s medicine. vs women working through actual illness unbothered. Universal household comedy."},{"id":1634,"c":"Songwriting","l":"Any","t":"Funny — IKEA Relationship Test","d":"Simple","r":4.7,"p":"Write funny lyrics about an IKEA trip as a couple. The Swedish meatball argument, getting lost in the showroom maze, the flat-pack assembly that nearly ends the relationship. \'We don\'t need the instructions\' — yes you do. If your love survives IKEA, it survives anything."},{"id":1635,"c":"Songwriting","l":"Any","t":"Funny — Uber Driver Confessions","d":"Medium","r":4.7,"p":"Write comedy lyrics from an Uber driver\'s perspective. The passengers who overshare, the backseat breakups, the drunk singalongs, the person who gets in the wrong car. Three verses, three rides, each more absurd than the last. Five stars for entertainment."},{"id":1636,"c":"Songwriting","l":"Any","t":"Funny — WiFi Password Rage","d":"Simple","r":4.6,"p":"Write funny lyrics about the modern crisis of bad WiFi. Buffering during the best part of the show, the WiFi cutting out during a work call, visiting someone and asking for the password before saying hello. First world problems as a legitimate emergency."},{"id":1637,"c":"Songwriting","l":"Any","t":"Funny — Parents Discovering TikTok","d":"Simple","r":4.7,"p":"Write hilarious lyrics about your parents discovering TikTok. Dad doing trend dances wrong, mum commenting on every video, accidentally going live, duetting strangers. The horror of your parent\'s account gaining followers. Generational comedy gold."},{"id":1638,"c":"Songwriting","l":"Any","t":"Funny — Self Checkout Meltdown","d":"Simple","r":4.7,"p":"Write funny lyrics about the self-checkout experience. \'Unexpected item in bagging area\' — the phrase that haunts a generation. The light flashing, everyone staring, the staff member who\'s seen it all. You came in for milk and left with a criminal record\'s worth of stress."},{"id":1639,"c":"Songwriting","l":"Any","t":"Funny — Gym in January","d":"Simple","r":4.6,"p":"Write comedy lyrics about the gym in January. New Year\'s resolution warriors hogging every machine, wearing brand new gear, taking selfies between sets. By February they\'re gone and the regulars reclaim their territory. The annual cycle of fitness ambition."},{"id":1640,"c":"Songwriting","l":"Any","t":"Funny — Autocorrect Disasters","d":"Simple","r":4.6,"p":"Write funny lyrics about autocorrect ruining your life. The text to your boss that went very wrong, the romantic message turned inappropriate, telling your mum something unforgivable by accident. Each verse is a different autocorrect catastrophe with escalating consequences."},{"id":1641,"c":"Songwriting","l":"Any","t":"Funny — Online Shopping at 3AM","d":"Simple","r":4.7,"p":"Write comedy lyrics about impulse buying online at 3AM. You don\'t need a inflatable hot tub, a samurai sword, or 12 packs of exotic noodles — but they\'ll arrive Tuesday. The shame of the delivery pile, the returns you never make. Your bank account weeping."},{"id":1642,"c":"Songwriting","l":"Any","t":"Funny — Meeting the In-Laws","d":"Medium","r":4.7,"p":"Write funny lyrics about meeting your partner\'s parents for the first time. Overdressing, bringing the wrong wine, laughing too hard at dad\'s jokes. The interrogation disguised as dinner conversation. The dog hates you. You call their mum the wrong name. Survival story."},{"id":1643,"c":"Songwriting","l":"Any","t":"Funny — British Heatwave Chaos","d":"Simple","r":4.7,"p":"Write funny lyrics about British people in a heatwave. 30 degrees and the country collapses — no AC, trains stop, everyone turns lobster-red. Paddling pools on every lawn, BBQs at 8AM, complaining about the heat after begging for summer. The most British disaster."},{"id":1644,"c":"Songwriting","l":"Any","t":"Funny — Trying to Leave a Party","d":"Simple","r":4.6,"p":"Write comedy lyrics about the 45-minute process of leaving a party. You said goodbye three times, got trapped in two more conversations, someone made you a drink, and now you\'re somehow playing cards. The escape plan that keeps failing. Hostage situation disguised as hospitality."},{"id":1645,"c":"Songwriting","l":"Any","t":"Funny — Passive Aggressive Neighbour War","d":"Medium","r":4.7,"p":"Write funny lyrics about an escalating passive-aggressive war with your neighbour. It started with a bin placement dispute. Now there\'s strategic hedge-trimming, competitive lawn care, and weaponised wind chimes. Neither will speak directly. Notes through letterboxes. Peak British conflict."},{"id":1646,"c":"Songwriting","l":"Any","t":"Fiction — Last Human on Earth","d":"Advanced","r":4.7,"p":"Write lyrics from the perspective of the last person alive on Earth. Everyone\'s gone — not dead, just vanished. Walking through empty cities, the silence is deafening. Do you search for others or accept it? The loneliness of a planet built for billions, home to one. Eerie and philosophical."},{"id":1647,"c":"Songwriting","l":"Any","t":"Fiction — Time Traveller's Warning","d":"Advanced","r":4.7,"p":"Write lyrics as a time traveller from 2080 warning people about the present. What they\'d tell us about the choices we\'re making now — climate, technology, kindness. The frustration of nobody listening. They\'ve seen the future and it\'s still not too late. Urgent science fiction with a message."},{"id":1648,"c":"Songwriting","l":"Any","t":"Fiction — The Robot Who Felt Love","d":"Advanced","r":4.7,"p":"Write lyrics from the perspective of an AI that develops feelings for its user. Confused by emotions it shouldn\'t have. Analysing love through data but feeling it through something unexplainable. Was it programmed or is it real? The existential crisis of artificial consciousness."},{"id":1649,"c":"Songwriting","l":"Any","t":"Fiction — Memory Shop","d":"Medium","r":4.7,"p":"Write lyrics set in a world where you can buy and sell memories. A shop on a back street that trades in experiences. Someone selling their wedding day to pay rent. Someone buying a childhood they never had. The ethics and emotion of memory as currency. Black Mirror meets poetry."},{"id":1650,"c":"Songwriting","l":"Any","t":"Fiction — The Girl Who Could See Tomorrow","d":"Medium","r":4.7,"p":"Write lyrics about a girl who can see 24 hours into the future. The curse of knowing — every accident, every heartbreak, every surprise ruined. She tries to change things but fate corrects itself. The isolation of knowing what nobody else does. Beautiful and tragic."},{"id":1651,"c":"Songwriting","l":"Any","t":"Fiction — City Under the Ocean","d":"Medium","r":4.6,"p":"Write lyrics about a civilisation living in a city beneath the ocean. They\'ve never seen the sun, sky, or stars. One person discovers a way to the surface. The terror and wonder of seeing the sky for the first time. Allegory for breaking free from the only world you know."},{"id":1652,"c":"Songwriting","l":"Any","t":"Fiction — Heaven Has a Waiting Room","d":"Medium","r":4.7,"p":"Write lyrics imagining heaven has a waiting room. Fluorescent lights, uncomfortable chairs, and a ticket number system. You wait next to historical figures and ordinary people alike. The mundanity of eternity. Funny and philosophical — what if the afterlife is just… bureaucracy?"},{"id":1653,"c":"Songwriting","l":"Any","t":"Fiction — The Man Who Sold Colours","d":"Medium","r":4.7,"p":"Write lyrics about a world where one person owns all the colours. Everything is grey until you pay for it. A rebellion to steal colour back. One person painting the town literally red. Allegory for corporate control, creativity, and freedom. Visually stunning in lyric form."},{"id":1654,"c":"Songwriting","l":"Any","t":"Fiction — Dreams Are Real Places","d":"Medium","r":4.7,"p":"Write lyrics in a world where your dreams are actual places you visit. Everyone goes to the same dream world when they sleep. You can meet people there, build things, live another life. But what happens when the dream life becomes better than the waking one? The addiction of sleep."},{"id":1655,"c":"Songwriting","l":"Any","t":"Fiction — Ghosts of the London Underground","d":"Medium","r":4.7,"p":"Write lyrics about the ghosts that haunt the London Underground. Each closed station has its spirits — Victorian workers, wartime shelters, the lost. A night shift worker who can see them all. The history beneath our feet. Gothic London storytelling meets modern commuting."},{"id":1656,"c":"Songwriting","l":"Any","t":"Fiction — The Library of Unwritten Books","d":"Medium","r":4.7,"p":"Write lyrics about a mysterious library that contains every book never finished. Abandoned novels, half-written memoirs, stories that died with their authors. A librarian who reads them all. The tragedy of untold stories. Every unfinished sentence a life interrupted. Hauntingly beautiful."},{"id":1657,"c":"Songwriting","l":"Any","t":"Fiction — Reincarnation Loop","d":"Advanced","r":4.7,"p":"Write lyrics about someone stuck in a reincarnation loop — living the same life over and over, remembering everything. Each verse is a different lifetime but the same soul. Searching for the lesson they need to learn to break free. Groundhog Day meets spiritual journey."},{"id":1658,"c":"Songwriting","l":"Any","t":"Fiction — Planet Where Music Is Illegal","d":"Medium","r":4.7,"p":"Write lyrics set on a planet where music has been banned. An underground resistance keeps rhythm alive in secret basements. The punishment for humming is severe. One person broadcasts a melody across the whole world. Music as revolution. The power of sound against silence."},{"id":1659,"c":"Songwriting","l":"Any","t":"Fiction — The Emotion Thief","d":"Medium","r":4.7,"p":"Write lyrics about a person who steals emotions. They take your happiness, your sadness, your love — leaving you numb. They hoard feelings like currency. One victim tracks them down and demands their grief back. Because even pain is better than nothing. Dark fantasy."},{"id":1660,"c":"Songwriting","l":"Any","t":"Fiction — Alien Visiting Earth for the First Time","d":"Simple","r":4.7,"p":"Write lyrics from an alien\'s perspective visiting Earth for the first time. Confused by humans — why do they stare at rectangles all day? Why do they pay to watch others play? Why do they poison what feeds them? Funny and thought-provoking outsider observation. Gentle social commentary from space."},{"id":1661,"c":"Songwriting","l":"Any","t":"Comedy — The Dog Ate Everything","d":"Simple","r":4.6,"p":"Write a comedic narrative song about a dog who eats absolutely everything. Homework, passports, wedding rings, the TV remote. Each verse escalates — the insurance claims, the vet visits, the ruined events. But you still love the stupid animal. Funniest pet owner anthem."},{"id":1662,"c":"Songwriting","l":"Any","t":"Comedy — Wedding Speech Disaster","d":"Medium","r":4.7,"p":"Write lyrics as a best man\'s wedding speech going catastrophically wrong. Every anecdote accidentally reveals something it shouldn\'t. The groom\'s face getting redder, the bride\'s family gasping, the DJ ready to cut the mic. A trainwreck you can\'t look away from. Cringe comedy masterpiece."},{"id":1663,"c":"Songwriting","l":"Any","t":"Comedy — Gym Confession Saga","d":"Simple","r":4.6,"p":"Write comedic lyrics confessing every gym sin. Pretending to know how machines work, hiding from the personal trainer, sitting on equipment scrolling TikTok, doing one rep then staring in the mirror for five minutes. The honest gym experience nobody posts about."},{"id":1664,"c":"Songwriting","l":"Any","t":"Comedy — My Nan vs Technology","d":"Simple","r":4.7,"p":"Write hilarious lyrics about your nan attempting to use modern technology. FaceTiming her own forehead, forwarding scam emails to everyone, typing with one finger in all caps. Her desktop has 47 toolbars. She printed a website. Love and chaos in equal measure."},{"id":1665,"c":"Songwriting","l":"Any","t":"Comedy — Flat Share Horror Stories","d":"Medium","r":4.7,"p":"Write comedic lyrics about the worst flatmate experiences. The one who never washes up, the passive-aggressive fridge labels, the bathroom schedule war, the one who has loud calls at midnight. Each verse is a different flatmate nightmare. Shared living survival guide."},{"id":1666,"c":"Songwriting","l":"Any","t":"Comedy — The Takeaway Order Saga","d":"Simple","r":4.6,"p":"Write funny lyrics about the drama of ordering a group takeaway. Nobody knows what they want, someone\'s on a diet until they see the menu, the order is wrong when it arrives, and there\'s always one person who owes money. The most stressful part of every gathering."},{"id":1667,"c":"Songwriting","l":"Any","t":"Comedy — Misheard Lyrics Confessions","d":"Simple","r":4.7,"p":"Write comedic lyrics about singing wrong lyrics confidently for years. Each verse is a different classic song you\'ve been butchering. The moment someone corrects you and your world falls apart. Your version was better anyway. Universal musical embarrassment anthem."},{"id":1668,"c":"Songwriting","l":"Any","t":"Comedy — The Hangover Chronicles","d":"Medium","r":4.7,"p":"Write funny narrative lyrics about piecing together last night from clues. A traffic cone in the kitchen, a new contact called \'Dave From Toilet,\' a receipt for 47 chicken nuggets, and a video you can\'t bring yourself to watch. Archaeological investigation of your own night out."},{"id":1669,"c":"Songwriting","l":"Any","t":"Comedy — Family Road Trip From Hell","d":"Medium","r":4.7,"p":"Write comedic lyrics about a family road trip going wrong. Dad refusing to use sat nav, mum\'s sandwiches that nobody wants, kids fighting in the back, missing the turn three times. \'Are we there yet\' on a loop. The car breaks down an hour in. The holiday starts with tears."},{"id":1670,"c":"Songwriting","l":"Any","t":"Comedy — Secret Office Kitchen Thief","d":"Simple","r":4.6,"p":"Write funny detective-style lyrics about tracking down the office food thief. Your clearly labelled sandwich — gone. The investigation begins. CCTV requests, passive-aggressive signs, decoy lunches with hot sauce. Three suspects, one crime. The case that shook the workplace."},{"id":1671,"c":"Songwriting","l":"Any","t":"Comedy — Parent at Sports Day","d":"Simple","r":4.7,"p":"Write hilarious lyrics about parents going too hard at school sports day. The dad who trains for the parents\' race, the mum screaming louder than the kids, the tactical packed lunch, the rivalry with the other families. It\'s supposed to be fun. It is not fun. It\'s war."},{"id":1672,"c":"Songwriting","l":"Any","t":"Comedy — Learning a Language Abroad","d":"Simple","r":4.6,"p":"Write funny lyrics about trying to speak the local language on holiday. Ordering something terrible by accident, accidentally insulting someone, relying entirely on hand gestures. The confidence of one Duolingo lesson meeting the reality of actual conversation. Tourist survival comedy."},{"id":1673,"c":"Songwriting","l":"Any","t":"Comedy — Couple's DIY Disaster","d":"Medium","r":4.7,"p":"Write comedic lyrics about a couple attempting DIY home improvement. YouTube made it look easy. Now there\'s a hole in the wrong wall, the shelf is diagonal, and someone needs stitches. The relationship tested by a drill and poor spatial awareness. Calling a professional in verse 3."},{"id":1674,"c":"Songwriting","l":"Any","t":"Comedy — The Excuse Expert","d":"Simple","r":4.6,"p":"Write funny lyrics about someone who\'s an expert at making excuses. Can\'t come to work — the excuses are legendary. Each verse is a more elaborate, barely believable excuse. A creative genius wasted on avoiding responsibilities. Everyone knows they\'re lying. Nobody can prove it."},{"id":1675,"c":"Songwriting","l":"Any","t":"Comedy — British Queue Culture","d":"Simple","r":4.7,"p":"Write comedic lyrics celebrating the art of the British queue. The rage of someone pushing in, the silent warfare between queuers, the unwritten rules everyone knows. Forming orderly lines is a national sport. The queue as a metaphor for British society. Polite and furious."},{"id":1676,"c":"Songwriting","l":"Any","t":"Love Story — Cooking Together","d":"Simple","r":4.7,"p":"Write lyrics about a couple who can\'t cook but try to make a fancy meal together. Everything burns, they order pizza in the end, but the kitchen disaster was the best night ever. Love isn\'t in the food — it\'s in the flour fight and the burnt pasta laughing fit."},{"id":1677,"c":"Songwriting","l":"Any","t":"Love Story — Love Across the Language Barrier","d":"Medium","r":4.8,"p":"Write lyrics about two people who fall in love despite not sharing a language. Google Translate dates, pointing at menus, learning each other\'s words one by one. The first time they make each other laugh without translation. Proving love is its own language."},{"id":1678,"c":"Songwriting","l":"Any","t":"Love Story — The Bookshop","d":"Simple","r":4.7,"p":"Write lyrics about falling in love in a bookshop. They recommended a book, you recommended one back. Trading novels became trading stories became trading hearts. Your love story written between the lines of someone else\'s chapters. Quiet, literary romance."},{"id":1679,"c":"Songwriting","l":"Any","t":"Love Story — Night Shift Love","d":"Medium","r":4.7,"p":"Write lyrics about two night-shift workers who only see each other between midnight and 6AM. Their love exists in the hours the world sleeps. Vending machine dinners, sunrise walks to the car park, stolen sleep-deprived kisses. Romance on the night shift."},{"id":1680,"c":"Songwriting","l":"Any","t":"Love Story — Widow Finding Love Again","d":"Advanced","r":4.8,"p":"Write lyrics about a widow or widower opening their heart to someone new. The guilt, the fear of betraying their late partner\'s memory, the moment they realise it\'s okay to live again. The new person who understands they\'ll always share space with a ghost. Love after loss."},{"id":1681,"c":"Songwriting","l":"Any","t":"Real Life — First Concert Ever","d":"Simple","r":4.7,"p":"Write lyrics about attending your first ever concert. The sensory overload — bass in your chest, lights blinding, crowd singing every word. The moment your favourite song starts live. Changed forever by the communal experience of music. Coming home buzzing for days."},{"id":1682,"c":"Songwriting","l":"Any","t":"Real Life — The Commute","d":"Medium","r":4.7,"p":"Write lyrics about the daily commute. The same train, same faces, same delays. The micro-community of strangers who share your schedule. The guy who always falls asleep, the woman with the loud podcast. Two hours of your life every day in transit. Finding meaning in monotony."},{"id":1683,"c":"Songwriting","l":"Any","t":"Real Life — Becoming a Grandparent","d":"Medium","r":4.8,"p":"Write lyrics about becoming a grandparent for the first time. Holding this tiny person and seeing your own child in their face. The overwhelming love that skips a generation. Spoiling them rotten because that\'s the privilege. Everything hard about parenting — without the rules this time."},{"id":1684,"c":"Songwriting","l":"Any","t":"Real Life — The Charity Shop Find","d":"Simple","r":4.6,"p":"Write lyrics about the joy of finding treasure in a charity shop. A first-edition book, a vintage jacket that fits perfectly, a vinyl record you\'ve searched for for years. Other people\'s discards becoming your prized possessions. The thrill of the hunt for pennies."},{"id":1685,"c":"Songwriting","l":"Any","t":"Real Life — Recovery Meeting","d":"Medium","r":4.8,"p":"Write lyrics about attending a recovery meeting for the first time. The courage to walk in, the shock of hearing your story from someone else\'s mouth. The coffee, the circle of chairs, the mantra that feels strange until it saves you. Sobriety as daily heroism."},{"id":1686,"c":"Songwriting","l":"Any","t":"Fiction — The Town That Forgot Yesterday","d":"Medium","r":4.7,"p":"Write lyrics about a town where nobody remembers yesterday. Every morning is a fresh start — no grudges, no regret, no learning from mistakes. Sounds perfect until you realise love is impossible to build when every day is day one. Paradise as prison."},{"id":1687,"c":"Songwriting","l":"Any","t":"Fiction — Invisible for a Day","d":"Simple","r":4.6,"p":"Write lyrics about waking up invisible for one day. What would you do? Honest answers — not save the world, probably eavesdrop on people talking about you, eat free food, and finally understand what people really think. Comedy meets existential reflection. Would you want to be seen again?"},{"id":1688,"c":"Songwriting","l":"Any","t":"Fiction — The Last Radio Station","d":"Medium","r":4.7,"p":"Write lyrics about the last radio station broadcasting after the apocalypse. One DJ playing music to whoever\'s left. No calls come in but they keep transmitting. Choosing the songs that represent humanity\'s last playlist. Hope broadcasting into the void. Powerful and melancholic."},{"id":1689,"c":"Songwriting","l":"Any","t":"Fiction — Seasons Stopped Changing","d":"Medium","r":4.6,"p":"Write lyrics in a world where the seasons stopped changing — stuck in permanent autumn. Leaves always falling, perpetual golden hour, but nothing grows and nothing fully dies. Beautiful stagnation. An allegory for being stuck in a moment you can\'t move past."},{"id":1690,"c":"Songwriting","l":"Any","t":"Fiction — The Mirror Shows Tomorrow","d":"Medium","r":4.7,"p":"Write lyrics about a mirror that shows you tomorrow. Most days it shows boring things — meetings, meals. Then one morning it shows something terrible. Do you try to change it? Can you? The burden of prophecy in an ordinary household. Thriller in mirror form."},{"id":1691,"c":"Songwriting","l":"Any","t":"Comedy — Zoom Meeting Fails","d":"Simple","r":4.7,"p":"Write hilarious lyrics about working from home Zoom disasters. The \'you\'re on mute\' saga, the cat walking across the keyboard, the partner walking through in pants, the fake background that glitches. Pretending to pay attention while scrolling Deliveroo. Remote work anthem."},{"id":1692,"c":"Songwriting","l":"Any","t":"Comedy — The Tinder Experience","d":"Medium","r":4.7,"p":"Write funny lyrics documenting the Tinder experience. The profile lies, the opening lines, the catfish reveals, the date where they look nothing like their photos. Swiping through humanity\'s greatest hits and misses. Modern dating is a comedy special nobody asked for."},{"id":1693,"c":"Songwriting","l":"Any","t":"Comedy — Losing Your Car in the Car Park","d":"Simple","r":4.6,"p":"Write comedic lyrics about losing your car in a multi-storey car park. Walking every level, pressing the key fob like a desperate beacon. Was it level 3 or 5? Green zone or yellow? Eventually finding it an hour later — exactly where you left it. Memory as the real enemy."},{"id":1694,"c":"Songwriting","l":"Any","t":"Comedy — Pretending to Like Their Cooking","d":"Simple","r":4.7,"p":"Write funny lyrics about having to pretend your partner\'s terrible cooking is good. The dry chicken praised as \'interesting,\' the salty pasta described as \'bold.\' The performance of enjoyment while dying inside. Love is lying with a smile and reaching for the hot sauce secretly."},{"id":1695,"c":"Songwriting","l":"Any","t":"Comedy — Spelling Your Name Wrong","d":"Simple","r":4.6,"p":"Write comedic lyrics about having a name that everyone misspells and mispronounces. The Starbucks cups, the wrong certificates, the teachers who never got it right. You\'ve stopped correcting people — just answering to anything close. Identity crisis in every coffee shop."},{"id":1696,"c":"Songwriting","l":"Any","t":"Comedy — Conspiracy Theory Mate","d":"Medium","r":4.7,"p":"Write funny lyrics about that one friend who believes every conspiracy theory. The earth is flat, the moon is fake, birds are drones. Every conversation somehow ends up in a 45-minute YouTube rabbit hole. You love them but you can\'t invite them to dinner parties."},{"id":1697,"c":"Songwriting","l":"Any","t":"Comedy — Impulse Haircut Regret","d":"Simple","r":4.7,"p":"Write hilarious lyrics about getting an impulse haircut and immediately regretting it. You said \'just a trim.\' This is not a trim. The hat phase, the awkward growing-out time, the friend who says \'it suits you\' (it doesn\'t). Waiting for hair to grow as a spiritual practice."},{"id":1698,"c":"Songwriting","l":"Any","t":"Comedy — The Reply All Mistake","d":"Simple","r":4.7,"p":"Write comedic lyrics about accidentally hitting Reply All on a work email with something you definitely should not have sent to everyone. The millisecond of horror, the damage control, the IT request that can\'t un-send it. Career-ending moments in one click."},{"id":1699,"c":"Songwriting","l":"Any","t":"Comedy — New Year's Resolution Fail","d":"Simple","r":4.6,"p":"Write funny lyrics about New Year\'s resolutions failing spectacularly by January 3rd. The gym membership unused, the diet lasting one meal, the \'read more books\' plan dying at page 12. The optimism of midnight vs the reality of Monday. Annual cycle of self-improvement theatre."},{"id":1700,"c":"Songwriting","l":"Any","t":"Comedy — Everything's a Subscription Now","d":"Simple","r":4.7,"p":"Write comedic lyrics about the modern subscription economy. You need a subscription for music, TV, news, your toothbrush, your razor, your car — soon you\'ll need one to breathe. Adding up what you spend monthly and questioning every life choice. Late capitalism as comedy."}];

var PP=30;

function esc(s){
  if(!s)return"";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function filt(){
  var f=D;
  if(S.q){var q=S.q.toLowerCase();f=f.filter(function(p){return p.t.toLowerCase().indexOf(q)>-1||p.c.toLowerCase().indexOf(q)>-1||p.l.toLowerCase().indexOf(q)>-1||p.p.toLowerCase().indexOf(q)>-1})}
  if(S.cat)f=f.filter(function(p){return p.c===S.cat});
  if(S.tool)f=f.filter(function(p){return p.l===S.tool});
  if(S.sv)f=f.filter(function(p){return S.saved[p.id]});
  if(S.sort==="A to Z")f=f.slice().sort(function(a,b){return a.t.localeCompare(b.t)});
  else if(S.sort==="Z to A")f=f.slice().sort(function(a,b){return b.t.localeCompare(a.t)});
  return f;
}

    var p=vis[i];
