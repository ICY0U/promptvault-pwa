","t":"Phonk Lo-Fi Chill","d":"Simple","r":4.6,"p":"Chill phonk, relaxed cowbell groove, mellow bass, lo-fi vinyl crackle, laid-back vibes, late night study phonk, Memphis soul samples, smooth, 85 BPM"},{"id":1197,"c":"Music","l":"Suno","t":"Phonk Trap Hybrid","d":"Medium","r":4.7,"p":"Phonk trap hybrid, trap hi-hat rolls with classic cowbell, heavy 808 slides, dark melody, aggressive flow-ready beat, street energy, 140 BPM"},{"id":1198,"c":"Music","l":"Suno","t":"Brazilian Phonk Aggressive Bass","d":"Advanced","r":4.9,"p":"Brazilian aggressive phonk, speaker-destroying bass, distorted sub-bass drops, rapid-fire funk drums, MC vocal stabs, maximum intensity, car audio competition level, 135 BPM"},{"id":1199,"c":"Music","l":"Suno","t":"Russian Phonk Slowed Reverb","d":"Simple","r":4.7,"p":"Russian phonk slowed and reverb, pitched-down cowbell, deep underwater bass, dreamy dark atmosphere, slow-motion aesthetic, melancholic drift vibes, 70 BPM"},{"id":1200,"c":"Music","l":"Suno","t":"Phonk Edit Montage","d":"Simple","r":4.8,"p":"Phonk montage edit, dramatic silence before hard drop, cowbell build-up, massive bass hit, perfect for video edits, punchy and impactful, TikTok transition ready, 142 BPM"},{"id":1201,"c":"Songwriting","l":"Any","t":"Heartbreak  —  Fresh Breakup","d":"Medium","r":4.9,"p":"Write lyrics about a fresh breakup. The pain is still raw  —  you just found out they moved on already. Mix anger with sadness. Include specific details like seeing their stuff still at your place. Use vivid emotional imagery. Chorus should hit hard with a repeated hook about letting go but not being able to."},{"id":1202,"c":"Songwriting","l":"Any","t":"Heartbreak  —  Missing Them at Night","d":"Simple","r":4.8,"p":"Write lyrics about missing someone late at night. The house is quiet, you're scrolling through old photos. Capture the loneliness of 3AM when memories hit hardest. Keep it intimate and vulnerable. Reference specific shared moments  —  a song you both loved, their side of the bed being empty."},{"id":1203,"c":"Songwriting","l":"Any","t":"Heartbreak  —  Toxic Relationship","d":"Medium","r":4.8,"p":"Write lyrics about being stuck in a toxic on-and-off relationship. You know it's bad for you but you keep going back. Explore the addiction of toxic love  —  the highs are incredible, the lows are destroying you. Use push-pull imagery. Chorus should capture the contradiction of loving someone who's bad for you."},{"id":1204,"c":"Songwriting","l":"Any","t":"Heartbreak  —  Betrayal by Best Friend","d":"Medium","r":4.7,"p":"Write lyrics about discovering your partner cheated with your best friend. Double betrayal  —  you lost two people at once. Mix disbelief with rage. Include the moment you found out. The trust you'll never get back. Chorus about how the people closest to you can hurt you the worst."},{"id":1205,"c":"Songwriting","l":"Any","t":"Heartbreak  —  Watching Them Be Happy","d":"Medium","r":4.8,"p":"Write lyrics about seeing your ex happy with someone new on social media. You're pretending you're fine but it's eating you alive. Capture the performance of being okay vs the reality. Scrolling through their new life without you. Bittersweet  —  you want them happy but wish it was still with you."},{"id":1206,"c":"Songwriting","l":"Any","t":"Love  —  First Date Butterflies","d":"Simple","r":4.8,"p":"Write lyrics about the electric feeling of a first date going perfectly. Nervous energy turning into connection. Describe the small moments  —  their laugh, how they looked at you, not wanting the night to end. Keep it warm and genuine, not cheesy. Capture that feeling of 'this could be something special.'"},{"id":1207,"c":"Songwriting","l":"Any","t":"Love  —  Falling Deep","d":"Simple","r":4.9,"p":"Write lyrics about falling deeply in love. That point where you realise this person has completely changed your world. Everything reminds you of them. Use sensory details  —  their scent, their voice, how they feel next to you. The chorus should be a declaration without being cliché."},{"id":1208,"c":"Songwriting","l":"Any","t":"Love  —  Long Distance","d":"Medium","r":4.7,"p":"Write lyrics about being in a long-distance relationship. The pain of phone calls that aren't enough, counting days until you see them, time zones making everything harder. But also the strength of love that survives distance. Bittersweet and hopeful. Reference airports, late-night FaceTimes, the anticipation of reunion."},{"id":1209,"c":"Songwriting","l":"Any","t":"Love  —  Ride or Die","d":"Medium","r":4.8,"p":"Write lyrics about unconditional loyalty in love. You and your partner against the world. Through the hard times, the broke times, the struggle  —  you've never left each other's side. Celebrate real love that's been tested. Chorus should feel like an unbreakable vow."},{"id":1210,"c":"Songwriting","l":"Any","t":"Love  —  Secret Relationship","d":"Medium","r":4.7,"p":"Write lyrics about a secret relationship nobody knows about. The thrill of sneaking around, stolen moments, hidden texts. Explore why it's secret  —  maybe it's complicated, wrong timing, or forbidden. The excitement mixed with the frustration of not being able to be public."},{"id":1211,"c":"Songwriting","l":"Any","t":"Love  —  Growing Old Together","d":"Simple","r":4.8,"p":"Write lyrics about wanting to grow old with someone. Imagine the future  —  grey hair, grandkids, still holding hands. Reference the small daily moments that make a lifetime. Rocking chairs on the porch. A love letter to commitment. Warm, tender, and timeless."},{"id":1212,"c":"Songwriting","l":"Any","t":"Street Life  —  Coming Up from Nothing","d":"Medium","r":4.8,"p":"Write lyrics about growing up in poverty and grinding your way out. Council estate childhood, hand-me-down clothes, mum working three jobs. Now you're making something of yourself but you never forget where you came from. Raw and authentic. Mix pride with pain."},{"id":1213,"c":"Songwriting","l":"Any","t":"Street Life  —  Trap House Stories","d":"Advanced","r":4.7,"p":"Write lyrics telling stories from the trap. Late nights, dodgy dealings, looking over your shoulder. Don't glorify it  —  show the reality. The paranoia, the cost, the people you've lost. But also why people end up there when there's no other options. Gritty storytelling with specific scenes."},{"id":1214,"c":"Songwriting","l":"Any","t":"Street Life  —  Lost Friends","d":"Medium","r":4.9,"p":"Write lyrics about losing friends to the streets  —  prison, violence, or drugs. Pour one out for the ones who didn't make it. Specific memories of times together before everything went wrong. The guilt of making it out when they didn't. A tribute that's honest, not sanitised."},{"id":1215,"c":"Songwriting","l":"Any","t":"Street Life  —  Police Harassment","d":"Medium","r":4.7,"p":"Write lyrics about being constantly stopped and searched, profiled, harassed by police. The frustration of being treated like a criminal for how you look or where you live. Real experiences  —  being pulled over, questioned, treated as guilty until proven innocent. Angry but articulate."},{"id":1216,"c":"Songwriting","l":"Any","t":"Street Life  —  Loyalty and Snitching","d":"Medium","r":4.7,"p":"Write lyrics about loyalty in the streets and the code of silence. What happens when someone talks. The pressure, the consequences, the grey areas. Explore both sides  —  staying solid vs questioning if the code is worth it. Raw and morally complex."},{"id":1217,"c":"Songwriting","l":"Any","t":"Flex  —  Money and Success","d":"Simple","r":4.7,"p":"Write flex/bragging lyrics about making money and living large. Designer clothes, expensive cars, VIP tables. But make it clever  —  wordplay, double entendres, creative comparisons. Don't just list brands  —  paint a picture of the lifestyle. Confident without being corny."},{"id":1218,"c":"Songwriting","l":"Any","t":"Flex  —  Underdog Victory","d":"Medium","r":4.8,"p":"Write lyrics about proving all the doubters wrong. They said you'd never make it  —  now look at you. Reference specific moments people counted you out. Teachers, fake friends, industry people who said no. The satisfaction of success as the best revenge. Triumphant energy."},{"id":1219,"c":"Songwriting","l":"Any","t":"Flex  —  Self-Made Boss","d":"Medium","r":4.7,"p":"Write lyrics about being entirely self-made. No handouts, no connections, no silver spoon. Built everything from scratch through pure hustle. Celebrate the grind  —  early mornings, sleepless nights, betting on yourself when nobody else would. Boss mentality."},{"id":1220,"c":"Songwriting","l":"Any","t":"Mental Health  —  Depression","d":"Advanced","r":4.9,"p":"Write lyrics about living with depression. The weight that won't lift, putting on a mask for the world, the exhaustion of pretending you're fine. Describe how depression actually feels  —  not dramatic sadness but the numbness, the emptiness, struggling to get out of bed. Raw and real. Include a moment of hope or reaching out."},{"id":1221,"c":"Songwriting","l":"Any","t":"Mental Health  —  Anxiety","d":"Medium","r":4.8,"p":"Write lyrics about dealing with anxiety. Racing thoughts at 2AM, overthinking every conversation, physical symptoms  —  tight chest, can't breathe, feeling like the walls are closing in. Capture the exhaustion of your own mind being the enemy. Include coping and fighting through it."},{"id":1222,"c":"Songwriting","l":"Any","t":"Mental Health  —  Addiction Recovery","d":"Advanced","r":4.8,"p":"Write lyrics about recovering from addiction. The daily battle, one day at a time. Reference the rock bottom moment that made you change. The temptation that never fully goes away. Celebrate the strength of recovery without pretending it's easy. Honest and unflinching."},{"id":1223,"c":"Songwriting","l":"Any","t":"Mental Health  —  Suicidal Thoughts Survived","d":"Advanced","r":4.9,"p":"Write lyrics from the perspective of someone who survived suicidal thoughts. Looking back at the darkest moment and being grateful they're still here. Sensitive but honest  —  don't romanticise it, show the reality and the recovery. Dedicated to anyone going through it. Include hope and reaching out for help."},{"id":1224,"c":"Songwriting","l":"Any","t":"Mental Health  —  Therapy Journey","d":"Medium","r":4.7,"p":"Write lyrics about starting therapy and the journey of healing. The courage it took to ask for help. Breaking down walls you've built. Learning that vulnerability is strength, not weakness. Especially powerful for male artists breaking stigma around men's mental health."},{"id":1225,"c":"Songwriting","l":"Any","t":"Motivation  —  Never Give Up","d":"Simple","r":4.8,"p":"Write motivational lyrics about persistence through failure. Every setback is a setup for a comeback. Reference falling down and getting back up. Rocky-style determination. The chorus should be an anthem that makes people feel invincible. Universal message of resilience."},{"id":1226,"c":"Songwriting","l":"Any","t":"Motivation  —  Chasing Dreams","d":"Simple","r":4.8,"p":"Write lyrics about chasing your dreams against all odds. Quitting the 9-to-5 to pursue your passion. The fear, the uncertainty, but also the fire inside that won't let you settle. Inspire anyone who's on the edge of taking the leap. Electric with possibility."},{"id":1227,"c":"Songwriting","l":"Any","t":"Motivation  —  Comeback Story","d":"Medium","r":4.8,"p":"Write lyrics about making a massive comeback after everyone wrote you off. You were down, out, maybe publicly humiliated or cancelled. But you rebuilt from the ashes. Phoenix energy. The people who stayed vs those who disappeared. Triumphant return."},{"id":1228,"c":"Songwriting","l":"Any","t":"Party  —  Club Banger","d":"Simple","r":4.7,"p":"Write party lyrics for a club anthem. Friday night energy, getting ready with your crew, the bass hitting when you walk in. Drinks flowing, dancing, living in the moment. Keep it hype  —  this is the song that comes on at peak time. Catchy hook everyone can shout."},{"id":1229,"c":"Songwriting","l":"Any","t":"Party  —  Summer Anthem","d":"Simple","r":4.8,"p":"Write lyrics for the song of summer. Windows down, sunshine, no worries. BBQs, beach days, good vibes only. Capture the freedom and joy of summer. The hook should be infectious and feel like warm weather. References to specific summer moments  —  festivals, road trips, late sunsets."},{"id":1230,"c":"Songwriting","l":"Any","t":"Party  —  After Party","d":"Medium","r":4.7,"p":"Write lyrics about the after party  —  when the club closes but the night isn't over. Back to someone's house, music still playing, deeper conversations happening. The blurry line between late night and early morning. More intimate than the club. Hazy, warm energy."},{"id":1231,"c":"Songwriting","l":"Any","t":"Anger  —  Diss Track","d":"Advanced","r":4.8,"p":"Write aggressive diss track lyrics. Absolutely destroy your opponent with bars  —  expose their lies, mock their failures, question their credibility. Clever wordplay and devastating punchlines. No generic insults  —  make every line specific and cutting. The kind of track that ends careers."},{"id":1232,"c":"Songwriting","l":"Any","t":"Anger  —  Fed Up with Fake People","d":"Medium","r":4.7,"p":"Write lyrics about being completely done with fake friends and two-faced people. The snakes who smile to your face and talk behind your back. Specific situations  —  who was there when you needed them vs who disappeared. Cutting ties and not looking back. Liberating anger."},{"id":1233,"c":"Songwriting","l":"Any","t":"Anger  —  System is Broken","d":"Medium","r":4.8,"p":"Write protest lyrics about a broken system. Politicians lying, working class being squeezed, rich getting richer. Channel real frustration into powerful words. Reference specific issues  —  housing crisis, NHS waiting lists, cost of living. Not preachy  —  just honest and angry. Call to action."},{"id":1234,"c":"Songwriting","l":"Any","t":"Nostalgia  —  Childhood Memories","d":"Medium","r":4.8,"p":"Write lyrics about missing your childhood. Playing outside until the streetlights came on, no bills, no stress, just pure innocence. Specific nostalgic details  —  Saturday morning cartoons, school playground games, your nan's cooking. Bittersweet reflection on how fast time moves."},{"id":1235,"c":"Songwriting","l":"Any","t":"Nostalgia  —  Missing Home","d":"Medium","r":4.7,"p":"Write lyrics about being far from home and missing where you grew up. The specific streets, the corner shop, your old bedroom. Homesickness mixed with knowing you can't go back to how things were. The people who've moved on or passed away. Achingly beautiful."},{"id":1236,"c":"Songwriting","l":"Any","t":"Nostalgia  —  Old Relationship","d":"Medium","r":4.8,"p":"Write lyrics about reminiscing on an old relationship that ended well. Not bitter  —  just wistful. Remembering the good times  —  that restaurant you always went to, their stupid jokes, how they made you feel alive. Wondering what they're doing now. A love letter to the past."},{"id":1237,"c":"Songwriting","l":"Any","t":"Storytelling  —  Crime Narrative","d":"Advanced","r":4.8,"p":"Write a narrative storytelling track about a crime gone wrong. Build tension from the planning to the execution to everything falling apart. Multiple characters, vivid scenes, a twist at the end. Cinematic  —  like a short film in song form. Slick Rick meets Immortal Technique style storytelling."},{"id":1238,"c":"Songwriting","l":"Any","t":"Storytelling  —  Single Mother Struggle","d":"Advanced","r":4.9,"p":"Write lyrics telling the story of a single mother's daily struggle. Working two jobs, barely sleeping, making sure her kids have everything while she goes without. Her strength, her sacrifice, her exhaustion. Specific scenes  —  walking to work in the rain, hiding tears from the kids. A tribute to every mum doing it alone."},{"id":1239,"c":"Songwriting","l":"Any","t":"Storytelling  —  Immigrant Journey","d":"Advanced","r":4.8,"p":"Write lyrics telling the story of an immigrant's journey. Leaving everything behind for a better life. The hope and the heartbreak. Culture shock, racism, missing home, but building something new. From the journey itself to establishing a life in a new country. Powerful and humanising."},{"id":1240,"c":"Songwriting","l":"Any","t":"Storytelling  —  Rise of an Artist","d":"Medium","r":4.7,"p":"Write lyrics telling the autobiographical story of becoming an artist. From writing bars in your bedroom to your first show, first studio session, first time hearing yourself on the radio. The sacrifices, the doubters, the breakthrough moment. Inspirational origin story."},{"id":1241,"c":"Songwriting","l":"Any","t":"Storytelling  —  War Veteran","d":"Advanced","r":4.7,"p":"Write lyrics from the perspective of a war veteran. The contrast between what they saw overseas and coming home to normal life. PTSD, flashbacks, struggling to connect with people who don't understand. The things they can't talk about. Powerful anti-war message through personal experience."},{"id":1242,"c":"Songwriting","l":"Any","t":"Dark  —  Villain Perspective","d":"Advanced","r":4.7,"p":"Write lyrics from a villain's perspective. Not cartoon evil  —  complex, with their own twisted logic and justifications. Why they became this way. The world hurt them first. Dark imagery, menacing tone, but with moments of humanity underneath. Joker energy meets real pain."},{"id":1243,"c":"Songwriting","l":"Any","t":"Dark  —  Sleep Paralysis","d":"Advanced","r":4.6,"p":"Write lyrics about the experience of sleep paralysis. The terror of being awake but unable to move. Shadow figures in the room, pressure on your chest, trying to scream but nothing comes out. Horror imagery that's rooted in real experience. Dark ambient atmosphere."},{"id":1244,"c":"Songwriting","l":"Any","t":"Dark  —  Inner Demons","d":"Medium","r":4.8,"p":"Write lyrics about battling your inner demons. The voice in your head that tells you you're not good enough, the self-destructive urges, the fight between who you want to be and who you keep becoming. Personify the darkness as a character. Internal war."},{"id":1245,"c":"Songwriting","l":"Any","t":"Dark  —  Paranoia","d":"Medium","r":4.7,"p":"Write lyrics about intense paranoia. Trust nobody, looking over your shoulder, convinced people are plotting against you. Could be street paranoia or anxiety-driven. Every shadow is a threat, every silence hides a secret. Claustrophobic and tense. Unsettling atmosphere."},{"id":1246,"c":"Songwriting","l":"Any","t":"Spiritual  —  Finding Faith","d":"Medium","r":4.7,"p":"Write lyrics about finding faith or spirituality. A spiritual awakening after hitting rock bottom. Not preachy  —  personal and genuine. The moment something clicked, feeling a connection to something bigger. Could be religious or just spiritual awareness. Uplifting and transcendent."},{"id":1247,"c":"Songwriting","l":"Any","t":"Spiritual  —  Questioning God","d":"Advanced","r":4.7,"p":"Write lyrics questioning God or the universe. Why do bad things happen to good people? Where were you when I needed you? Honest doubt mixed with wanting to believe. Not disrespectful  —  genuinely wrestling with faith through pain. Raw and philosophical."},{"id":1248,"c":"Songwriting","l":"Any","t":"Empowerment  —  Woman Power","d":"Medium","r":4.8,"p":"Write empowerment lyrics celebrating women's strength and independence. Don't need anyone's validation, building your own empire, breaking glass ceilings. Specific and modern  —  not generic girl power. Reference real situations women navigate. Confident, fierce, unapologetic."},{"id":1249,"c":"Songwriting","l":"Any","t":"Empowerment  —  Self-Love","d":"Simple","r":4.8,"p":"Write lyrics about learning to love yourself after years of self-doubt. Looking in the mirror and finally liking what you see. Rejecting society's standards, embracing your flaws, choosing yourself. The journey from self-hate to self-acceptance. Warm and affirming."},{"id":1250,"c":"Songwriting","l":"Any","t":"Empowerment  —  Breaking Free","d":"Medium","r":4.8,"p":"Write lyrics about breaking free from something holding you back  —  a bad relationship, a dead-end job, a toxic environment, or your own limitations. The moment you decide enough is enough. The terrifying freedom of starting over. Liberation anthem."},{"id":1251,"c":"Songwriting","l":"Any","t":"Seasonal  —  Winter Melancholy","d":"Medium","r":4.7,"p":"Write lyrics capturing winter melancholy. Short dark days, cold wind, bare trees. Seasonal depression, missing warmth and light. But also finding beauty in the stillness  —  frost on windows, the quiet of snowfall. Reflective and atmospheric. Perfect for moody R&B or indie."},{"id":1252,"c":"Songwriting","l":"Any","t":"Seasonal  —  Autumn Reflection","d":"Medium","r":4.7,"p":"Write lyrics using autumn as a metaphor for change. Leaves falling like letting go, golden hour light, endings that are beautiful. Looking back on the year, what's changed, who you've become. Cozy but bittersweet. Warm colours in the words."},{"id":1253,"c":"Songwriting","l":"Any","t":"Seasonal  —  Spring Rebirth","d":"Simple","r":4.7,"p":"Write lyrics about spring as new beginnings. Coming alive after a dark period. Flowers pushing through concrete, longer days, fresh energy. Use nature imagery as metaphor for personal growth and renewal. Hopeful, light, full of possibility."},{"id":1254,"c":"Songwriting","l":"Any","t":"Family  —  Father I Never Had","d":"Advanced","r":4.9,"p":"Write lyrics about growing up without a father. The empty chair, learning to be a man on your own, the anger and the questions. Why did you leave? What would life have been like? If you're now a father yourself  —  the vow to be different. Deeply emotional and specific."},{"id":1255,"c":"Songwriting","l":"Any","t":"Family  —  Letter to My Mum","d":"Medium","r":4.9,"p":"Write lyrics as a love letter to your mother. Everything she sacrificed, the strength she showed, how she held the family together. Specific memories  —  her cooking, her advice, seeing her cry when she thought no one was looking. Thank her for everything. Will make grown men cry."},{"id":1256,"c":"Songwriting","l":"Any","t":"Family  —  Sibling Bond","d":"Medium","r":4.7,"p":"Write lyrics about the bond with your sibling. Growing up together, fighting over stupid things, but always having each other's back. Shared memories only you two understand. How you'd do anything for them. The unspoken loyalty of blood."},{"id":1257,"c":"Songwriting","l":"Any","t":"Family  —  Grandparent's Wisdom","d":"Medium","r":4.7,"p":"Write lyrics about your grandparent and the wisdom they passed down. Their stories from a different era, the values they instilled, sitting and listening to them for hours. If they've passed  —  carrying their memory and lessons forward. Intergenerational love."},{"id":1258,"c":"Songwriting","l":"Any","t":"Family  —  Becoming a Parent","d":"Medium","r":4.8,"p":"Write lyrics about becoming a parent for the first time. The moment you held your child and your whole world shifted. The fear of messing up, the overwhelming love, the promise to give them everything. Seeing the world through new eyes. Life-changing revelation."},{"id":1259,"c":"Songwriting","l":"Any","t":"Drill  —  Opp Block Warning","d":"Advanced","r":4.7,"p":"Write drill lyrics  —  warning opps to stay in their area. Aggressive territorial bars, don't cross the line. Reference specific scenarios without real names. Menacing but lyrical. Sliding through their block energy. Dark, hard-hitting, and confrontational. UK drill cadence and slang."},{"id":1260,"c":"Songwriting","l":"Any","t":"Drill  —  Riding for the Mandem","d":"Medium","r":4.7,"p":"Write drill lyrics about loyalty to your gang/crew. Riding out no matter what, standing ten toes down. The bond forged through shared experiences on the roads. Brothers not by blood but by struggle. UK drill energy with authentic slang."},{"id":1261,"c":"Songwriting","l":"Any","t":"Drill  —  Pain Behind the Bravado","d":"Advanced","r":4.8,"p":"Write drill lyrics that show the vulnerability behind the tough exterior. Lost friends, court dates, mum crying at home. The human cost of road life. Start hard but let the mask slip in the second verse. Emotional depth in a drill framework."},{"id":1262,"c":"Songwriting","l":"Any","t":"Grime  —  Clash Bars","d":"Advanced","r":4.8,"p":"Write grime clash/war bars. Fast-paced, aggressive, lyrical gymnastics. Wordplay, metaphors, and punchlines designed to destroy your opponent in a clash. Wiley vs Skepta energy. 140 BPM cadence, no hook needed  —  just relentless bars. UK slang essential."},{"id":1263,"c":"Songwriting","l":"Any","t":"Grime  —  Estate Life","d":"Medium","r":4.7,"p":"Write grime lyrics about estate life. Tower blocks, stairwells, local chicken shop. The community and the struggles. Real talk about growing up in ends  —  the good and the bad. Kano storytelling style. Authentic UK working-class perspective."},{"id":1264,"c":"Songwriting","l":"Any","t":"R&B  —  Bedroom Vibes","d":"Simple","r":4.8,"p":"Write slow R&B bedroom lyrics. Sensual and intimate  —  setting the mood, candles lit, body language. Tasteful but suggestive. Smooth, silky, and seductive. Think The Weeknd meets Daniel Caesar. Focus on the chemistry and anticipation. Whispered hook."},{"id":1265,"c":"Songwriting","l":"Any","t":"R&B  —  Situationship","d":"Medium","r":4.8,"p":"Write R&B lyrics about being stuck in a situationship. Not quite together, not quite single. The frustration of undefined relationships. Late-night links but no titles. Catching feelings when you promised you wouldn't. Modern dating reality."},{"id":1266,"c":"Songwriting","l":"Any","t":"R&B  —  Make Up After Fight","d":"Medium","r":4.7,"p":"Write R&B lyrics about making up after a big argument. The silence that follows a fight, the first one to reach out, the vulnerability of admitting you were wrong. Makeup intimacy. The relationship is stronger for surviving it. Tender and real."},{"id":1267,"c":"Songwriting","l":"Any","t":"Country  —  Truck and Mud Roads","d":"Simple","r":4.6,"p":"Write country lyrics about small-town life. Dirt roads, pickup trucks, Friday night bonfires. The beauty of simple living  —  fishing at the lake, your dog riding shotgun, cold beers on the porch. Nostalgic for a slower pace of life. Authentic country storytelling."},{"id":1268,"c":"Songwriting","l":"Any","t":"Country  —  Drinking Song","d":"Simple","r":4.6,"p":"Write a country drinking anthem. Raising a glass to good times and bad. Whiskey as therapy, bar as a church, bartender as a counsellor. Funny but with a hint of real pain underneath the humour. Sing-along chorus everyone can join in on."},{"id":1269,"c":"Songwriting","l":"Any","t":"Country  —  Cowboy Love Song","d":"Simple","r":4.6,"p":"Write a classic country love ballad. Meeting someone at a honky-tonk, slow dancing in the parking lot, falling for a small-town girl/boy. Stars overhead, truck bed conversations. Traditional country romance with genuine emotion. Steel guitar and heartstrings."},{"id":1270,"c":"Songwriting","l":"Any","t":"Reggae  —  One Love Unity","d":"Simple","r":4.7,"p":"Write reggae lyrics about unity, peace, and one love. Bringing people together regardless of colour, class, or creed. Positive vibrations, Jah blessings, rising above Babylon. Marley-inspired conscious reggae. Uplifting chorus that spreads love. Riddim-ready."},{"id":1271,"c":"Songwriting","l":"Any","t":"Reggae  —  Ganja Celebration","d":"Simple","r":4.6,"p":"Write reggae lyrics celebrating herb culture. The ritual of rolling up, the meditation of smoking, the spiritual connection. Not just about getting high  —  about consciousness, relaxation, and natural living. Roots and culture. Laid-back good vibes."},{"id":1272,"c":"Songwriting","l":"Any","t":"Dancehall  —  Wine and Grind","d":"Simple","r":4.6,"p":"Write dancehall lyrics for the dance floor. Wine your waist, move your body, the DJ keeping the energy up. Celebration of dance culture, body confidence, and Caribbean joy. Catchy ad-libs and repetitive hook that makes everyone move. Party energy."},{"id":1273,"c":"Songwriting","l":"Any","t":"Rock  —  Rebellion Anthem","d":"Medium","r":4.7,"p":"Write rock lyrics about rebellion against conformity. Refuse to fit in the box society wants for you. Middle finger to the establishment, corporate culture, and anyone trying to control you. Punk attitude in any rock subgenre. Raw energy, screaming chorus."},{"id":1274,"c":"Songwriting","l":"Any","t":"Rock  —  Highway Freedom","d":"Simple","r":4.7,"p":"Write rock lyrics about hitting the open road. Running away from problems, chasing the horizon, windows down guitar blasting. The romance of freedom and movement. No destination, just the journey. Classic rock road trip energy. Born to be wild."},{"id":1275,"c":"Songwriting","l":"Any","t":"Metal  —  War and Destruction","d":"Advanced","r":4.6,"p":"Write metal lyrics about epic warfare. Armies clashing, kingdoms falling, fire and blood. Could be fantasy or historical. Visceral battle descriptions, warrior ethos, the glory and horror of combat. Epic and cinematic. Headbanging chorus."},{"id":1276,"c":"Songwriting","l":"Any","t":"Metal  —  Existential Dread","d":"Advanced","r":4.6,"p":"Write metal lyrics about existential dread and the meaninglessness of existence. Staring into the void, the crushing weight of mortality, cosmic insignificance. Philosophical darkness. Not edgy for the sake of it  —  genuinely confronting the human condition."},{"id":1277,"c":"Songwriting","l":"Any","t":"Folk  —  Protest Song","d":"Medium","r":4.7,"p":"Write folk protest lyrics in the tradition of Woody Guthrie and Bob Dylan. A specific injustice that needs addressing  —  workers' rights, environmental destruction, or political corruption. Simple but powerful. The kind of song that becomes a movement. Acoustic and honest."},{"id":1278,"c":"Songwriting","l":"Any","t":"Folk  —  Ghost Story","d":"Medium","r":4.6,"p":"Write folk lyrics telling a ghost story or dark fairy tale. A haunted village, a mysterious figure, an old curse. Atmospheric storytelling with Celtic/Gothic undertones. The kind of song that gives you chills by the campfire. Dark folk tradition."},{"id":1279,"c":"Songwriting","l":"Any","t":"Pop  —  Breakup Anthem","d":"Simple","r":4.8,"p":"Write a pop breakup anthem that turns pain into power. Start sad but by the chorus you're thriving. Moving on, glowing up, living your best life without them. Empowering, catchy, the song you blast while getting ready to go out. Dua Lipa energy."},{"id":1280,"c":"Songwriting","l":"Any","t":"Pop  —  Feel Good Bop","d":"Simple","r":4.8,"p":"Write feel-good pop lyrics that make people smile. Pure serotonin in song form. Dancing in the kitchen, good hair day, everything's going right for once. Infectiously positive without being annoying. The hook should be impossible to get out of your head."},{"id":1281,"c":"Songwriting","l":"Any","t":"Pop  —  Confident and Unbothered","d":"Simple","r":4.7,"p":"Write pop lyrics about being completely unbothered by haters and negativity. Confident, sassy, living your truth. Not aggressive  —  just genuinely not caring what people think. Hair flip energy. Lizzo meets Meghan Trainor vibe. Self-assured bop."},{"id":1282,"c":"Songwriting","l":"Any","t":"EDM  —  Festival Anthem","d":"Simple","r":4.7,"p":"Write lyrics for an EDM festival anthem. Build-up to the drop, hands in the air, united on the dance floor. The spiritual experience of thousands of people sharing a moment. References to lasers, bass, the crowd becoming one. Euphoric chorus with simple powerful words."},{"id":1283,"c":"Songwriting","l":"Any","t":"EDM  —  After Hours","d":"Medium","r":4.6,"p":"Write lyrics for a dark electronic after-hours track. The club at 4AM, blurry vision, lost in the music. The beautiful disconnection from reality. Haunting vocal over deep bass. That liminal space between night and morning where anything feels possible."},{"id":1284,"c":"Songwriting","l":"Any","t":"Afrobeats  —  Jollof Energy","d":"Simple","r":4.7,"p":"Write Afrobeats lyrics with infectious West African energy. Celebration, dancing, good food, family gatherings. Mix English with pidgin vibes. Reference the culture  —  owambe parties, jollof rice debates, African excellence. Wizkid meets Burna Boy swagger. Afro groove."},{"id":1285,"c":"Songwriting","l":"Any","t":"Afrobeats  —  African Love","d":"Simple","r":4.7,"p":"Write Afrobeats love lyrics. Smooth and romantic over Afrobeats rhythm. Compare your love to African beauty  —  sunsets over Lagos, warmth of the motherland. Sweet melodic delivery, danceable but emotional. Modern African romance."},{"id":1286,"c":"Songwriting","l":"Any","t":"Latin  —  Reggaeton Party","d":"Simple","r":4.7,"p":"Write reggaeton party lyrics. Perreo energy, the club is packed, bodies moving. Bilingual vibes  —  mix English with Spanish phrases. Sensual but fun, the beat controls the dance floor. Bad Bunny meets Daddy Yankee energy. Dembow rhythm ready."},{"id":1287,"c":"Songwriting","l":"Any","t":"Latin  —  Heartbreak Bachata","d":"Medium","r":4.7,"p":"Write bachata heartbreak lyrics. Romantic sadness, a love that burns and hurts. Passionate and dramatic  —  Latin love is intense. Reference dancing together one last time, tasting their lips, the pain of goodbye. Romeo Santos emotion."},{"id":1288,"c":"Songwriting","l":"Any","t":"Social Commentary  —  Social Media Addiction","d":"Medium","r":4.7,"p":"Write lyrics about society's addiction to social media. Comparing likes to validation, doom scrolling instead of living, curated fake lives. The loneliness of being constantly connected. How phones became prisons we carry willingly. Thought-provoking without being preachy."},{"id":1289,"c":"Songwriting","l":"Any","t":"Social Commentary  —  Cost of Living Crisis","d":"Medium","r":4.8,"p":"Write lyrics about the cost of living crisis. Can't afford rent, choosing between heating and eating, working full-time and still broke. The anger of a generation priced out of life. Specific and current  —  food bank queues, energy bills, landlord greed. Working-class anthem."},{"id":1290,"c":"Songwriting","l":"Any","t":"Social Commentary  —  Cancel Culture","d":"Medium","r":4.6,"p":"Write lyrics exploring cancel culture. The mob mentality, no room for growth or redemption, everyone's one tweet away from ruin. Not defending bad behaviour  —  questioning whether public shaming helps or just feeds outrage addiction. Nuanced take."},{"id":1291,"c":"Songwriting","l":"Any","t":"Social Commentary  —  Gentrification","d":"Medium","r":4.7,"p":"Write lyrics about gentrification. Your neighbourhood changing beyond recognition. The corner shop is now a vegan cafe, rents doubled, your community pushed out. Cultural erasure disguised as progress. The loss of identity and belonging. Angry but poignant."},{"id":1292,"c":"Songwriting","l":"Any","t":"Confidence  —  Walk-In Music","d":"Simple","r":4.7,"p":"Write lyrics that could be someone's entrance music. Pure confidence, the energy of walking into a room and commanding attention. Every line should make you stand taller. Perfect for athletes, fighters, or anyone needing a confidence boost. Untouchable energy."},{"id":1293,"c":"Songwriting","l":"Any","t":"Confidence  —  Main Character Energy","d":"Simple","r":4.7,"p":"Write lyrics embodying main character energy. You're the star of your own movie, everything is cinematic, life is your stage. Not arrogant  —  just fully living. Montage-worthy moments. The world revolves around your storyline. Unapologetically yourself."},{"id":1294,"c":"Songwriting","l":"Any","t":"Night Time  —  City After Dark","d":"Medium","r":4.7,"p":"Write lyrics about the city at night. Neon lights, traffic reflections on wet roads, the energy shift when the sun goes down. The city becomes a different beast  —  dangerous but beautiful. Night owls, late-night takeaways, strangers in the dark. Atmospheric and cinematic."},{"id":1295,"c":"Songwriting","l":"Any","t":"Night Time  —  Insomnia Thoughts","d":"Medium","r":4.7,"p":"Write lyrics about lying awake at night with racing thoughts. 3AM and your brain won't shut off. Every mistake replaying, every worry amplified. The loneliness of being the only person awake. Staring at the ceiling conversations with yourself. Haunting and relatable."},{"id":1296,"c":"Songwriting","l":"Any","t":"Night Time  —  Late Night Drive","d":"Medium","r":4.8,"p":"Write lyrics about a late-night solo drive. Empty roads, city lights blurring past, music loud, thinking about everything and nothing. The therapeutic solitude of driving with no destination. Cathartic and atmospheric. The night is yours."},{"id":1297,"c":"Songwriting","l":"Any","t":"Relationship  —  Jealousy","d":"Medium","r":4.7,"p":"Write lyrics about jealousy in a relationship. That sick feeling when they get a text and smile, the Instagram likes from that one person, the arguments about trust. Explore whether the jealousy is justified or your own insecurity. The poison that kills love."},{"id":1298,"c":"Songwriting","l":"Any","t":"Relationship  —  Growing Apart","d":"Medium","r":4.8,"p":"Write lyrics about two people slowly growing apart. No big fight, no betrayal  —  just drifting. The conversations getting shorter, the silences getting longer. Becoming roommates instead of lovers. The saddest kind of ending  —  not with a bang but a whisper."},{"id":1299,"c":"Songwriting","l":"Any","t":"Relationship  —  Forgiveness","d":"Medium","r":4.7,"p":"Write lyrics about forgiving someone who hurt you deeply. The internal struggle of letting go of anger. Choosing peace over revenge. It's not about them  —  it's about freeing yourself. The hardest thing you've ever done but the most necessary. Mature and powerful."},{"id":1300,"c":"Songwriting","l":"Any","t":"Relationship  —  Codependency","d":"Medium","r":4.6,"p":"Write lyrics about a codependent relationship. You've lost yourself in another person  —  can't function without them, your identity has disappeared. Recognising the unhealthy pattern but being terrified of being alone. The journey to finding yourself again."},{"id":1301,"c":"Songwriting","l":"Any","t":"Loss  —  Grief After Death","d":"Advanced","r":4.9,"p":"Write lyrics about grieving someone who died. The stages  —  denial, anger, bargaining, depression. Specific moments that trigger it  —  their birthday, hearing their favourite song, reaching for your phone to text them. The permanence of loss. Devastating but cathartic."},{"id":1302,"c":"Songwriting","l":"Any","t":"Loss  —  Letter to Heaven","d":"Advanced","r":4.9,"p":"Write lyrics as a letter to someone who's passed away. Updating them on life  —  what's changed, what you wish they could see. Telling them things you never got to say. Ask if they're watching over you. A conversation with the sky. Will destroy anyone who's lost someone."},{"id":1303,"c":"Songwriting","l":"Any","t":"Loss  —  Friend Taken Too Soon","d":"Advanced","r":4.8,"p":"Write lyrics about a friend who died young. They had so much potential, so many plans. The unfairness of losing someone before their time. Specific shared memories. The empty seat at the table. Living for them because they can't live for themselves."},{"id":1304,"c":"Songwriting","l":"Any","t":"Identity  —  Who Am I","d":"Medium","r":4.7,"p":"Write lyrics exploring questions of identity. Who are you when nobody's watching? The masks you wear for different people. Trying to find your authentic self under layers of expectations. Deep self-reflection. The courage to strip it all back and just be."},{"id":1305,"c":"Songwriting","l":"Any","t":"Identity  —  Mixed Heritage","d":"Medium","r":4.7,"p":"Write lyrics about growing up mixed race or between two cultures. Not fully belonging to either world. Code-switching, identity questions, being told you're not enough of either. Finding strength in being both. Celebrating the unique perspective it gives you."},{"id":1306,"c":"Songwriting","l":"Any","t":"Identity  —  Small Town Big Dreams","d":"Medium","r":4.8,"p":"Write lyrics about being stuck in a small town with massive ambitions. Everyone around you settled but you want more. The tension between loyalty to home and the need to leave. Outgrowing your surroundings. The dream that keeps you up at night."},{"id":1307,"c":"Songwriting","l":"Any","t":"DnB  —  Rave Culture Love","d":"Medium","r":4.7,"p":"Write lyrics celebrating DnB and rave culture. The bass face, the drops, the unity of the dance floor. Nothing matters outside these four walls. Reference specific rave experiences  —  the MC hyping the crowd, the bass in your chest, lost in the music. 174 BPM energy in words."},{"id":1308,"c":"Songwriting","l":"Any","t":"DnB  —  Jungle MC Bars","d":"Advanced","r":4.7,"p":"Write MC bars over jungle/DnB. Fast-paced lyrical flow matching 174 BPM. Shout-outs to the massive, rewind culture, soundsystem energy. Mix hype bars with real talk. UK MC style  —  General Levy meets Skibadee energy. Made for wheel-ups and reloads."},{"id":1309,"c":"Songwriting","l":"Any","t":"Grime  —  Road to the Top","d":"Medium","r":4.7,"p":"Write grime lyrics about your rise in the music scene. Starting on pirate radio, first rave, first dubplate. The grind of the UK underground. Specific references to grime culture  —  Eskibeat, Lord of the Mics, sets on the radio. Authentic journey."},{"id":1310,"c":"Songwriting","l":"Any","t":"Trap  —  Flexing on Opps","d":"Medium","r":4.6,"p":"Write trap lyrics about stunting on your enemies. Your success is the ultimate revenge. Dripping in designer while they watch from the sidelines. Clever bars comparing your come-up to their downfall. Atlanta trap energy with UK sauce."},{"id":1311,"c":"Songwriting","l":"Any","t":"Trap  —  Hustle Mentality","d":"Medium","r":4.7,"p":"Write trap lyrics about the grind and hustle mentality. Up at 5AM, multiple income streams, never sleeping because the dream doesn't sleep. The sacrifice required for success. Not just about illegal hustle  —  about any relentless pursuit of goals. Motivational trap."},{"id":1312,"c":"Songwriting","l":"Any","t":"Acoustic  —  Campfire Song","d":"Simple","r":4.6,"p":"Write lyrics for a simple acoustic campfire song. Easy to sing along to, easy to play on guitar. A universal experience  —  friends around a fire, stars above, simple pleasures. Warm, communal, timeless. The kind of song everyone knows the chorus to after hearing it once."},{"id":1313,"c":"Songwriting","l":"Any","t":"Acoustic  —  Coffee Shop Intimate","d":"Simple","r":4.7,"p":"Write intimate acoustic lyrics for a coffee shop performance. Just you and a guitar, close audience. Whispered confessions, gentle observations about life. Small beautiful details  —  rain on windows, the steam from a cup, a stranger's smile. Quiet power."},{"id":1314,"c":"Songwriting","l":"Any","t":"Worship  —  Grace and Gratitude","d":"Simple","r":4.6,"p":"Write worship/gospel lyrics about grace and gratitude. Thanking God for bringing you through the storm. Testimony of transformation  —  where you were vs where you are now. Congregational chorus everyone can raise their hands to. Uplifting and genuine."},{"id":1315,"c":"Songwriting","l":"Any","t":"Worship  —  Surrender","d":"Medium","r":4.6,"p":"Write worship lyrics about surrendering control to God. Letting go of trying to do everything yourself. The peace that comes with faith and trust. Intimate prayer in song form. Not performative  —  raw conversation between you and the divine."},{"id":1316,"c":"Songwriting","l":"Any","t":"Comedy  —  Parody Roast","d":"Medium","r":4.5,"p":"Write comedy/parody lyrics roasting everyday annoyances. Slow walkers, people who don't indicate, group chat politics, passive-aggressive emails. Make it genuinely funny  —  not just random, but observational comedy set to music. Weird Al energy. Laughs per bar."},{"id":1317,"c":"Songwriting","l":"Any","t":"Comedy  —  Awkward Situations","d":"Simple","r":4.5,"p":"Write funny lyrics about hilariously awkward situations. Waving back at someone who wasn't waving at you, calling your teacher mum, the wrong name in bed. Cringe comedy gold. Self-deprecating and universally relatable. Everyone has been there."},{"id":1318,"c":"Songwriting","l":"Any","t":"Anime  —  Opening Theme Hero","d":"Medium","r":4.7,"p":"Write lyrics for an anime opening theme. The hero's determination, the bonds of friendship, a great evil to overcome. Epic and emotional  —  the song that plays when the protagonist powers up. Japanese anime spirit in English lyrics. Fighting for what matters."},{"id":1319,"c":"Songwriting","l":"Any","t":"Anime  —  Sad Ending Theme","d":"Medium","r":4.7,"p":"Write lyrics for a melancholic anime ending theme. The battle is over, friends were lost, the hero reflects alone. Cherry blossoms falling, sunset imagery, bittersweet victory. Gentle and devastating. The song that plays over the credits while you cry."},{"id":1320,"c":"Songwriting","l":"Any","t":"Gaming  —  Boss Battle Anthem","d":"Medium","r":4.6,"p":"Write lyrics for an epic gaming boss battle. The final confrontation, everything on the line. Power-up energy, overcoming impossible odds. Mix gaming references with universal themes of perseverance. Could work as actual game music. Intense and climactic."},{"id":1321,"c":"Songwriting","l":"Any","t":"Gaming  —  Victory Royale","d":"Simple","r":4.5,"p":"Write lyrics celebrating gaming victories. The clutch play, the squad wipe, the victory royale. Gaming culture references  —  respawns, loot, GG. Hype enough to soundtrack a highlight reel. Not cringy  —  actually cool. E-sports anthem energy."},{"id":1322,"c":"Songwriting","l":"Any","t":"Afroswing  —  UK Summer Vibes","d":"Simple","r":4.7,"p":"Write Afroswing lyrics for UK summer. Carnival season, good weather finally, vibes in the park. Mix Afrobeats with UK slang. Catchy melodic hook, feel-good energy. Not Too Deep but with meaning. J Hus meets NSG vibes. Waist-winding anthem."},{"id":1323,"c":"Songwriting","l":"Any","t":"Garage  —  UK Garage Anthem","d":"Medium","r":4.7,"p":"Write UK garage lyrics. 2-step groove, weekend vibes, getting ready to go out. Champagne lifestyle, sharp dressing, the buzz of a night out in London. Craig David meets Artful Dodger. Sweet vocals over skippy beats. Garage is back energy."},{"id":1324,"c":"Songwriting","l":"Any","t":"Phonk  —  Sigma Grindset","d":"Simple","r":4.6,"p":"Write phonk lyrics embodying the sigma grindset meme culture. Lone wolf mentality, grinding in silence, letting success make noise. Dark and moody. Short punchy lines that hit over cowbell and 808. TikTok montage-ready. Motivational darkness."},{"id":1325,"c":"Songwriting","l":"Any","t":"Phonk  —  Drift King","d":"Simple","r":4.6,"p":"Write phonk lyrics about night drifting. Street racing, tyres screaming, adrenaline rush. Initial D meets Russian phonk aesthetic. Neon-lit streets, the smell of burnt rubber, living on the edge. Short bars over heavy bass. Maximum intensity."},{"id":1326,"c":"Songwriting","l":"Any","t":"Lo-Fi  —  Rainy Day Thoughts","d":"Simple","r":4.7,"p":"Write lo-fi lyrics for a rainy day. Watching drops on the window, tea going cold, lost in thought. Gentle reflections on life, love, and time passing. Nothing dramatic  —  just the quiet beauty of a slow day. Perfect for lo-fi hip-hop study beats."},{"id":1327,"c":"Songwriting","l":"Any","t":"Lo-Fi  —  Midnight Study","d":"Simple","r":4.6,"p":"Write lo-fi lyrics about late-night studying. The desk lamp glow, caffeine wearing off, the last push before deadline. Finding peace in the late-night grind. Relatable student life. Calm acceptance mixed with quiet determination. Chill vibes only."},{"id":1328,"c":"Songwriting","l":"Any","t":"Emotional  —  Crying in the Car","d":"Medium","r":4.8,"p":"Write lyrics about having a breakdown in your car. Parked up, windows foggy from tears. The one place you let yourself fall apart because nobody can see. Your car as a therapy room. Raw, ugly crying you can't do anywhere else. Then composing yourself and going back to life."},{"id":1329,"c":"Songwriting","l":"Any","t":"Emotional  —  Last Goodbye","d":"Medium","r":4.9,"p":"Write lyrics about saying a final goodbye to someone. Could be a breakup, a death, or leaving home forever. The weight of knowing this is the last time. Every detail is magnified  —  their face, the words you choose, how you hold them. Time slowing down. Devastating."},{"id":1330,"c":"Songwriting","l":"Any","t":"Emotional  —  Regret","d":"Medium","r":4.8,"p":"Write lyrics about deep regret. The decision you can't undo, the words you can't take back. Living with the consequences of your choices. If you could go back, you'd do everything differently. But you can't. Learning to live with the what-ifs."},{"id":1331,"c":"Songwriting","l":"Any","t":"Emotional  —  Overwhelmed","d":"Medium","r":4.7,"p":"Write lyrics about being completely overwhelmed by life. Everything happening at once  —  work, relationships, money, health. Drowning but nobody notices because you're still showing up. The exhaustion of keeping it all together. A pressure release valve in song form."},{"id":1332,"c":"Songwriting","l":"Any","t":"Rap  —  Freestyle Cypher","d":"Advanced","r":4.7,"p":"Write rap bars perfect for a cypher. Switch flows, show technical skill, multi-syllabic rhyme schemes, internal rhymes, metaphor chains. No hook needed  —  just 16 bars of pure lyrical demonstration. Prove you're the best rapper in the room. Pen game on display."},{"id":1333,"c":"Songwriting","l":"Any","t":"Rap  —  Introspective Verse","d":"Advanced","r":4.8,"p":"Write a deeply introspective rap verse. Stream of consciousness, peeling back layers. Your fears, contradictions, growth. The verse you write at 4AM when you can't sleep and the truth comes out. Cole meets Kendrick introspection. Real talk, no cap."},{"id":1334,"c":"Songwriting","l":"Any","t":"Rap  —  Storytelling Third Person","d":"Advanced","r":4.8,"p":"Write a rap storytelling track in third person. Follow a character through a pivotal day in their life. Build them fully  —  name, personality, situation. Multiple verses, each advancing the plot. Twist ending in the final verse. Nas meets Slick Rick narrative craft."},{"id":1335,"c":"Songwriting","l":"Any","t":"Hook Writing  —  Catchy One-Liner","d":"Simple","r":4.8,"p":"Generate 10 catchy one-liner hooks/choruses that could work across genres. Each should be: memorable after one listen, emotionally resonant, simple enough to sing along to. Think 'We Found Love', 'Bohemian Rhapsody', 'Hotline Bling' level hooks. The part everyone remembers."},{"id":1336,"c":"Songwriting","l":"Any","t":"Hook Writing  —  Repetitive Earworm","d":"Simple","r":4.7,"p":"Generate 10 repetitive earworm hooks using the power of repetition. Think 'Yeah!' by Usher, 'Bad Guy' by Billie Eilish, 'Work' by Rihanna. Simple phrases repeated with variations that burrow into your brain. The kind of hook you can't stop singing."},{"id":1337,"c":"Songwriting","l":"Any","t":"Hook Writing  —  Call and Response","d":"Medium","r":4.7,"p":"Generate 10 call-and-response hooks designed for live performances. The artist sings a line, the crowd responds. Think 'Hey Ya!', 'Seven Nation Army', crowd interaction moments. Simple, powerful, arena-ready. The hooks that turn a concert into an experience."},{"id":1338,"c":"Songwriting","l":"Any","t":"Bridge Writing  —  Emotional Turn","d":"Medium","r":4.7,"p":"Write 10 bridge sections that completely shift the emotional energy of a song. The bridge should surprise  —  change perspective, reveal a truth, shift from sad to angry or angry to vulnerable. The moment in the song where everything changes. Goosebump generators."},{"id":1339,"c":"Songwriting","l":"Any","t":"Verse Starters  —  Opening Lines","d":"Simple","r":4.7,"p":"Generate 20 powerful opening lines for songs across genres. The first line should hook the listener immediately  —  a surprising statement, a vivid image, or an emotion that demands attention. Think 'Look, if you had one shot...' or 'Is this the real life?' Conversation starters."},{"id":1340,"c":"Songwriting","l":"Any","t":"Verse Starters  —  Second Verse Deep","d":"Medium","r":4.7,"p":"Write 10 second verse openings that go deeper than the first verse. In songwriting, verse 2 should develop the story or emotion. These openers should shift perspective, reveal new information, or escalate intensity. The 'but wait, there's more' of songwriting."},{"id":1341,"c":"Songwriting","l":"Any","t":"Wordplay  —  Double Entendres","d":"Advanced","r":4.8,"p":"Write 20 bars using double entendres  —  lines that work on two levels simultaneously. Surface meaning and deeper meaning. The hallmark of elite lyricism. Think Lil Wayne, Jay-Z, or Eminem wordplay. Each bar should reward listeners who catch the second meaning."},{"id":1342,"c":"Songwriting","l":"Any","t":"Wordplay  —  Metaphor Chains","d":"Advanced","r":4.7,"p":"Write 10 extended metaphors for songs  —  each metaphor sustained for 4 bars minimum. Compare love to a specific thing (not generic  —  not fire or ocean, think more creative). Carry the metaphor through with consistent imagery. Literary bars for intelligent listeners."},{"id":1343,"c":"Songwriting","l":"Any","t":"Wordplay  —  Punchlines and Similes","d":"Medium","r":4.8,"p":"Write 20 hard-hitting punchlines and similes for rap/grime. Each one should land like a knockout punch. Creative comparisons, unexpected references, and mic-drop moments. The bars people rewind, screenshot, and quote. Pure pen game showcase."},{"id":1344,"c":"Songwriting","l":"Any","t":"Song Concept  —  Time Travel Love","d":"Medium","r":4.6,"p":"Outline a complete song concept: you can travel back in time but only to relive moments with your ex. Each verse is a different memory you revisit. The bridge is the moment you realise you need to stop going back and move forward. Bittersweet sci-fi love story."},{"id":1345,"c":"Songwriting","l":"Any","t":"Song Concept  —  Letters Never Sent","d":"Medium","r":4.7,"p":"Outline a complete song concept: each verse is a letter you wrote to someone but never sent. Verse 1 to an ex, Verse 2 to a parent, Verse 3 to your younger self. The chorus ties them together  —  all the things left unsaid. Bridge: finally sending one. Cathartic."},{"id":1346,"c":"Songwriting","l":"Any","t":"Song Concept  —  Last Day on Earth","d":"Medium","r":4.7,"p":"Outline a complete song concept: what would you do if today was your last day alive? Not dramatic  —  the small things. Call the people you love, eat your favourite meal, watch one last sunset. Each verse is a different part of the day. Perspective-shifting."},{"id":1347,"c":"Songwriting","l":"Any","t":"Song Concept  —  Two Perspectives","d":"Advanced","r":4.7,"p":"Outline a complete song concept: the same breakup told from both perspectives. Verse 1 is their side, Verse 2 is your side, Chorus is what you both feel but won't say. Bridge is the moment you almost fix it but don't. Two truths, one story."},{"id":1348,"c":"Songwriting","l":"Any","t":"Song Concept  —  Voicemail Messages","d":"Medium","r":4.7,"p":"Outline a complete song concept: the song is a series of voicemails left over time. Verse 1: 'Hey, just checking in...' Verse 2: 'Why aren't you answering?' Verse 3: 'I heard what happened...' Each one more desperate. The person never picks up. Why? Reveal in the bridge."},{"id":1349,"c":"Songwriting","l":"Any","t":"Freestyle  —  Random Word Challenge","d":"Advanced","r":4.6,"p":"Give me 5 random unrelated words. Now write 8 bars that naturally incorporate all 5 words into a coherent verse. This is the ultimate freestyle/pen game exercise. The bars should flow naturally  —  the words shouldn't feel forced in. Creative constraint breeds creativity."},{"id":1350,"c":"Songwriting","l":"Any","t":"Freestyle  —  60 Second Verse","d":"Medium","r":4.6,"p":"Write a 16-bar verse with the constraint that every single bar must end with a different rhyme sound. No repeated rhyme patterns. Maximum variety while maintaining flow and coherence. Technical exercise that pushes lyrical range. Every line a new direction."},{"id":1351,"c":"Songwriting","l":"Any","t":"Genre Fusion  —  Drill Meets Classical","d":"Advanced","r":4.6,"p":"Write lyrics that fuse UK drill with classical music themes. Orchestral imagery in drill cadence. Shakespeare references mixed with street slang. Violin metaphors for violence, symphony metaphors for the block. High culture meets street culture. Unique and intellectual."},{"id":1352,"c":"Songwriting","l":"Any","t":"Genre Fusion  —  Country Rap","d":"Medium","r":4.5,"p":"Write lyrics fusing country and rap. Pickup trucks and 808s, whiskey and lean, Nashville meets Atlanta. Not a gimmick  —  find the genuine common ground: storytelling, struggle, pride in where you're from. Lil Nas X proved it works. Find the sweet spot."},{"id":1353,"c":"Songwriting","l":"Any","t":"Genre Fusion  —  Jazz Rap Poetry","d":"Advanced","r":4.7,"p":"Write jazz rap lyrics  —  poetic, sophisticated, abstract. Stream of consciousness over imagined jazz instrumentation. References to Coltrane, Miles Davis, blue smoke and dim lights. Words that swing with rhythm. Spoken word meets hip-hop meets jazz club. Intellectual and smooth."},{"id":1354,"c":"Songwriting","l":"Any","t":"Persona  —  Rockstar Lifestyle","d":"Medium","r":4.6,"p":"Write lyrics from the persona of a rockstar. The glamour and the destruction  —  trashed hotel rooms, sold-out arenas, substances, groupies, loneliness at the top. The contrast between the on-stage god and the off-stage human. Sex, drugs, and rock n roll  —  the reality check."},{"id":1355,"c":"Songwriting","l":"Any","t":"Persona  —  Street Poet","d":"Medium","r":4.7,"p":"Write lyrics as a street poet/philosopher. You observe the world from a park bench and drop wisdom. Commentary on the human condition through what you see  —  the businessman rushing past, the couple arguing, the homeless man everyone ignores. Urban philosopher. Poetic and observational."},{"id":1356,"c":"Songwriting","l":"Any","t":"Persona  —  Future Self","d":"Medium","r":4.7,"p":"Write lyrics from the perspective of your future self writing back to present you. What they'd warn you about, what they'd reassure you on, what they'd tell you to stop worrying about. Time travel letter format. Comforting and unsettling in equal measure."},{"id":1357,"c":"Songwriting","l":"Any","t":"Persona  —  Ghost","d":"Advanced","r":4.6,"p":"Write lyrics from the perspective of a ghost watching over their loved ones. You can see them but can't reach them. Watching them grieve, wanting to tell them you're okay. The frustration and peace of being beyond the veil. Haunting and beautiful."},{"id":1358,"c":"Songwriting","l":"Any","t":"UK Rap  —  Council Estate Poetry","d":"Medium","r":4.8,"p":"Write UK rap lyrics painting a vivid picture of council estate life. The stairwells, the community, the postcode pride. Not just negativity  —  the humour, the resilience, the characters. Specific UK references  —  chip shop, corner shop uncle, the park everyone grew up in. British grit and poetry."},{"id":1359,"c":"Songwriting","l":"Any","t":"UK Rap  —  Pen Game Showcase","d":"Advanced","r":4.8,"p":"Write UK rap bars showcasing elite pen game. Multi-syllabic rhymes, internal rhyme schemes, double and triple entendres, complex metaphors  —  all while telling a story. Lowkey meets Akala level lyricism. Bars that need multiple listens to catch everything. Lyrical complexity."},{"id":1360,"c":"Songwriting","l":"Any","t":"UK Rap  —  Road to Redemption","d":"Advanced","r":4.8,"p":"Write UK rap lyrics about leaving the roads behind. The pull of old life vs the new path. Friends who don't understand why you changed, the temptation to go back. Finding purpose in music, education, or family. Real UK 1430,"c":"Music","l":"Suno","t":"UK Rap  —  Wavey Grime-Rap","d":"Medium","r":4.7,"p":"Wavey grime-rap hybrid, melodic auto-tuned flow over grime-influenced production, 140 BPM but more musical, Yxng Bane meets J Hus crossover, catchy and modern, UK sound"},{"id":1431,"c":"Music","l":"Suno","t":"The Streets  —  Garage Rap","d":"Medium","r":4.7,"p":"Garage rap spoken word, conversational British delivery over UK garage beat, Mike Skinner The Streets style, observational storytelling, everyday life in Britain, dry wit, 130 BPM"},{"id":1432,"c":"Music","l":"Suno","t":"UK Trap  —  British Trap","d":"Medium","r":4.7,"p":"UK trap, Atlanta trap influence with British accents and references, dark 808 bass, trap hi-hat rolls, Nines inspired, London street music, slower than drill, 75 BPM"},{"id":1433,"c":"Music","l":"Suno","t":"UK Pop Rap  —  Chart Ready","d":"Simple","r":4.7,"p":"UK pop rap, radio-friendly rap with pop hooks, catchy melodic chorus, accessible production, Aitch meets Dave radio singles, chart-ready British rap pop crossover, 110 BPM"},{"id":1434,"c":"Music","l":"Suno","t":"UK Wave  —  Dark Electronic","d":"Medium","r":4.6,"p":"UK wave, dark atmospheric electronic R&B, ethereal vocal processing, lo-fi textures, SoundCloud underground, dark and beautiful, Burial influence, nocturnal London, 130 BPM"},{"id":1435,"c":"Music","l":"Suno","t":"Burial  —  Ghost Garage","d":"Advanced","r":4.8,"p":"Burial-style ghost garage, crackling rain samples, distant chopped R&B vocals, deep sub bass, 2-step shuffle, South London at 3AM, lonely and beautiful, haunted dance music, 130 BPM"},{"id":1436,"c":"Music","l":"Suno","t":"Night Slugs  —  Post-Garage","d":"Advanced","r":4.5,"p":"Post-garage, experimental club music, deconstructed UK garage, weird bass music, Bok Bok meets L-Vis 1990, London underground forward-thinking, glitchy and futuristic, 130 BPM"},{"id":1437,"c":"Music","l":"Suno","t":"Weightless  —  Dark DnB Vocal","d":"Advanced","r":4.7,"p":"Weightless DnB, minimal dark drum and bass, haunting vocal whispers, sub-bass weight, intricate percussion, dBridge inspired, autonomic sound, deep and cerebral, 170 BPM"},{"id":1438,"c":"Music","l":"Suno","t":"UK Industrial  —  Power Electronics","d":"Advanced","r":4.4,"p":"UK power electronics, extreme noise, harsh distorted textures, confrontational vocal, industrial darkness, Whitehouse meets Throbbing Gristle, the birth of industrial, 120 BPM"},{"id":1439,"c":"Music","l":"Suno","t":"Witch Step  —  Bass Dark","d":"Medium","r":4.5,"p":"Witch step, dark half-time bass music, occult atmosphere, sub-bass pressure, sparse haunted percussion, Sleeper inspired, twilight bass ritual, deep and menacing, 140 BPM half-time"},{"id":1440,"c":"Music","l":"Suno","t":"UK Jazz  —  Nu Jazz London","d":"Medium","r":4.8,"p":"London nu jazz, live jazz ensemble, Ezra Collective meets Nubya Garcia, energetic Afrobeat influence, saxophone and trumpet, modern British jazz renaissance, vibrant and progressive, 130 BPM"},{"id":1441,"c":"Music","l":"Suno","t":"UK Jazz Rap","d":"Medium","r":4.7,"p":"UK jazz rap, live jazz instrumentation with British rap, Children of Zeus meets Loyle Carner, warm soulful production, introspective lyrics, Manchester jazz hip-hop, 88 BPM"},{"id":1442,"c":"Music","l":"Suno","t":"UK Soul  —  Modern","d":"Medium","r":4.8,"p":"Modern UK soul, rich soulful vocals, live instrumentation, contemporary production, Jorja Smith meets Cleo Sol, warm and intimate, British soul renaissance, beautiful melodies, 80 BPM"},{"id":1443,"c":"Music","l":"Suno","t":"UK R&B  —  British Smooth","d":"Medium","r":4.7,"p":"UK R&B, smooth British R&B, contemporary production, silky vocals, Craig David legacy meets modern sound, Conducta type beat, UK garage-influenced R&B, 100 BPM"},{"id":1444,"c":"Music","l":"Suno","t":"UK Folk  —  English Trad","d":"Medium","r":4.6,"p":"English traditional folk, acoustic instruments, folk club atmosphere, storytelling in English folk tradition, Fairport Convention meets Bellowhead, fiddle and accordion, 110 BPM"},{"id":1445,"c":"Music","l":"Suno","t":"Celtic Punk  —  Pogues Style","d":"Medium","r":4.7,"p":"Celtic punk, Irish folk instruments at punk speed, tin whistle and banjo over driving punk, The Pogues meets Dropkick Murphys, pub fight energy, sing-along chaos, 170 BPM"},{"id":1446,"c":"Music","l":"Suno","t":"Scottish Folk  —  Highlands","d":"Medium","r":4.6,"p":"Scottish folk, bagpipe melody, fiddle and bodhran, highland atmosphere, Runrig meets Capercaillie, Celtic beauty, misty mountain landscapes in sound, traditional, 90 BPM"},{"id":1447,"c":"Music","l":"Suno","t":"Welsh Male Choir","d":"Medium","r":4.6,"p":"Welsh male voice choir, powerful choral harmonies, deep baritone to soaring tenor, hymn-like reverence, rugby anthem energy, Morriston Orpheus inspired, stirring and proud, no instruments"},{"id":1448,"c":"Music","l":"Suno","t":"UK Garage  —  4x4 Bassline","d":"Medium","r":4.7,"p":"4x4 bassline garage, four-on-the-floor kick, warping bassline, garage vocal chops, Wideboys meets Sticky, early 2000s garage bassline, UK rave meets garage, 138 BPM"},{"id":1449,"c":"Music","l":"Suno","t":"UK Tech  —  Swamp 81","d":"Advanced","r":4.6,"p":"Swamp 81 sound, hybrid bass music, garage and dubstep fusion, deep halfstep rhythms, warm bass, Loefah inspired, London bass music evolution, 130 BPM"},{"id":1450,"c":"Music","l":"Suno","t":"Grime  —  Wiley Eski Ice Rink","d":"Advanced","r":4.8,"p":"Eski ice rink grime, frozen crystalline synth melodies, brittle percussive hits, cold digital atmosphere, Wiley's Eskiboy era, the sound of freezing cold electronic music, minimal and icy, 140 BPM"}
,{"id":1451,"c":"Songwriting","l":"Any","t":"Heartbreak — Drunk Texting at 2AM","d":"Medium","r":4.7,"p":"Write lyrics about sending that drunk text you know you\'ll regret. Liquid courage making you say everything you\'ve been holding in. The morning-after horror of reading what you sent. The three dots appearing then disappearing. Capture the desperate vulnerability of needing someone who\'s already gone."},{"id":1452,"c":"Songwriting","l":"Any","t":"Heartbreak — Returning Their Stuff","d":"Medium","r":4.7,"p":"Write lyrics about the ritual of returning each other\'s belongings after a breakup. Each item triggers a memory — their hoodie still smells like them, the book they never finished. The awkward doorstep handover. Trying to be mature when everything in you is screaming to hold on."},{"id":1453,"c":"Songwriting","l":"Any","t":"Heartbreak — First Christmas Alone","d":"Medium","r":4.8,"p":"Write lyrics about spending Christmas alone after a breakup. Everyone\'s coupled up, the empty seat at dinner, buying one less present. The cruel timing of heartbreak during the happiest season. Fairy lights feel like they\'re mocking you. Finding strength in solitude."},{"id":1454,"c":"Songwriting","l":"Any","t":"Heartbreak — Unfollowing Everywhere","d":"Simple","r":4.6,"p":"Write lyrics about the modern breakup ritual of unfollowing, muting, blocking. Digital detox from a person. Every platform is a landmine of memories. The urge to check versus the need to heal. Archiving photos you can\'t delete. Modern heartbreak in the social media age."},{"id":1455,"c":"Songwriting","l":"Any","t":"Heartbreak — They Moved On First","d":"Medium","r":4.8,"p":"Write lyrics about discovering your ex is already in a new relationship. The timeline doesn\'t add up — were they talking while you were together? The jealousy, the comparison, the questioning of everything. Trying to be happy for them when you\'re still broken."},{"id":1456,"c":"Songwriting","l":"Any","t":"Love — Kitchen Dancing","d":"Simple","r":4.8,"p":"Write lyrics about spontaneously dancing in the kitchen with your partner. No music needed, or maybe the radio\'s on. Bare feet on tile, laughing, burning dinner because you got lost in each other. The ordinary magic of domestic love. Pure warmth."},{"id":1457,"c":"Songwriting","l":"Any","t":"Love — Love Language Mismatch","d":"Medium","r":4.7,"p":"Write lyrics about two people who love each other but express it differently. One needs words, one shows through actions. The miscommunication, the frustration, learning to read their version of \'I love you.\' Growing together through understanding."},{"id":1458,"c":"Songwriting","l":"Any","t":"Love — Second Chance Romance","d":"Medium","r":4.8,"p":"Write lyrics about reconnecting with someone years later and falling in love again. You\'ve both changed, grown, become who you needed to be. The timing is finally right. Nervous like teenagers but wiser. A love story with a sequel."},{"id":1459,"c":"Songwriting","l":"Any","t":"Love — Protecting Your Peace","d":"Medium","r":4.7,"p":"Write lyrics about choosing a quiet, healthy love over passionate chaos. After years of drama, you found someone who feels like calm. It\'s not fireworks — it\'s a warm fireplace. Learning that real love doesn\'t have to hurt. Celebrating the beauty of boring."},{"id":1460,"c":"Songwriting","l":"Any","t":"Love — Love Letter Unsent","d":"Medium","r":4.8,"p":"Write lyrics structured as a love letter you never had the courage to send. Everything you feel but can\'t say face to face. The specific things about them that undo you. Folded paper in a drawer, words worn soft from re-reading. Will you ever give it to them?"},{"id":1461,"c":"Songwriting","l":"Any","t":"Mental Health — Burnout","d":"Medium","r":4.8,"p":"Write lyrics about complete burnout. Running on empty, the passion is gone, you\'re just going through the motions. Can\'t remember the last time you felt excited about anything. The guilt of needing to stop in a world that never does. Permission to rest."},{"id":1462,"c":"Songwriting","l":"Any","t":"Mental Health — Imposter Syndrome","d":"Medium","r":4.7,"p":"Write lyrics about feeling like a fraud. Everyone thinks you have it together but you\'re waiting to be exposed. Each success feels like luck, each compliment feels undeserved. The exhaustion of performing competence. You belong here — you just can\'t believe it yet."},{"id":1463,"c":"Songwriting","l":"Any","t":"Mental Health — ADHD Brain","d":"Medium","r":4.7,"p":"Write lyrics about living with ADHD. A million tabs open in your brain, hyperfocus then nothing, starting everything finishing nothing. The frustration of knowing you\'re capable but your brain won\'t cooperate. Society built for neurotypical people. Finding your own rhythm."},{"id":1464,"c":"Songwriting","l":"Any","t":"Mental Health — Panic Attack","d":"Advanced","r":4.8,"p":"Write lyrics describing a panic attack from the inside. Heart racing, can\'t breathe, walls closing in, convinced you\'re dying. Time distorts, reality fractures. Then the slow return — grounding yourself, counting breaths, coming back. The aftermath exhaustion. You survived again."},{"id":1465,"c":"Songwriting","l":"Any","t":"Mental Health — Asking for Help","d":"Medium","r":4.8,"p":"Write lyrics about the moment you finally ask for help. The hardest words: \'I\'m not okay.\' Breaking through pride, shame, and the fear of being a burden. The relief when someone says \'I\'m here.\' Strength isn\'t doing it alone — it\'s knowing when you can\'t."},{"id":1466,"c":"Songwriting","l":"Any","t":"Street Life — County Lines","d":"Advanced","r":4.7,"p":"Write lyrics about county lines exploitation. Young kids being groomed and used to run drugs to small towns. The manipulation, the fear, the isolation from family. Not glorifying — exposing the truth. The adults who profit while children take the risk. Urgent social commentary."},{"id":1467,"c":"Songwriting","l":"Any","t":"Street Life — Prison Letters","d":"Advanced","r":4.8,"p":"Write lyrics as letters exchanged between someone in prison and their partner outside. The loneliness on both sides, the promises to change, the reality of time. Visits behind glass, phone calls that cost too much. Love tested by concrete walls and barbed wire."},{"id":1468,"c":"Songwriting","l":"Any","t":"Street Life — The Getaway Driver","d":"Advanced","r":4.7,"p":"Write lyrics from the perspective of a getaway driver. Waiting in the car, engine running, heart pounding. Everything that could go wrong playing in your head. The seconds feel like hours. When they finally jump in — the adrenaline, the sirens, the aftermath. Cinematic tension."},{"id":1469,"c":"Songwriting","l":"Any","t":"Digital Age — AI Replacing Us","d":"Medium","r":4.7,"p":"Write lyrics about the anxiety of AI replacing human creativity and jobs. What happens when machines write better songs, paint better art? The existential crisis of feeling obsolete. But also — what makes us irreplaceable. The human experience no algorithm can replicate."},{"id":1470,"c":"Songwriting","l":"Any","t":"Digital Age — Catfished","d":"Medium","r":4.7,"p":"Write lyrics about being catfished. Falling for someone online who turned out to be completely fake. The embarrassment, the betrayal of trust, questioning your own judgment. Were the feelings real even if the person wasn\'t? Modern love\'s darkest chapter."},{"id":1471,"c":"Songwriting","l":"Any","t":"Digital Age — Screen Time Addiction","d":"Medium","r":4.6,"p":"Write lyrics about realising you\'re addicted to your phone. Hours disappearing into scrolling, real life passing you by. Can\'t sit in silence without reaching for it. The blue light glow replacing real sunlight. A breakup letter to your phone."},{"id":1472,"c":"Songwriting","l":"Any","t":"Digital Age — Online Fame","d":"Medium","r":4.7,"p":"Write lyrics about going viral and the aftermath. Overnight fame, millions of eyes on you, but it\'s hollow. Strangers think they know you. The pressure to stay relevant, the anxiety of one wrong post ending everything. The loneliness of being watched by millions."},{"id":1473,"c":"Songwriting","l":"Any","t":"Digital Age — Long Distance Love Online","d":"Medium","r":4.7,"p":"Write lyrics about falling in love with someone you\'ve never met in person. Late-night video calls across time zones, sharing everything through screens. Planning the first meeting, the nervous anticipation. Is the real thing as good as the digital version?"},{"id":1474,"c":"Songwriting","l":"Any","t":"Culture — First Generation British","d":"Medium","r":4.8,"p":"Write lyrics about being first-generation British. Parents from another country, raised between two worlds. Speaking one language at home, another outside. The pressure to succeed for the family who sacrificed everything. Navigating dual identity with pride."},{"id":1475,"c":"Songwriting","l":"Any","t":"Culture — Caribbean Heritage","d":"Medium","r":4.7,"p":"Write lyrics celebrating Caribbean heritage and roots. Carnival culture, patois at grandma\'s house, rice and peas on Sunday. The warmth and strength of Caribbean community in the UK. Missing the islands you\'ve only visited but feel deeply connected to."},{"id":1476,"c":"Songwriting","l":"Any","t":"Culture — South Asian Expectations","d":"Medium","r":4.7,"p":"Write lyrics about navigating South Asian family expectations. The pressure of arranged introductions, career paths chosen for you, honour and duty. Finding your own voice while respecting your roots. The generation gap that\'s really a cultural canyon. Balancing love and obligation."},{"id":1477,"c":"Songwriting","l":"Any","t":"Culture — African Diaspora Pride","d":"Medium","r":4.8,"p":"Write lyrics celebrating African diaspora culture. The richness of heritage, the traditions that survived slavery and colonialism. Food, music, language, dance passed down through generations. Reclaiming history and wearing it like a crown. Ancestral pride."},{"id":1478,"c":"Songwriting","l":"Any","t":"Working Class — Zero Hours Contract","d":"Medium","r":4.7,"p":"Write lyrics about surviving on zero-hours contracts. Never knowing if you\'ll work next week, can\'t plan anything, treated as disposable. The anxiety of checking your phone for shifts. Bills don\'t care about your schedule. Modern-day exploitation with a corporate smile."},{"id":1479,"c":"Songwriting","l":"Any","t":"Working Class — Night Shift Life","d":"Medium","r":4.7,"p":"Write lyrics about working the night shift. While the world sleeps, you\'re grafting. Missing birthdays, sleeping when everyone\'s awake, living in reverse. The quiet camaraderie of night workers. Coming home as the sun rises. The invisible workforce."},{"id":1480,"c":"Songwriting","l":"Any","t":"Working Class — Council Estate Pride","d":"Medium","r":4.8,"p":"Write lyrics about being proud of your council estate upbringing. The community that raised you, the resilience you learned. Outsiders see poverty — you see family. The best people you know came from the worst postcodes. Redefining what it means to come from nothing."},{"id":1481,"c":"Songwriting","l":"Any","t":"Working Class — Minimum Wage Dreams","d":"Medium","r":4.7,"p":"Write lyrics about dreaming big while earning minimum wage. Stacking shelves by day, writing bars by night. The soul-crushing gap between where you are and where you want to be. Using the frustration as fuel. One day this won\'t be your life."},{"id":1482,"c":"Songwriting","l":"Any","t":"Relationship — Trust Issues","d":"Medium","r":4.8,"p":"Write lyrics about being unable to fully trust a new partner because of past betrayal. They\'ve done nothing wrong but you\'re waiting for the other shoe to drop. Checking their phone in your head, reading into every late reply. Sabotaging something good because someone else broke you."},{"id":1483,"c":"Songwriting","l":"Any","t":"Relationship — Different Worlds","d":"Medium","r":4.7,"p":"Write lyrics about being in love with someone from a completely different background. Class divide, cultural differences, families who don\'t approve. You fit perfectly in private but the outside world keeps reminding you that you\'re \'different.\' Love as rebellion."},{"id":1484,"c":"Songwriting","l":"Any","t":"Relationship — Toxic Masculinity","d":"Medium","r":4.7,"p":"Write lyrics about a man learning to be vulnerable in a relationship. Raised not to cry, not to feel, be strong always. She\'s asking him to open up and he doesn\'t know how. The walls built by boyhood. Unlearning toughness to discover tenderness."},{"id":1485,"c":"Songwriting","l":"Any","t":"Relationship — Long Term Boredom","d":"Medium","r":4.6,"p":"Write lyrics about the boredom that creeps into long relationships. Same routines, same conversations, the spark feels distant. But also — is comfort being undervalued? The choice to reignite versus the temptation to start fresh. Real talk about the unglamorous side of love."},{"id":1486,"c":"Songwriting","l":"Any","t":"Relationship — Falling for Your Best Friend","d":"Medium","r":4.8,"p":"Write lyrics about catching feelings for your best friend. The terror of ruining what you have. Every hug lasting a beat too long, every joke feeling like flirting. Should you risk the friendship for something more? The most beautiful gamble."},{"id":1487,"c":"Songwriting","l":"Any","t":"Party — Pre-Drinks Energy","d":"Simple","r":4.7,"p":"Write lyrics about pre-drinks before going out. Getting ready with your crew, music blasting, outfits being decided. The excitement of the night ahead, shots flowing, everyone hyping each other up. This is often better than the actual club. Anticipation anthem."},{"id":1488,"c":"Songwriting","l":"Any","t":"Party — Festival Weekend","d":"Simple","r":4.8,"p":"Write lyrics about a festival weekend. Tents, mud, sunburn, and pure freedom. No signal, no stress, just music and mates. The moments between sets — meeting strangers who become friends, sunrise at the main stage. Three days of exis
